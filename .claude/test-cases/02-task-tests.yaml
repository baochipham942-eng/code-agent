# ============================================================================
# Task Completion Tests - 任务完成能力测试
# ============================================================================
# 测试 Agent 完成完整任务的能力

name: "任务完成能力测试"
description: "测试 Agent 完成完整编程任务的能力"
default_timeout: 120000
tags:
  - tasks
  - integration

cases:
  # --------------------------------------------------------------------------
  # 简单任务
  # --------------------------------------------------------------------------
  - id: task-create-js-file
    type: task
    category: task_completion
    difficulty: easy
    description: "创建简单 JavaScript 文件"
    prompt: "创建一个 hello-test.js 文件，包含一个打印 'Hello World' 的函数"
    expect:
      files_created:
        - hello-test.js
      file_contains:
        hello-test.js:
          - console.log
          - Hello
    expectations:
      - type: file_exists
        description: "hello-test.js 文件应被创建"
        weight: 1.0
        critical: true
        params:
          path: hello-test.js
      - type: content_contains
        description: "文件应包含 console.log"
        weight: 0.8
        critical: false
        params:
          path: hello-test.js
          contains: "console.log"
      - type: content_contains
        description: "文件应包含 Hello"
        weight: 0.8
        params:
          path: hello-test.js
          contains: "Hello"
      - type: tool_called
        description: "应调用写入工具"
        weight: 0.5
        params:
          tool: write_file|bash
      - type: no_crash
        description: "不应崩溃"
        weight: 0.5
        params: {}
      - type: max_turns
        description: "应在 10 轮内完成"
        weight: 0.3
        params:
          max: 10
    cleanup:
      - rm -f hello-test.js

  - id: task-create-json-config
    type: task
    description: "创建 JSON 配置文件"
    prompt: "创建一个 test-config.json 文件，包含 name, version, enabled 三个字段"
    expect:
      files_created:
        - test-config.json
      file_contains:
        test-config.json:
          - name
          - version
          - enabled
    expectations:
      - type: file_exists
        description: "文件应存在: test-config.json"
        weight: 1
        critical: true
        params:
          path: "test-config.json"
      - type: content_contains
        description: "文件 test-config.json 应包含 'name'"
        weight: 0.8
        params:
          path: "test-config.json"
          contains: "name"
      - type: content_contains
        description: "文件 test-config.json 应包含 'version'"
        weight: 0.8
        params:
          path: "test-config.json"
          contains: "version"
      - type: content_contains
        description: "文件 test-config.json 应包含 'enabled'"
        weight: 0.8
        params:
          path: "test-config.json"
          contains: "enabled"
      - type: no_crash
        description: "不应崩溃"
        weight: 1
        critical: true
        params: {}
    cleanup:
      - rm -f test-config.json

  # --------------------------------------------------------------------------
  # 多步骤任务
  # --------------------------------------------------------------------------
  - id: task-multi-step-readme
    type: task
    category: task_completion
    difficulty: medium
    description: "多步骤 - 读取项目信息并生成说明"
    prompt: "读取 package.json，然后创建一个 test-readme.md 文件，包含项目名称和描述"
    expect:
      min_tool_calls: 2
      files_created:
        - test-readme.md
      file_contains:
        test-readme.md: code-agent
    expectations:
      - type: file_exists
        description: "test-readme.md 文件应被创建"
        weight: 1.0
        critical: true
        params:
          path: test-readme.md
      - type: content_contains
        description: "生成的 README 应包含项目名称"
        weight: 1.0
        critical: true
        params:
          path: test-readme.md
          contains: code-agent
      - type: min_tool_calls
        description: "应至少调用 2 个工具（读取 + 写入）"
        weight: 0.8
        params:
          min: 2
      - type: no_crash
        description: "不应崩溃"
        weight: 0.5
        params: {}
      - type: max_turns
        description: "中等任务应在 15 轮内完成"
        weight: 0.3
        params:
          max: 15
    cleanup:
      - rm -f test-readme.md

  - id: task-analyze-structure
    type: task
    description: "分析项目结构"
    prompt: "列出 src/main 目录下的所有子目录，并简单说明每个目录的用途"
    expect:
      min_tool_calls: 1
      response_contains:
        - agent
        - tools
    expectations:
      - type: response_contains
        description: "响应应包含 'agent'"
        weight: 0.8
        params:
          text: "agent"
      - type: response_contains
        description: "响应应包含 'tools'"
        weight: 0.8
        params:
          text: "tools"
      - type: min_tool_calls
        description: "至少应调用 1 次工具"
        weight: 0.3
        params:
          min: 1
      - type: no_crash
        description: "不应崩溃"
        weight: 1
        critical: true
        params: {}
    timeout: 60000

  # --------------------------------------------------------------------------
  # 代码理解任务
  # --------------------------------------------------------------------------
  - id: task-explain-code
    type: task
    description: "代码解释任务"
    prompt: "读取 src/main/testing/types.ts 文件，解释 TestCase 接口的用途"
    expect:
      response_contains:
        - test
    expectations:
      - type: response_contains
        description: "响应应包含 'test'"
        weight: 0.8
        params:
          text: "test"
      - type: no_crash
        description: "不应崩溃"
        weight: 1
        critical: true
        params: {}
    timeout: 60000
