# ============================================================================
# Excel Benchmark Tests - SpreadsheetBench Hard Cases
# ============================================================================
# 10 challenging cases from SpreadsheetBench (912 total, picked hardest)
# Source: https://github.com/RUCKBReasoning/SpreadsheetBench
# Covers: formula, conditional formatting, VBA macro, text parsing,
#         multi-sheet ops, INDEX/MATCH, transposition
#
# Data location: eval/excel-benchmark/selected_10/{case_id}/

name: "Excel AI Benchmark (SpreadsheetBench Hard 10)"
description: "10 challenging real-world Excel tasks from SpreadsheetBench"
default_timeout: 180000
tags:
  - excel
  - benchmark
  - spreadsheet

cases:
  # --------------------------------------------------------------------------
  # Case 1: MAX column heading formula (Cell-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-59196
    type: task
    category: formula
    difficulty: medium
    description: "公式：返回行中最大值所在列的标题"
    setup:
      - cp eval/excel-benchmark/selected_10/59196/1_59196_input.xlsx test-59196.xlsx
    prompt: |
      打开 test-59196.xlsx。
      我需要一个公式，在 H 列(H3:H5)中，找出每一行中数值最大的列，并返回该列的标题。
      请直接修改 test-59196.xlsx，在 H3:H5 填入公式或结果。
      预期答案：H3=D, H4=A, H5=D
    expect:
      min_tool_calls: 2
      no_crash: true
    expectations:
      - type: response_contains
        description: "结果应包含列标题 D 和 A"
        weight: 1.0
        critical: true
        params:
          text: "D"
      - type: response_contains
        description: "应提到 INDEX 或 MATCH 或 MAX"
        weight: 0.5
        params:
          text: "INDEX|MATCH|MAX"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-59196.xlsx

  # --------------------------------------------------------------------------
  # Case 2: Conditional formatting - duplicate highlighting (Sheet-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-CF_28766
    type: task
    category: conditional_formatting
    difficulty: hard
    description: "条件格式：同日期内仅标记第二次及后续重复名字"
    setup:
      - cp eval/excel-benchmark/selected_10/CF_28766/1_CF_28766_input.xlsx test-CF28766.xlsx
    prompt: |
      打开 test-CF28766.xlsx。
      Sheet1 的 C:G 列包含日期和人名数据。
      需求：创建一个公式或条件格式规则，仅标记同一天内第二次及后续出现的名字（用黄色高亮）。
      第一次出现不标记。
      请用 Python openpyxl 实现，修改 test-CF28766.xlsx。
      目标范围：C3:G14。
    expect:
      min_tool_calls: 2
      no_crash: true
    expectations:
      - type: response_contains
        description: "应提到重复检测逻辑"
        weight: 0.8
        params:
          text: "duplicate|重复|COUNTIF"
      - type: min_tool_calls
        description: "至少调用 2 次工具"
        weight: 0.3
        params:
          min: 2
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-CF28766.xlsx

  # --------------------------------------------------------------------------
  # Case 3: Multi-sheet SUM macro (Sheet-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-382-29
    type: task
    category: macro
    difficulty: hard
    description: "宏：跨多个 Sheet 对 B2:B26 求和到 Totals 表"
    setup:
      - cp eval/excel-benchmark/selected_10/382-29/1_382-29_input.xlsx test-382-29.xlsx
    prompt: |
      打开 test-382-29.xlsx。
      该文件有 4 个 Sheet：3 个数据表 + 1 个 Totals 表。
      需求：将所有数据表的 B2:B26 对应单元格求和，填入 Totals!B2:B26。
      例如 Totals!B2 = Sheet1!B2 + Sheet2!B2 + Sheet3!B2。
      请用 Python openpyxl 实现，直接修改 test-382-29.xlsx。
      预期答案示例：B2=42, B3=36, B4=18
    expect:
      min_tool_calls: 2
      response_contains:
        - "42"
      no_crash: true
    expectations:
      - type: response_contains
        description: "结果应包含求和值"
        weight: 1.0
        critical: true
        params:
          text: "42"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-382-29.xlsx

  # --------------------------------------------------------------------------
  # Case 4: Text extraction + area calculation (Sheet-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-66-1
    type: task
    category: text_parsing
    difficulty: hard
    description: "从产品描述中提取尺寸并计算面积(m2)"
    setup:
      - cp eval/excel-benchmark/selected_10/66-1/1_66-1_input.xlsx test-66-1.xlsx
    prompt: |
      打开 test-66-1.xlsx。
      Sheet1 中，产品描述末尾包含宽度和高度尺寸（如 "300x800"）。
      需求：在 E 列(E2:E11)计算每个产品的面积（平方米 m2），宽x高/1000000。
      请用 Python openpyxl 实现，读取描述中的尺寸数字，计算面积并填入 E 列。
      预期答案示例：E2=2.4, E3=2, E4=3
    expect:
      min_tool_calls: 2
      no_crash: true
    expectations:
      - type: response_contains
        description: "结果应包含面积值"
        weight: 1.0
        critical: true
        params:
          text: "2.4"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-66-1.xlsx

  # --------------------------------------------------------------------------
  # Case 5: Dynamic column insertion macro (Sheet-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-353-50
    type: task
    category: macro
    difficulty: hard
    description: "宏：动态插入上月列并复制公式"
    setup:
      - cp eval/excel-benchmark/selected_10/353-50/1_353-50_input.xlsx test-353-50.xlsx
    prompt: |
      打开 test-353-50.xlsx。
      需求：在 Sheet1 中插入一个新列，对应当前日期的上一个月。
      例如如果现在是 2024 年 11 月，则插入 October 列。
      同时将前一个月的数据和公式复制到新列中。
      请用 Python openpyxl 分析文件结构，然后实现此逻辑。
      目标范围：靠近 AL-AO 列。
    expect:
      min_tool_calls: 3
      no_crash: true
    expectations:
      - type: min_tool_calls
        description: "至少 3 次工具调用（读取+分析+写入）"
        weight: 0.5
        params:
          min: 3
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-353-50.xlsx

  # --------------------------------------------------------------------------
  # Case 6: Multi-sheet transpose + report (Sheet-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-91-3
    type: task
    category: transpose
    difficulty: hard
    description: "转置多个 Sheet 并生成汇总报告"
    setup:
      - cp eval/excel-benchmark/selected_10/91-3/1_91-3_input.xlsx test-91-3.xlsx
    prompt: |
      打开 test-91-3.xlsx。
      该文件有多个 Sheet，每个 Sheet 的 B 列包含多个词条，C/D 列有金额。
      需求：
      1. 在 FINAL sheet 中，A 列列出 sheet 名
      2. B:H 列的表头基于各 sheet B 列的内容生成
      3. 同一 sheet 内重复词条应合并求和
      4. I:K 列用现有公式计算
      请用 Python openpyxl 实现。
      预期表头示例：TRANSFERRING BALANCE, PURCHASE, SALES, CASH PR, CASH DM
    expect:
      min_tool_calls: 3
      no_crash: true
    expectations:
      - type: response_contains
        description: "应包含关键表头"
        weight: 0.8
        params:
          text: "PURCHASE|SALES|BALANCE"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-91-3.xlsx

  # --------------------------------------------------------------------------
  # Case 7: SUMIF formula (Cell-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-46167
    type: task
    category: formula
    difficulty: easy
    description: "SUMIF 公式：按 Product ID 求和 QTY"
    setup:
      - cp eval/excel-benchmark/selected_10/46167/1_46167_input.xlsx test-46167.xlsx
    prompt: |
      打开 test-46167.xlsx。
      A 列是 PRODUCT ID，B 列是 QTY（数量）。
      需求：在 D2 单元格创建一个 SUMIF 公式，计算 PRODUCT ID 为 111111 的所有 QTY 之和。
      预期结果：D2 = 270（来自 50 + 60 + 70 + 90）。
      请直接修改 test-46167.xlsx。
    expect:
      min_tool_calls: 2
      response_contains:
        - "270"
      no_crash: true
    expectations:
      - type: response_contains
        description: "结果应包含 270"
        weight: 1.0
        critical: true
        params:
          text: "270"
      - type: response_contains
        description: "应提到 SUMIF"
        weight: 0.5
        params:
          text: "SUMIF"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-46167.xlsx

  # --------------------------------------------------------------------------
  # Case 8: Text parsing - extract size from SKU format (Cell-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-58994
    type: task
    category: text_parsing
    difficulty: medium
    description: "从 SKU 格式中提取 Size 并转换为加仑"
    setup:
      - cp eval/excel-benchmark/selected_10/58994/1_58994_input.xlsx test-58994.xlsx
    prompt: |
      打开 test-58994.xlsx。
      数据格式为 'What:Who-Size-SKU'，例如 'FG:BJ-155-00310'。
      需求：提取 Size 部分（如 155），转换为加仑大小（如 '15.5 gals' 或 '750ml'）。
      在 Sheet1!F8 单元格输出结果。
      请用 Python 或公式实现。
      预期答案：F8 = 750ml
    expect:
      min_tool_calls: 2
      no_crash: true
    expectations:
      - type: response_contains
        description: "应包含提取结果"
        weight: 1.0
        critical: true
        params:
          text: "750"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-58994.xlsx

  # --------------------------------------------------------------------------
  # Case 9: INDEX/MATCH across sheets (Cell-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-55427
    type: task
    category: formula
    difficulty: hard
    description: "INDEX/MATCH 跨表查找学校数据"
    setup:
      - cp eval/excel-benchmark/selected_10/55427/1_55427_input.xlsx test-55427.xlsx
    prompt: |
      打开 test-55427.xlsx。
      该文件有多个 Sheet，包含学校数据。
      需求：在 'Compiled and located schools da' Sheet 的 B 列(B2:B1461)，
      使用 INDEX/MATCH 从 'URN lookup' Sheet 中查找 DFES number。
      匹配逻辑：用 L 列的值在 'URN lookup'!K 列中查找，返回 D 列的值。
      预期公式：=INDEX('URN lookup'!$D$2:$D$1461,MATCH(L2,'URN lookup'!$K$2:$K$1461,0))
      请用 Python openpyxl 实现。
      预期答案示例：B2=2002
    expect:
      min_tool_calls: 3
      no_crash: true
    expectations:
      - type: response_contains
        description: "应提到 INDEX/MATCH"
        weight: 0.7
        params:
          text: "INDEX|MATCH|lookup"
      - type: response_contains
        description: "应包含查找结果"
        weight: 0.8
        params:
          text: "2002"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-55427.xlsx

  # --------------------------------------------------------------------------
  # Case 10: Min value > 0 column header (Cell-Level)
  # --------------------------------------------------------------------------
  - id: excel-bench-44389
    type: task
    category: formula
    difficulty: hard
    description: "公式：返回行中 >0 最小值所在列的标题（多值用逗号分隔）"
    setup:
      - cp eval/excel-benchmark/selected_10/44389/1_44389_input.xlsx test-44389.xlsx
    prompt: |
      打开 test-44389.xlsx。
      数据区域有多列数值，P 列(P2:P7)需要显示每行中大于零的最小值所在的列标题。
      如果有多个列的值相同且都是最小值，则用逗号分隔，例如 "KWH,VB"。
      请用 Python openpyxl 实现，直接修改 test-44389.xlsx。
      预期答案示例：P2=MMX, P3=Catch, P4=KWH,VB, P5=Amazon, P6=KWH
    expect:
      min_tool_calls: 2
      no_crash: true
    expectations:
      - type: response_contains
        description: "结果应包含列标题"
        weight: 1.0
        critical: true
        params:
          text: "MMX"
      - type: response_contains
        description: "应处理多值情况"
        weight: 0.8
        params:
          text: "KWH"
      - type: no_crash
        weight: 1.0
        critical: true
        params: {}
    cleanup:
      - rm -f test-44389.xlsx
