name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build signed Tauri updater bundle
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:release:bundle

      - name: Generate updater manifest
        run: |
          ARTIFACT_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          npm run tauri:update-manifest -- --base-url "${ARTIFACT_BASE_URL}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/latest.json
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish optional update metadata to Cloud API
        env:
          CLOUD_API_URL: ${{ secrets.CLOUD_API_URL }}
          CI_PUBLISH_TOKEN: ${{ secrets.CI_PUBLISH_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ -z "${CLOUD_API_URL}" || -z "${CI_PUBLISH_TOKEN}" ]]; then
            echo "Cloud update publish skipped: CLOUD_API_URL or CI_PUBLISH_TOKEN is not set"
            exit 0
          fi

          export VERSION="${TAG#v}"
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('src-tauri/target/release/bundle/latest.json', 'utf8'));
          const payload = {
            version: process.env.VERSION,
            platform: 'darwin',
            downloadUrl: `https://github.com/${process.env.REPO}/releases/tag/${process.env.TAG}`,
            releaseNotes: manifest.notes,
          };
          fs.writeFileSync('/tmp/code-agent-update-payload.json', JSON.stringify(payload));
          NODE

          curl -X POST "${CLOUD_API_URL%/}/api/update/publish" \
            -H "Authorization: Bearer ${CI_PUBLISH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/code-agent-update-payload.json
