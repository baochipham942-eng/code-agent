name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      # Gate for the runtime-assets publishing steps. Empty (no secret) => those steps
      # skip, which matches the safe default that managed runtime-asset publishing is not
      # enabled until a control-plane signing key is provisioned (see C1 audit gate).
      CODE_AGENT_CONTROL_PLANE_PRIVATE_KEY: ${{ secrets.CODE_AGENT_CONTROL_PLANE_PRIVATE_KEY }}
      CODE_AGENT_CONTROL_PLANE_KEY_ID: ${{ secrets.CODE_AGENT_CONTROL_PLANE_KEY_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        env:
          TAURI_CLI_VERSION: '2.10.1'
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Build native helpers + fetch sidecars (Tauri bundle resources)
        # tauri.conf.json bundles three Swift Mach-O helpers (system-audio-capture, vision-ocr,
        # vision-tagger) AND two fetched sidecar binaries (rtk, uv). All five are build artifacts
        # NOT committed to the repo. A fresh CI checkout must produce every one or `tauri build`
        # fails with "resource path doesn't exist" — this is exactly why v0.16.89 (2026-06-01)
        # failed: rtk/uv were added to bundle resources after the last green run but this step
        # was never updated to fetch them. fetch-rtk/fetch-uv pull from GitHub releases; the CI
        # runner reaches GitHub directly so no proxy is needed (unlike local dev).
        run: |
          bash scripts/build-audio-capture.sh
          bash scripts/build-vision-ocr.sh
          bash scripts/build-vision-tagger.sh
          bash scripts/fetch-rtk.sh
          bash scripts/fetch-uv.sh

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_P12_BASE64}" || -z "${APPLE_CERTIFICATE_PASSWORD}" || -z "${APPLE_KEYCHAIN_PASSWORD}" ]]; then
            echo "APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD, and APPLE_KEYCHAIN_PASSWORD are required"
            exit 1
          fi

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          echo "${APPLE_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Build signed Tauri updater bundle
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          CODE_AGENT_CONTROL_PLANE_PUBLIC_KEYS: ${{ secrets.CODE_AGENT_CONTROL_PLANE_PUBLIC_KEYS }}
          CODE_AGENT_CONTROL_PLANE_KEY_ID: ${{ secrets.CODE_AGENT_CONTROL_PLANE_KEY_ID }}
          CODE_AGENT_CONTROL_PLANE_PUBLIC_KEY: ${{ secrets.CODE_AGENT_CONTROL_PLANE_PUBLIC_KEY }}
          CODE_AGENT_CONTROL_PLANE_PUBLIC_KEYS_FILE: ${{ secrets.CODE_AGENT_CONTROL_PLANE_PUBLIC_KEYS_FILE }}
          REQUIRE_NOTARIZATION: '1'
        # Run the release chain WITHOUT the trailing tauri-clean-bundle-apps.sh: that cleanup
        # removes bundle/macos/Agent Neo.app, but the subsequent "Repack updater archive" step
        # needs the .app to rebuild a clean (no-AppleDouble) updater tarball. Cleanup is a local
        # convenience and is unnecessary on an ephemeral CI runner.
        run: |
          npm run rebuild-native:system
          npm run build
          npm run tauri:prebuild-cleanup
          npm run release:security-scan
          bash scripts/tauri-release-bundle.sh
          npm run release:notarize-macos
          npm run release:verify-macos

      - name: Smoke-probe renderer startup (block publish on ErrorBoundary crash)
        # typecheck/vitest 全过 ≠ renderer 真能 mount。v0.16.89 公证全过、装机却 ErrorBoundary
        # 崩（命令重复注册），烧掉一轮 ~25min 公证才在装机时暴露。本 step 用 runner 预装的
        # Google Chrome + playwright-core headless 启动已构建的 webServer 首页，渲染出"出错了"
        # 或主壳未挂载就 fail —— 让 CI 绿真正等于"可装"，崩的版本绝不会被上传 OSS / 发 Release。
        # 放在公证之后、上传之前：拦住坏版本发布；后续可前移到 cargo build 之前以省公证时间。
        run: node scripts/release-renderer-probe.mjs 8182

      # 重打 .app.tar.gz：
      # 1) tauri-bundler 在 nested 签名前已先打过一份 tar.gz（stale）
      # 2) BSD tar 默认含 ._AppleDouble metadata，Tauri updater unpack 时
      #    `iter().skip(1)` 把它当顶层 .app 处理 → Operation not permitted
      # 用 COPYFILE_DISABLE=1 + 全 nested 签名 + stapled 的 .app 重新打包。
      - name: Repack updater archive (clean AppleDouble + post-notarize state)
        working-directory: src-tauri/target/release/bundle/macos
        run: |
          rm -f "Agent Neo.app.tar.gz" "Agent Neo.app.tar.gz.sig"
          COPYFILE_DISABLE=1 tar -czf "Agent Neo.app.tar.gz" "Agent Neo.app"
          ls -la "Agent Neo.app.tar.gz"
          # verify no AppleDouble dotfiles
          if tar -tzf "Agent Neo.app.tar.gz" | grep -qE '(^|/)\._'; then
            echo "[FAIL] tar still contains AppleDouble (._) entries" >&2
            tar -tzf "Agent Neo.app.tar.gz" | grep -E '(^|/)\._' >&2
            exit 1
          fi

      - name: Re-sign repacked tar.gz with Tauri updater key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # cargo tauri signer sign 跟 env TAURI_SIGNING_PRIVATE_KEY 互斥，必须 unset
          unset TAURI_SIGNING_PRIVATE_KEY
          # 把 secret 写到临时文件传 --private-key-path
          PRIV_KEY_PATH="${RUNNER_TEMP}/tauri-updater.key"
          # printf (not echo): echo appends a trailing newline that makes `cargo tauri signer
          # sign` fail to base64-decode the key ("Invalid symbol 10").
          printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "${PRIV_KEY_PATH}"
          chmod 600 "${PRIV_KEY_PATH}"
          cargo tauri signer sign \
            --private-key-path "${PRIV_KEY_PATH}" \
            "src-tauri/target/release/bundle/macos/Agent Neo.app.tar.gz"
          rm -f "${PRIV_KEY_PATH}"

      - name: Install ossutil (Aliyun OSS CLI)
        run: |
          curl -sL -o /tmp/ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-mac-arm64.zip"
          unzip -o /tmp/ossutil.zip -d /tmp/ossutil
          sudo mv /tmp/ossutil/ossutil-*/ossutil /usr/local/bin/ossutil
          chmod +x /usr/local/bin/ossutil
          ossutil version

      - name: Upload tar.gz + sig to Aliyun OSS (Shanghai)
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          cat > ~/.ossutilconfig <<EOF
          [default]
          accessKeyID=${ALIYUN_OSS_ACCESS_KEY_ID}
          accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET}
          region=${ALIYUN_OSS_REGION}
          endpoint=oss-${ALIYUN_OSS_REGION}.aliyuncs.com
          EOF
          chmod 600 ~/.ossutilconfig

          VERSION="${GITHUB_REF_NAME#v}"
          ossutil cp -f "src-tauri/target/release/bundle/macos/Agent Neo.app.tar.gz" \
            "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/Agent.Neo.app.tar.gz"
          ossutil cp -f "src-tauri/target/release/bundle/macos/Agent Neo.app.tar.gz.sig" \
            "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/Agent.Neo.app.tar.gz.sig"

      - name: Generate updater manifest (points to OSS)
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          # latest.json url 走 OSS（国内秒下），不走 GitHub release（国内 9 KB/s）
          ARTIFACT_BASE_URL="https://${ALIYUN_OSS_BUCKET}.oss-${ALIYUN_OSS_REGION}.aliyuncs.com/${GITHUB_REF_NAME}"
          npm run tauri:update-manifest -- --base-url "${ARTIFACT_BASE_URL}"
          # manifest 默认 url-encode 空格 (Agent%20Neo)，但我们 OSS key 用点号
          # (Agent.Neo)，所以 fix 一下避免 404
          sed -i '' 's|/Agent%20Neo.app.tar.gz|/Agent.Neo.app.tar.gz|g' \
            src-tauri/target/release/bundle/latest.json
          cat src-tauri/target/release/bundle/latest.json | head -20

      - name: Build and upload runtime assets
        # Skip unless a control-plane signing key is provisioned: build-runtime-assets.mjs
        # now signs the runtime manifest (C1) and fails closed without a key. Managed
        # runtime-asset publishing stays off until that key is added as a repo secret.
        if: ${{ env.CODE_AGENT_CONTROL_PLANE_PRIVATE_KEY != '' }}
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_BASE_URL="https://${ALIYUN_OSS_BUCKET}.oss-${ALIYUN_OSS_REGION}.aliyuncs.com/${GITHUB_REF_NAME}"
          RUNTIME_ASSETS_DIR="src-tauri/target/release/runtime-assets"
          MANIFEST_NAME="runtime-assets-manifest-darwin-arm64.json"
          MANIFEST_PATH="${RUNTIME_ASSETS_DIR}/${MANIFEST_NAME}"
          SHA_PATH="${RUNTIME_ASSETS_DIR}/runtime-assets-manifest-darwin-arm64.sha256"

          rm -rf "${RUNTIME_ASSETS_DIR}"
          npm run release:runtime-assets -- \
            --output-dir "${RUNTIME_ASSETS_DIR}" \
            --flat-output \
            --manifest-name "${MANIFEST_NAME}" \
            --archive-base-url "${ARTIFACT_BASE_URL}/runtime-assets/"

          shasum -a 256 "${MANIFEST_PATH}" | awk '{print $1}' > "${SHA_PATH}"
          cat "${SHA_PATH}"

          ossutil cp -f "${MANIFEST_PATH}" \
            "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/runtime-assets/${MANIFEST_NAME}"
          ossutil cp -f "${SHA_PATH}" \
            "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/runtime-assets/$(basename "${SHA_PATH}")"
          for archive in "${RUNTIME_ASSETS_DIR}"/*.tar.gz; do
            ossutil cp -f "${archive}" \
              "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/runtime-assets/$(basename "${archive}")"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/runtime-assets/*.json
            src-tauri/target/release/runtime-assets/*.sha256
            src-tauri/target/release/runtime-assets/*.tar.gz
          generate_release_notes: true
          draft: false
          # Tags with a pre-release suffix (e.g. v0.16.80-citest1) are marked prerelease and
          # never become "latest", so a CI smoke/test tag cannot steal the distribution
          # download from the real latest release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dmg to Aliyun OSS (versioned)
        # dmg 此前只进 GitHub Release；私有仓库匿名下不了，in-app updater 需从 OSS 取，故也传一份。
        # ~/.ossutilconfig 由前面 "Upload tar.gz + sig to OSS" 步骤写好，同 job 持久，无需重写。
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_SRC="$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)"
          ossutil cp -f "${DMG_SRC}" \
            "oss://${ALIYUN_OSS_BUCKET}/v${VERSION}/Agent-Neo-${VERSION}-arm64.dmg"

      - name: Promote to stable channel (latest.json + release.json)
        # 提升 stable = 把全体用户推到新版（Tauri updater 端点读 stable/latest.json；
        # in-app updater 经 Vercel updateMetadata 读 stable/release.json）。
        # 仅对正式 tag（无 - 后缀）执行；预发布 tag（如 v0.16.x-citest1）不碰全员分发——
        # 与上面 make_latest/prerelease 同一道闸，替代历来手动 bump OSS stable 的人工确认。
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Tauri 内置 updater：把已指向 OSS v<ver> 的 manifest 提升为 stable
          ossutil cp -f src-tauri/target/release/bundle/latest.json \
            "oss://${ALIYUN_OSS_BUCKET}/stable/latest.json"
          # in-app updater：生成 GitHub-release 形状（dmg 指向 OSS）并提升为 stable
          DMG_URL="https://${ALIYUN_OSS_BUCKET}.oss-${ALIYUN_OSS_REGION}.aliyuncs.com/v${VERSION}/Agent-Neo-${VERSION}-arm64.dmg"
          node scripts/build-stable-release-json.mjs \
            --version "${VERSION}" \
            --tag "${GITHUB_REF_NAME}" \
            --dmg-url "${DMG_URL}" \
            --html-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --output "${RUNNER_TEMP}/stable-release.json"
          ossutil cp -f "${RUNNER_TEMP}/stable-release.json" \
            "oss://${ALIYUN_OSS_BUCKET}/stable/release.json"

      - name: Publish optional update metadata to Cloud API
        env:
          CLOUD_API_URL: ${{ secrets.CLOUD_API_URL }}
          CI_PUBLISH_TOKEN: ${{ secrets.CI_PUBLISH_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ -z "${CLOUD_API_URL}" || -z "${CI_PUBLISH_TOKEN}" ]]; then
            echo "Cloud update publish skipped: CLOUD_API_URL or CI_PUBLISH_TOKEN is not set"
            exit 0
          fi

          export VERSION="${TAG#v}"
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('src-tauri/target/release/bundle/latest.json', 'utf8'));
          const payload = {
            version: process.env.VERSION,
            platform: 'darwin',
            downloadUrl: `https://github.com/${process.env.REPO}/releases/tag/${process.env.TAG}`,
            releaseNotes: manifest.notes,
          };
          fs.writeFileSync('/tmp/code-agent-update-payload.json', JSON.stringify(payload));
          NODE

          curl --fail-with-body -X POST "${CLOUD_API_URL%/}/api/update/publish" \
            -H "Authorization: Bearer ${CI_PUBLISH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/code-agent-update-payload.json
