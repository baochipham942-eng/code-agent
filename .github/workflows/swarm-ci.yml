name: Swarm CI (ADR-010 #1)

# ADR-010 #1: Swarm CI 稳定证据
#
# 分层策略：
#   - smoke (<30s):  unit + integration，每个 PR 都跑
#   - full  (~60s):  smoke + Playwright e2e（含 webServer 构建），merge gate
#
# 其他约束：
#   - flake 重试上限 1 次（vitest --retry=1 / playwright retries=1 via CI env）
#   - 失败时上传截图 + Playwright trace / html report
#   - push 到 main 后写回 ci/swarm-health.json（连续通过计数）

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'vercel-api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tests/e2e/playwright.e2e.config.ts'
      - '.github/workflows/release.yml'
      - '.github/workflows/renderer-bundle.yml'
      - '.github/workflows/swarm-ci.yml'
      - '.github/workflows/vercel-control-plane.yml'
      - 'scripts/ci/**'
      - 'scripts/console-scan.mjs'
      - 'scripts/a11y-scan.mjs'
      - 'scripts/stale-dist-scan.mjs'
      - 'scripts/check-design-system.mjs'
      - 'scripts/design-system-baseline.json'
      - 'scripts/design-system-zindex-allowlist.json'
      - 'scripts/build-renderer-bundle.mjs'
      - 'scripts/control-plane-*.mjs'
      - 'scripts/generate-control-plane-env.mjs'
      - 'scripts/renderer-*.mjs'
      - 'scripts/verify-github-workflow-run.mjs'
      - 'scripts/verify-renderer-bundle-publish.mjs'
      - 'scripts/verify-renderer-hot-update-production.mjs'
      - 'scripts/verify-renderer-hot-update-release-gate.mjs'
      - 'scripts/verify-runtime-assets-publish.mjs'
      - 'supabase/migrations/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: swarm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Smoke: 每个 PR 必跑，目标 <30s
  # ---------------------------------------------------------------------------
  smoke:
    name: Swarm smoke (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828：lockfile 在 macOS 上生成，只记录了 darwin-arm64 的 rollup
        # native binary。先 npm ci 用 lockfile 装其他依赖，再单独装缺失的 linux
        # platform binary。--no-save --no-package-lock 确保 lockfile 不被改。
        run: |
          npm ci --ignore-scripts
          npm install --no-save --no-package-lock --ignore-scripts @rollup/rollup-linux-x64-gnu

      - name: Install better-sqlite3 native binding
        # --ignore-scripts 跳过了 better-sqlite3 的 install hook (prebuild-install)，
        # CI 上 Database 初始化会因找不到 .node 文件 fallback 到 in-memory，
        # 导致 swarm-trace / pending_approvals 持久化路径在 CI 测的不是真实路径。
        # 用 prebuild-install 从 GitHub release 下当前 Node ABI（node24 = NODE_MODULE_VERSION 137）
        # 的 linux x64 预编译 binary，跳过 node-gyp 编译链路。prebuild-install 按运行时 Node 自动
        # 探测 ABI、不写死版本——若 better-sqlite3 该版本未提供 node24 预编译，此处会拉取失败（|| true
        # 静默 fallback 到 in-memory），真实编译验证由下方 full job 的 --build-from-source 兜底。
        working-directory: node_modules/better-sqlite3
        run: ../.bin/prebuild-install || true

      - name: Typecheck Vercel control-plane
        # vercel-api 是独立 package，不属于 root npm workspace；root npm ci 不会装它自己的依赖。
        # 当前 renderer hot-update 的生产门正卡在 control-plane artifact，PR 阶段必须独立编译这层。
        run: |
          npm ci --prefix vercel-api --ignore-scripts
          npm --prefix vercel-api run typecheck

      - name: Static gates (console / a11y / stale-dist / design-system)
        # 四个轻量静态门（纯 node 脚本，无额外依赖，秒级），fast-fail 在跑测试套件之前：
        #   console-scan:         限制裸 console.log/debug 蔓延（基线棘轮 318）
        #   a11y-scan:            轻量可访问性规则（基线棘轮 48）
        #   stale-dist-scan:      禁止构建产物入库
        #   check-design-system:  设计系统棘轮门（此前只有 vitest 版且未进任何 CI 套件，
        #                         bare-button 在 main 上静默漂移 736→758 后接入，基线已如实重置）
        # 均为 hard gate（接入前已确认当前 main 绿、只对"超基线/新增"才红）。
        run: |
          node scripts/console-scan.mjs
          node scripts/a11y-scan.mjs
          node scripts/stale-dist-scan.mjs
          node scripts/check-design-system.mjs

      - name: Lint (non-blocking trend)
        # lint 基线当前为红（46 errors + 1620 warnings 的历史债），直接 hard-gate 会卡死所有 PR。
        # 先以 continue-on-error 接入、累计趋势；待历史 error 清零后去掉 continue-on-error 翻成 hard gate。
        continue-on-error: true
        run: npm run lint

      - name: Run swarm smoke suite
        run: npm run test:swarm:smoke -- --retry=1

      - name: Upload smoke failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-smoke-logs-${{ github.run_id }}
          path: |
            coverage/
            **/vitest-report*.json
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Full: merge gate，smoke + Playwright e2e（含 webServer 构建）
  # ---------------------------------------------------------------------------
  full:
    name: Swarm full (smoke + e2e)
    needs: smoke
    # full/e2e 现在 PR 也跑（删掉了原来限定 push/workflow_dispatch 的 if）：merge gate 只在合并后
    # 才跑会造成"PR 绿、main 红"——只在 full 暴露的基建缺陷（如 e2e webServer 的原生模块缺失）在
    # PR 阶段测不到，合进 main 必红（见 #166）。on.pull_request.paths 已把触发限定在 src/** /
    # tests/** 等代码 PR，docs-only PR 不会触发整条 workflow，CI 成本可控；workflow_dispatch 仍可
    # 手动跑。full 仍受 `needs: smoke` 门控——smoke 失败则跳过。
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        # 同 smoke job：lockfile 严格 + 单独 patch 缺失的 linux platform binary
        run: |
          npm ci --ignore-scripts
          npm install --no-save --no-package-lock --ignore-scripts @rollup/rollup-linux-x64-gnu

      - name: Install better-sqlite3 native binding
        # npm ci --ignore-scripts 跳过了 postinstall(rebuild-native:system)，dist/native/ 不会生成，
        # nativeLoader 最终 fallback 到 require('better-sqlite3') 命中 build/Release。原来的
        # `prebuild-install || true` 一旦拉不到预编译就吞错，build/Release 为空 → e2e webServer 的
        # DatabaseService 初始化失败（Could not locate the bindings file）→ 依赖持久化的 swarm-chain
        # e2e 断言 element not found。改成：拉不到预编译就从源码编译，并断言产物存在（fail-loud）。
        run: |
          (cd node_modules/better-sqlite3 && ../.bin/prebuild-install) || npm rebuild better-sqlite3 --build-from-source
          test -f node_modules/better-sqlite3/build/Release/better_sqlite3.node

      - name: Build node-pty native binding
        # main 的 full job 一直缺这步：npm ci --ignore-scripts 跳过了 node-pty 的 install 脚本，
        # 而 node-pty 1.1.0 只带 darwin / win32 prebuild、不带 linux-x64，e2e webServer 启动时
        # loadNativeModule('pty') 在 build/Release → prebuilds/linux-x64 都找不到 pty.node 直接崩
        # （exit 1），导致每次 push main 的 full job 必红（PR 只跑 smoke 不起 webServer 所以看不出）。
        # 这里现场编译并断言产物存在，让失败暴露在本步而非拖到 webServer 启动。
        run: |
          npm rebuild node-pty --build-from-source
          test -f node_modules/node-pty/build/Release/pty.node

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npm run test:swarm:smoke -- --retry=1

      - name: Run swarm e2e suite
        env:
          CODE_AGENT_E2E: '1'
          CI: '1'
        run: npm run test:swarm:e2e

      - name: Record result (success)
        if: success()
        id: result
        run: echo "status=pass" >> "$GITHUB_OUTPUT"

      - name: Record result (failure)
        if: failure()
        id: result_fail
        run: echo "status=fail" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-e2e-trace-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

  # 不再写回 ci/swarm-health.json：streak 直接从 GitHub Actions API 派生，
  # 用 scripts/ci/swarm-streak.sh 按需查询，避免 [skip ci] commit + 1-commit
  # lag 的 trade-off。详见 docs/decisions/010-swarm-road-to-10.md #1。
