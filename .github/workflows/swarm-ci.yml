name: Swarm CI (ADR-010 #1)

# ADR-010 #1: Swarm CI 稳定证据
#
# 分层策略：
#   - smoke (<30s):  unit + integration，每个 PR 都跑
#   - full  (~60s):  smoke + Playwright e2e（含 webServer 构建），merge gate
#
# 其他约束：
#   - flake 重试上限 1 次（vitest --retry=1 / playwright retries=1 via CI env）
#   - 失败时上传截图 + Playwright trace / html report
#   - push 到 main 后写回 ci/swarm-health.json（连续通过计数）

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tests/e2e/playwright.e2e.config.ts'
      - '.github/workflows/swarm-ci.yml'
      - 'scripts/ci/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: swarm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Smoke: 每个 PR 必跑，目标 <30s
  # ---------------------------------------------------------------------------
  smoke:
    name: Swarm smoke (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828：lockfile 在 macOS 上生成，只记录了 darwin-arm64 的 rollup
        # native binary。先 npm ci 用 lockfile 装其他依赖，再单独装缺失的 linux
        # platform binary。--no-save --no-package-lock 确保 lockfile 不被改。
        run: |
          npm ci --ignore-scripts
          npm install --no-save --no-package-lock --ignore-scripts @rollup/rollup-linux-x64-gnu

      - name: Install better-sqlite3 native binding
        # --ignore-scripts 跳过了 better-sqlite3 的 install hook (prebuild-install)，
        # CI 上 Database 初始化会因找不到 .node 文件 fallback 到 in-memory，
        # 导致 swarm-trace / pending_approvals 持久化路径在 CI 测的不是真实路径。
        # 用 prebuild-install 从 GitHub release 下 Node 20 ABI (NODE_MODULE_VERSION 115)
        # 的 linux x64 预编译 binary，跳过 node-gyp 编译链路。
        working-directory: node_modules/better-sqlite3
        run: ../.bin/prebuild-install || true

      - name: Run swarm smoke suite
        run: npm run test:swarm:smoke -- --retry=1

      - name: Upload smoke failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-smoke-logs-${{ github.run_id }}
          path: |
            coverage/
            **/vitest-report*.json
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Full: merge gate，smoke + Playwright e2e（含 webServer 构建）
  # ---------------------------------------------------------------------------
  full:
    name: Swarm full (smoke + e2e)
    needs: smoke
    # 只在 push 到 main 或显式调度时跑完整套件，
    # PR 默认只跑 smoke 以控制 CI 成本。
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # 同 smoke job：lockfile 严格 + 单独 patch 缺失的 linux platform binary
        run: |
          npm ci --ignore-scripts
          npm install --no-save --no-package-lock --ignore-scripts @rollup/rollup-linux-x64-gnu

      - name: Install better-sqlite3 native binding
        # npm ci --ignore-scripts 跳过了 postinstall(rebuild-native:system)，dist/native/ 不会生成，
        # nativeLoader 最终 fallback 到 require('better-sqlite3') 命中 build/Release。原来的
        # `prebuild-install || true` 一旦拉不到预编译就吞错，build/Release 为空 → e2e webServer 的
        # DatabaseService 初始化失败（Could not locate the bindings file）→ 依赖持久化的 swarm-chain
        # e2e 断言 element not found。改成：拉不到预编译就从源码编译，并断言产物存在（fail-loud）。
        run: |
          (cd node_modules/better-sqlite3 && ../.bin/prebuild-install) || npm rebuild better-sqlite3 --build-from-source
          test -f node_modules/better-sqlite3/build/Release/better_sqlite3.node

      - name: Build node-pty native binding
        # main 的 full job 一直缺这步：npm ci --ignore-scripts 跳过了 node-pty 的 install 脚本，
        # 而 node-pty 1.1.0 只带 darwin / win32 prebuild、不带 linux-x64，e2e webServer 启动时
        # loadNativeModule('pty') 在 build/Release → prebuilds/linux-x64 都找不到 pty.node 直接崩
        # （exit 1），导致每次 push main 的 full job 必红（PR 只跑 smoke 不起 webServer 所以看不出）。
        # 这里现场编译并断言产物存在，让失败暴露在本步而非拖到 webServer 启动。
        run: |
          npm rebuild node-pty --build-from-source
          test -f node_modules/node-pty/build/Release/pty.node

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npm run test:swarm:smoke -- --retry=1

      - name: Run swarm e2e suite
        env:
          CODE_AGENT_E2E: '1'
          CI: '1'
        run: npm run test:swarm:e2e

      - name: Record result (success)
        if: success()
        id: result
        run: echo "status=pass" >> "$GITHUB_OUTPUT"

      - name: Record result (failure)
        if: failure()
        id: result_fail
        run: echo "status=fail" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-e2e-trace-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

  # 不再写回 ci/swarm-health.json：streak 直接从 GitHub Actions API 派生，
  # 用 scripts/ci/swarm-streak.sh 按需查询，避免 [skip ci] commit + 1-commit
  # lag 的 trade-off。详见 docs/decisions/010-swarm-road-to-10.md #1。
