  <text x="210" y="270" text-anchor="middle" fill="#fca5a5" font-size="11">77 files · fan-out: highest</text>
  <text x="210" y="285" text-anchor="middle" fill="#fca5a5" font-size="10">agentLoop · contextAssembly</text>

  <!-- tools -->
