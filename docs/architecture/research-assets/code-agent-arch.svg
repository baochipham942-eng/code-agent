  <path d="M420,710 L960,710" fill="none" stroke="#d6d3d1" stroke-width="1" opacity="0.3" marker-end="url(#arrow)"/>

  <!-- ==================== CIRCULAR DEPENDENCY CALLOUT ==================== -->
  <rect x="55" y="785" width="500" height="80" rx="8" fill="#451a03" opacity="0.7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="75" y="808" fill="#f59e0b" font-size="13" font-weight="700">⚠ 4 条循环依赖（集中在并行 Agent 调度）</text>
  <text x="75" y="828" fill="#fcd34d" font-size="11">agentDefinition → hybrid/agentSwarm → swarm.ipc → parallelCoordinator → subagentExecutor</text>
  <text x="75" y="848" fill="#fde68a" font-size="10" opacity="0.8">agent ↔ tools 双向调用 (26+29=55 条) 也需关注</text>

