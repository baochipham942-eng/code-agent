  <text x="510" y="555" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">lightMemory</text>
  <text x="510" y="573" text-anchor="middle" fill="#ddd6fe" font-size="11">7 files</text>

  <!-- telemetry -->
  <rect x="630" y="530" width="120" height="55" rx="10" fill="#64748b" opacity="0.6" filter="url(#shadow)"/>
  <text x="690" y="555" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">telemetry</text>
  <text x="690" y="573" text-anchor="middle" fill="#cbd5e1" font-size="11">7 files</text>

