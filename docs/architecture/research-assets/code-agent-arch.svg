  <!-- agent -> context: 30 -->
  <path d="M300,257 L830,257" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.45" marker-end="url(#arrow)"/>

  <!-- tools -> agent: 29 (CYCLE part) -->
  <path d="M390,280 C350,310 300,310 280,295" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" marker-end="url(#arrow-cycle)" stroke-dasharray="6,3"/>

