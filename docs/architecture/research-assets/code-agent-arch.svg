  <rect x="830" y="220" width="150" height="75" rx="12" fill="#eab308" opacity="0.8" filter="url(#shadow)"/>
  <text x="905" y="250" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">context</text>
  <text x="905" y="270" text-anchor="middle" fill="#fef08a" font-size="11">33 files</text>
  <text x="905" y="285" text-anchor="middle" fill="#fef08a" font-size="10">tokenEstimator · compression</text>

  <!-- prompts -->
  <rect x="1040" y="220" width="120" height="65" rx="10" fill="#ec4899" opacity="0.7" filter="url(#shadow)"/>
  <text x="1100" y="248" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">prompts</text>
  <text x="1100" y="265" text-anchor="middle" fill="#fbcfe8" font-size="11">31 files</text>

