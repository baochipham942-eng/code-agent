  <rect x="370" y="220" width="170" height="75" rx="12" fill="none" stroke="#67e8f9" stroke-width="2"/>
  <text x="455" y="250" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">tools</text>
  <text x="455" y="270" text-anchor="middle" fill="#a5f3fc" font-size="11">173 files · most modules</text>
  <text x="455" y="285" text-anchor="middle" fill="#a5f3fc" font-size="10">network · planning · multiagent</text>

  <!-- model -->
  <rect x="610" y="220" width="150" height="75" rx="12" fill="#22c55e" opacity="0.8" filter="url(#shadow)"/>
  <text x="685" y="250" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">model</text>
  <text x="685" y="270" text-anchor="middle" fill="#bbf7d0" font-size="11">34 files</text>
  <text x="685" y="285" text-anchor="middle" fill="#bbf7d0" font-size="10">modelRouter · providers</text>

