  <text x="345" y="467" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">planning</text>
  <text x="345" y="485" text-anchor="middle" fill="#fef08a" font-size="11">16 files</text>

  <!-- hooks -->
  <rect x="460" y="440" width="120" height="60" rx="10" fill="#f97316" opacity="0.6" filter="url(#shadow)"/>
  <text x="520" y="467" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">hooks</text>
  <text x="520" y="485" text-anchor="middle" fill="#fed7aa" font-size="11">14 files</text>

