  <rect x="800" y="530" width="100" height="55" rx="10" fill="#64748b" opacity="0.5" filter="url(#shadow)"/>
  <text x="850" y="555" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">lsp</text>
  <text x="850" y="573" text-anchor="middle" fill="#cbd5e1" font-size="11">2 files</text>

