  <text x="1040" y="485" text-anchor="middle" fill="#cbd5e1" font-size="11">3 files</text>

  <!-- scheduler -->
  <rect x="100" y="530" width="120" height="55" rx="10" fill="#f59e0b" opacity="0.6" filter="url(#shadow)"/>
  <text x="160" y="555" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">scheduler</text>
  <text x="160" y="573" text-anchor="middle" fill="#fde68a" font-size="11">4 files</text>

