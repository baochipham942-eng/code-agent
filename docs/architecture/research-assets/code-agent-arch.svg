<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#475569"/>
    </marker>
    <marker id="arrow-heavy" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <path d="M0,0 L8,2.5 L0,5" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cycle" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Code Agent — 模块依赖架构图</text>
  <text x="600" y="60" text-anchor="middle" fill="#64748b" font-size="12">706 modules · 2076 edges · madge scan 2026-04-12</text>

  <!-- Layer labels -->
  <text x="28" y="110" fill="#475569" font-size="11" font-weight="600" transform="rotate(-90,28,110)" text-anchor="end">INTERFACE</text>
  <text x="28" y="340" fill="#475569" font-size="11" font-weight="600" transform="rotate(-90,28,340)" text-anchor="end">CORE</text>
  <text x="28" y="570" fill="#475569" font-size="11" font-weight="600" transform="rotate(-90,28,570)" text-anchor="end">SUPPORT</text>
  <text x="28" y="770" fill="#475569" font-size="11" font-weight="600" transform="rotate(-90,28,770)" text-anchor="end">INFRA</text>

  <!-- Layer dividers -->
  <line x1="45" y1="165" x2="1170" y2="165" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="45" y1="400" x2="1170" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="45" y1="630" x2="1170" y2="630" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ==================== INTERFACE LAYER ==================== -->

  <!-- ipc -->
  <rect x="200" y="85" width="140" height="60" rx="10" fill="#7c3aed" opacity="0.85" filter="url(#shadow)"/>
  <text x="270" y="112" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">ipc</text>
  <text x="270" y="130" text-anchor="middle" fill="#c4b5fd" font-size="11">40 files</text>

  <!-- app -->
  <rect x="400" y="85" width="120" height="60" rx="10" fill="#7c3aed" opacity="0.65" filter="url(#shadow)"/>
  <text x="460" y="112" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">app</text>
  <text x="460" y="130" text-anchor="middle" fill="#c4b5fd" font-size="11">7 files</text>

  <!-- channels -->
  <rect x="580" y="85" width="120" height="60" rx="10" fill="#7c3aed" opacity="0.55" filter="url(#shadow)"/>
  <text x="640" y="112" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">channels</text>
  <text x="640" y="130" text-anchor="middle" fill="#c4b5fd" font-size="11">9 files</text>

