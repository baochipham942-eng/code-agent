  <rect x="200" y="670" width="220" height="75" rx="12" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
  <text x="310" y="698" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">services</text>
  <text x="310" y="718" text-anchor="middle" fill="#bfdbfe" font-size="12">70 files · fan-in: 408</text>
  <text x="310" y="733" text-anchor="middle" fill="#bfdbfe" font-size="10">logger(306引用) · database · registry</text>

  <!-- shared -->
  <rect x="490" y="670" width="180" height="75" rx="12" fill="#84cc16" opacity="0.8" filter="url(#shadow)"/>
