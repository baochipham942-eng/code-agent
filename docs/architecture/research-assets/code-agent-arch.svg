  <text x="580" y="718" text-anchor="middle" fill="#d9f99d" font-size="12">33 files · fan-in: 185</text>
  <text x="580" y="733" text-anchor="middle" fill="#d9f99d" font-size="10">constants · ipc · utils</text>

