<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:Arial,Helvetica,sans-serif}
#game-wrapper{display:flex;justify-content:center;align-items:center;width:100%;height:100%}
canvas#game{max-width:100%;aspect-ratio:16/9;height:auto;background:#111;display:block}
#hud{position:absolute;top:12px;left:16px;color:#fff;font-size:16px;line-height:1.7;z-index:10;pointer-events:none}
#hud span{display:block}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.78);z-index:100;color:#fff;text-align:center}
.overlay h1{font-size:48px;letter-spacing:4px;margin-bottom:18px;text-transform:uppercase}
.overlay p{font-size:18px;margin:6px 0;opacity:0.85}
.overlay .hint{font-size:22px;margin-top:24px;opacity:1;animation:pulse 1.6s ease-in-out infinite}
#title-screen{display:flex}
#game-over-screen{display:none}
#victory-screen{display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="960" height="540"></canvas>
</div>

<div id="hud">
  <span id="hud-score">Score: 0</span>
  <span id="hud-lives">Lives: 3</span>
  <span id="hud-level">Level: 1</span>
  <span id="hud-ability">Ability: —</span>
</div>

<div id="title-screen" class="overlay">
  <h1>Stickman Platformer</h1>
  <p>← → Move &nbsp;|&nbsp; Space / ↑ Jump &nbsp;|&nbsp; R Restart</p>
  <p class="hint">press SPACE to start</p>
</div>

<div id="game-over-screen" class="overlay">
  <h1>You Died</h1>
  <p class="hint">press R to retry</p>
</div>

<div id="victory-screen" class="overlay">
  <h1>Victory</h1>
  <p>you cleared 3 levels</p>
</div>
<script>
class Player {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.width = 20;
    this.height = 40;
    this.abilities = { doubleJump: false };
    this.jumpsRemaining = 1;
    this.grounded = false;
    this.coyoteTimer = 0;
    this.jumpBufferTimer = 0;
    this.alive = true;
    this.score = 0;
    this.lives = 3;
    this.animTime = 0;
  }

  update(dt, input, level) {
    if (!this.alive) return;
    const accel = 800;
    const friction = 0.85;
    const gravity = 2000;
    const coyoteTime = 0.1;
    const jumpBufferTime = 0.1;

    if (input.left) this.vx -= accel * dt;
    else if (input.right) this.vx += accel * dt;
    else this.vx *= friction;

    this.vy += gravity * dt;
    if (this.vy > 1200) this.vy = 1200;

    if (this.grounded) this.coyoteTimer = coyoteTime;
    else this.coyoteTimer -= dt;

    if (input.jumpPressed) this.jumpBufferTimer = jumpBufferTime;
    else this.jumpBufferTimer -= dt;

    if (this.jumpBufferTimer > 0 && this.coyoteTimer > 0) {
      this.jump();
      this.jumpBufferTimer = 0;
      this.coyoteTimer = 0;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.grounded = false;

    for (const p of level.platforms) {
      if (
        this.x + this.width > p.x &&
        this.x < p.x + p.w &&
        this.y + this.height > p.y &&
        this.y < p.y + p.h
      ) {
        const overlapLeft = this.x + this.width - p.x;
        const overlapRight = p.x + p.w - this.x;
        const overlapTop = this.y + this.height - p.y;
        const overlapBottom = p.y + p.h - this.y;
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if (minOverlap === overlapTop && this.vy >= 0) {
          this.y = p.y - this.height;
          this.vy = 0;
          this.grounded = true;
          this.jumpsRemaining = this.abilities.doubleJump ? 2 : 1;
        } else if (minOverlap === overlapBottom && this.vy < 0) {
          this.y = p.y + p.h;
          this.vy = 0;
        } else if (minOverlap === overlapLeft) {
          this.x = p.x - this.width;
          this.vx = 0;
        } else if (minOverlap === overlapRight) {
          this.x = p.x + p.w;
          this.vx = 0;
        }
      }
    }

    this.animTime += dt;
    if (this.y > 2000) this.takeDamage();
  }

  jump() {
    if (this.jumpsRemaining > 0) {
      this.vy = -650;
      this.jumpsRemaining--;
      this.grounded = false;
    } else if (this.abilities.doubleJump && !this.grounded && this.jumpsRemaining === 0) {
      this.vy = -650;
      this.jumpsRemaining = -1;
    }
  }

  tryStompOrCollideEnemy(enemy) {
    if (!enemy.alive || !this.alive) return null;
    const fromAbove = this.vy > 0 && this.y + this.height - this.vy * 0.016 < enemy.y + enemy.height * 0.4;
    if (fromAbove) {
      enemy.alive = false;
      this.vy = -400;
      this.score += 100;
      return { type: 'stomp', x: enemy.x, y: enemy.y };
    } else if (
      this.x + this.width > enemy.x &&
      this.x < enemy.x + enemy.width &&
      this.y + this.height > enemy.y &&
      this.y < enemy.y + enemy.height
    ) {
      this.takeDamage();
      return { type: 'hit', x: this.x, y: this.y };
    }
    return null;
  }

  tryBumpBlock(block) {
    if (block.used) return null;
    if (
      this.vy < 0 &&
      this.x + this.width > block.x &&
      this.x < block.x + block.size &&
      this.y < block.y + block.size &&
      this.y > block.y
    ) {
      block.used = true;
      this.vy = 0;
      this.abilities.doubleJump = true;
      this.jumpsRemaining = 2;
      return { type: 'bump', x: block.x + block.size / 2, y: block.y };
    }
    return null;
  }

  takeDamage() {
    this.lives--;
    if (this.lives <= 0) {
      this.alive = false;
    } else {
      this.vy = -500;
    }
  }

  render(ctx) {
    const cx = this.x + this.width / 2;
    const headY = this.y + 6;
    const bodyTop = this.y + 12;
    const bodyBot = this.y + 26;
    const moving = Math.abs(this.vx) > 50;
    const jumping = this.vy < 0;
    const swing = moving ? Math.sin(this.animTime * 10) * 0.5 : 0;
    const legSwing = moving ? Math.sin(this.animTime * 10) * 8 : 0;

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.arc(cx, headY, 6, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, bodyTop);
    ctx.lineTo(cx, bodyBot);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 4);
    ctx.lineTo(cx - 10, bodyTop + 14 + (moving ? swing * 8 : 0));
    ctx.moveTo(cx, bodyTop + 4);
    ctx.lineTo(cx + 10, bodyTop + 14 - (moving ? swing * 8 : 0));
    ctx.stroke();

    if (jumping) {
      ctx.beginPath();
      ctx.moveTo(cx, bodyBot);
      ctx.lineTo(cx - 8, bodyBot + 12);
      ctx.moveTo(cx, bodyBot);
      ctx.lineTo(cx + 8, bodyBot + 12);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx, bodyBot);
      ctx.lineTo(cx - 6 + legSwing, bodyBot + 14);
      ctx.moveTo(cx, bodyBot);
      ctx.lineTo(cx + 6 - legSwing, bodyBot + 14);
      ctx.stroke();
    }
  }
}

class Enemy {
  constructor(x, y, patrolMinX, patrolMaxX) {
    this.x = x;
    this.y = y;
    this.vx = 60;
    this.width = 24;
    this.height = 28;
    this.alive = true;
    this.patrolMinX = patrolMinX;
    this.patrolMaxX = patrolMaxX;
    this.animTime = 0;
  }

  update(dt) {
    if (!this.alive) return;
    this.x += this.vx * dt;
    if (this.x <= this.patrolMinX) { this.x = this.patrolMinX; this.vx = Math.abs(this.vx); }
    if (this.x + this.width >= this.patrolMaxX) { this.x = this.patrolMaxX - this.width; this.vx = -Math.abs(this.vx); }
    this.animTime += dt;
  }

  render(ctx) {
    if (!this.alive) return;
    const cx = this.x + this.width / 2;
    const headY = this.y + 5;
    const bodyTop = this.y + 10;
    const bodyBot = this.y + 20;
    const swing = Math.sin(this.animTime * 6) * 6;

    ctx.strokeStyle = '#c00';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.arc(cx, headY, 5, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, bodyTop);
    ctx.lineTo(cx, bodyBot);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 3);
    ctx.lineTo(cx - 8, bodyTop + 10 + swing);
    ctx.moveTo(cx, bodyTop + 3);
    ctx.lineTo(cx + 8, bodyTop + 10 - swing);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, bodyBot);
    ctx.lineTo(cx - 5 + swing, bodyBot + 8);
    ctx.moveTo(cx, bodyBot);
    ctx.lineTo(cx + 5 - swing, bodyBot + 8);
    ctx.stroke();
  }
}

class Block {
  constructor(x, y, size = 32) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.used = false;
  }

  render(ctx) {
    const s = this.size;
    if (!this.used) {
      ctx.fillStyle = '#daa520';
      ctx.fillRect(this.x, this.y, s, s);
      ctx.strokeStyle = '#b8860b';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.x, this.y, s, s);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', this.x + s / 2, this.y + s / 2);
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(this.x, this.y, s, s);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.x, this.y, s, s);
      ctx.fillStyle = '#aaa';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('U', this.x + s / 2, this.y + s / 2);
    }
  }
}

class Level {
  constructor(data) {
    this.bg = data.bg || '#87ceeb';
    this.platforms = data.platforms || [];
    this.enemies = (data.enemies || []).map(e => new Enemy(e.x, e.y, e.patrolMinX, e.patrolMaxX));
    this.blocks = (data.blocks || []).map(b => new Block(b.x, b.y, b.size));
    this.gate = data.gate || null;
    this.exit = data.exit || null;
    this.spawn = data.spawn || { x: 50, y: 300 };
    this.gateUnlocked = false;
  }

  render(ctx) {
    ctx.fillStyle = this.bg;
    ctx.fillRect(0, 0, 800, 600);

    ctx.fillStyle = '#654321';
    ctx.strokeStyle = '#432';
    ctx.lineWidth = 2;
    for (const p of this.platforms) {
      const r = 4;
      ctx.beginPath();
      ctx.moveTo(p.x + r, p.y);
      ctx.lineTo(p.x + p.w - r, p.y);
      ctx.quadraticCurveTo(p.x + p.w, p.y, p.x + p.w, p.y + r);
      ctx.lineTo(p.x + p.w, p.y + p.h - r);
      ctx.quadraticCurveTo(p.x + p.w, p.y + p.h, p.x + p.w - r, p.y + p.h);
      ctx.lineTo(p.x + r, p.y + p.h);
      ctx.quadraticCurveTo(p.x, p.y + p.h, p.x, p.y + p.h - r);
      ctx.lineTo(p.x, p.y + r);
      ctx.quadraticCurveTo(p.x, p.y, p.x + r, p.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    for (const b of this.blocks) b.render(ctx);

    if (this.gate) {
      if (!this.gateUnlocked) {
        ctx.fillStyle = '#b22';
        ctx.fillRect(this.gate.x, this.gate.y, this.gate.w, this.gate.h);
        ctx.strokeStyle = '#800';
        ctx.lineWidth = 3;
        ctx.strokeRect(this.gate.x, this.gate.y, this.gate.w, this.gate.h);
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🔒', this.gate.x + this.gate.w / 2, this.gate.y + this.gate.h / 2);
      } else {
        ctx.strokeStyle = '#0a0';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.gate.x, this.gate.y, this.gate.w, this.gate.h);
      }
    }

    if (this.exit) {
      ctx.fillStyle = '#0f0';
      ctx.globalAlpha = 0.3;
      ctx.fillRect(this.exit.x, this.exit.y, this.exit.w, this.exit.h);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#0a0';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.exit.x, this.exit.y, this.exit.w, this.exit.h);
    }
  }
}

class ParticleBurst {
  constructor(x, y, color) {
    this.particles = [];
    this.life = 0.6;
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
      const speed = 80 + Math.random() * 120;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        size: 2 + Math.random() * 3,
        color
      });
    }
  }

  update(dt) {
    this.life -= dt;
    for (const p of this.particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
    }
    return this.life > 0;
  }

  render(ctx) {
    const alpha = Math.max(0, this.life / 0.6);
    ctx.globalAlpha = alpha;
    for (const p of this.particles) {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

const LEVELS = [
  {
    background: '#2c5f2d',
    spawn: { x: 50, y: 350 },
    exit: { x: 750, y: 370 },
    platforms: [
      { x: 0, y: 400, w: 300, h: 20 },
      { x: 350, y: 400, w: 200, h: 20 },
      { x: 600, y: 400, w: 200, h: 20 }
    ],
    enemies: [
      { x: 200, y: 376, patrolLeft: 100, patrolRight: 280 },
      { x: 650, y: 376, patrolLeft: 610, patrolRight: 780 }
    ],
    blocks: [
      { x: 180, y: 300, type: 'question', reward: 'score' }
    ],
    gates: []
  },
  {
    background: '#4b3869',
    spawn: { x: 50, y: 350 },
    exit: { x: 700, y: 130 },
    platforms: [
      { x: 0, y: 400, w: 350, h: 20 },
      { x: 400, y: 400, w: 200, h: 20 },
      { x: 600, y: 170, w: 200, h: 20 },
      { x: 300, y: 280, w: 150, h: 20 }
    ],
    enemies: [
      { x: 450, y: 376, patrolLeft: 410, patrolRight: 580 }
    ],
    blocks: [
      { x: 340, y: 180, type: 'question', reward: 'doubleJump' }
    ],
    gates: [
      { x: 580, y: 320, w: 20, h: 80, requires: 'doubleJump' }
    ]
  },
  {
    background: '#4f86c6',
    spawn: { x: 50, y: 350 },
    exit: { x: 750, y: 100 },
    platforms: [
      { x: 0, y: 400, w: 200, h: 20 },
      { x: 250, y: 400, w: 150, h: 20 },
      { x: 450, y: 400, w: 100, h: 20 },
      { x: 600, y: 400, w: 200, h: 20 },
      { x: 300, y: 280, w: 120, h: 20 },
      { x: 500, y: 200, w: 100, h: 20 },
      { x: 650, y: 140, w: 150, h: 20 }
    ],
    enemies: [
      { x: 100, y: 376, patrolLeft: 10, patrolRight: 180 },
      { x: 290, y: 376, patrolLeft: 260, patrolRight: 380 },
      { x: 660, y: 376, patrolLeft: 610, patrolRight: 780 }
    ],
    blocks: [
      { x: 280, y: 180, type: 'question', reward: 'doubleJump' }
    ],
    gates: [
      { x: 580, y: 320, w: 20, h: 80, requires: 'doubleJump' }
    ]
  }
];

let currentLevelIndex = 0;
let level = null;
let player = null;
let enemies = [];
let blocks = [];
let particles = [];
let enemiesDefeated = 0;
let blocksUsed = 0;
let gatesUnlocked = 0;
let screen = 'title';
let lastTime = 0;

const keys = { left: false, right: false, jump: false, restart: false };
let jumpPressed = false;

const gameEl = document.getElementById('game');
const hudScore = document.getElementById('hud-score');
const hudLives = document.getElementById('hud-lives');
const hudLevel = document.getElementById('hud-level');
const hudAbility = document.getElementById('hud-ability');
const titleScreen = document.getElementById('title-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const victoryScreen = document.getElementById('victory-screen');

function showScreen(name) {
  screen = name;
  titleScreen.style.display = name === 'title' ? 'flex' : 'none';
  gameOverScreen.style.display = name === 'gameover' ? 'flex' : 'none';
  victoryScreen.style.display = name === 'victory' ? 'flex' : 'none';
  gameEl.style.display = name === 'play' ? 'block' : 'none';
}

function startLevel(idx) {
  currentLevelIndex = idx;
  const data = LEVELS[idx];
  level = new Level(data);
  player = new Player(data.spawn.x, data.spawn.y);
  player.abilities = player.abilities || {};
  enemies = data.enemies.map(e => new Enemy(e.x, e.y, e.patrolLeft, e.patrolRight));
  blocks = data.blocks.map(b => new Block(b.x, b.y, b.type, b.reward));
  particles = [];
  jumpPressed = false;
  showScreen('play');
  updateHUD();
}

function respawn() {
  const data = LEVELS[currentLevelIndex];
  player.x = data.spawn.x;
  player.y = data.spawn.y;
  player.vx = 0;
  player.vy = 0;
  player.alive = true;
  player.invincible = 60;
}

function advanceLevel() {
  if (currentLevelIndex + 1 < LEVELS.length) {
    const savedAbilities = { ...player.abilities };
    const savedLives = player.lives;
    startLevel(currentLevelIndex + 1);
    player.abilities = savedAbilities;
    player.lives = savedLives;
  } else {
    showScreen('victory');
  }
}

function restartGame() {
  currentLevelIndex = 0;
  enemiesDefeated = 0;
  blocksUsed = 0;
  gatesUnlocked = 0;
  startLevel(0);
  player.lives = 3;
  player.abilities = {};
}

function updateHUD() {
  hudScore.textContent = 'Score: ' + enemiesDefeated;
  hudLives.textContent = 'Lives: ' + (player ? player.lives : 3);
  hudLevel.textContent = 'Level: ' + (currentLevelIndex + 1);
  hudAbility.textContent = player && player.abilities.doubleJump ? 'Double Jump ✓' : '';
}

function spawnParticles(x, y, color) {
  particles.push(new ParticleBurst(x, y, color));
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update(dt) {
  if (screen !== 'play') return;

  // Player input
  player.vx = 0;
  if (keys.left) player.vx = -player.speed;
  if (keys.right) player.vx = player.speed;

  if (keys.jump && !jumpPressed) {
    player.jump();
    jumpPressed = true;
  }
  if (!keys.jump) jumpPressed = false;

  player.update(dt);

  // Enemies
  enemies.forEach(e => {
    if (e.alive) e.update(dt);
  });

  // Blocks
  blocks.forEach(b => b.update(dt));

  // Particles
  particles.forEach(p => p.update(dt));
  particles = particles.filter(p => p.alive);

  // Collision: player vs platforms
  const plats = level.platforms || [];
  plats.forEach(p => {
    const pb = { x: p.x, y: p.y, w: p.w, h: p.h };
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectOverlap(pr, pb)) {
      if (player.vy > 0 && player.y + player.h - player.vy * dt <= p.y + 4) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
        player.canDoubleJump = true;
      } else if (player.vy < 0 && player.y - player.vy * dt >= p.y + p.h - 4) {
        player.y = p.y + p.h;
        player.vy = 0;
      } else if (player.vx > 0) {
        player.x = p.x - player.w;
      } else if (player.vx < 0) {
        player.x = p.x + p.w;
      }
    }
  });

  // Collision: player vs enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    const er = { x: e.x, y: e.y, w: e.w, h: e.h };
    if (!rectOverlap(pr, er)) return;

    if (player.vy > 0 && player.y + player.h - 10 < e.y + e.h / 2) {
      e.alive = false;
      player.vy = -6;
      enemiesDefeated++;
      spawnParticles(e.x + e.w / 2, e.y, '#ff0');
      updateHUD();
    } else if (!player.invincible) {
      player.lives--;
      if (player.lives <= 0) {
        showScreen('gameover');
      } else {
        spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#f00');
        respawn();
      }
      updateHUD();
    }
  });

  // Collision: player vs blocks (bump from below)
  blocks.forEach(b => {
    if (b.used) return;
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    const br = { x: b.x, y: b.y, w: b.w, h: b.h };
    if (!rectOverlap(pr, br)) return;

    if (player.vy < 0 && player.y - player.vy * dt >= b.y + b.h - 4) {
      player.y = b.y + b.h;
      player.vy = 2;
      b.bump();
      blocksUsed++;
      if (b.reward === 'doubleJump') {
        player.abilities.doubleJump = true;
        spawnParticles(b.x + b.w / 2, b.y, '#0ff');
      } else {
        spawnParticles(b.x + b.w / 2, b.y, '#fa0');
      }
      updateHUD();
    }
  });

  // Collision: player vs gates
  const gates = level.gates || [];
  gates.forEach(g => {
    if (g.open) return;
    const gr = { x: g.x, y: g.y, w: g.w, h: g.h };
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectOverlap(pr, gr)) {
      if (g.requires === 'doubleJump' && player.abilities.doubleJump) {
        g.open = true;
        gatesUnlocked++;
        spawnParticles(g.x + g.w / 2, g.y + g.h / 2, '#0f0');
        updateHUD();
      } else {
        if (player.vx > 0) player.x = g.x - player.w;
        else if (player.vx < 0) player.x = g.x + g.w;
        else if (player.vy > 0) { player.y = g.y - player.h; player.vy = 0; player.grounded = true; }
        else if (player.vy < 0) { player.y = g.y + g.h; player.vy = 0; }
      }
    }
  });

  // Collision: player vs exit
  const exit = level.exit;
  if (exit) {
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    const er = { x: exit.x, y: exit.y, w: 30, h: 30 };
    if (rectOverlap(pr, er)) {
      advanceLevel();
    }
  }

  // Fall off screen
  if (player.y > 500) {
    player.lives--;
    if (player.lives <= 0) {
      showScreen('gameover');
    } else {
      respawn();
    }
    updateHUD();
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible--;
}

function render() {
  if (screen !== 'play') return;

  const ctx = gameEl.getContext ? gameEl.getContext('2d') : null;
  if (!ctx) return;

  const data = LEVELS[currentLevelIndex];
  ctx.fillStyle = data.background;
  ctx.fillRect(0, 0, 800, 450);

  // Platforms
  ctx.fillStyle = '#654321';
  const plats = level.platforms || [];
  plats.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  // Gates
  const gates = level.gates || [];
  gates.forEach(g => {
    if (g.open) return;
    ctx.fillStyle = '#888';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(g.x + 4, g.y + 4, g.w - 8, g.h - 8);
  });

  // Blocks
  blocks.forEach(b => b.render(ctx));

  // Enemies
  enemies.forEach(e => { if (e.alive) e.render(ctx); });

  // Player
  if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  player.render(ctx);
  ctx.globalAlpha = 1;

  // Particles
  particles.forEach(p => p.render(ctx));

  // Exit marker
  if (level.exit) {
    ctx.fillStyle = '#0f0';
    ctx.fillRect(level.exit.x, level.exit.y, 30, 30);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('EXIT', level.exit.x + 2, level.exit.y + 20);
  }
}

function loop(timestamp) {
  requestAnimationFrame(loop);
  if (screen !== 'play') return;

  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 1 / 30) dt = 1 / 30;
  if (dt <= 0) dt = 1 / 60;

  update(dt);
  render();
}

// Input handling
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    keys.jump = true;
    if (screen === 'title') {
      restartGame();
    }
  }
  if (e.code === 'KeyR') {
    keys.restart = true;
    if (screen === 'gameover' || screen === 'victory') {
      restartGame();
    }
  }
  e.preventDefault();
});

window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
  if (e.code === 'KeyR') keys.restart = false;
});

// Hidden game-meta contract
window.__GAME_META__ = {
  artifactKind: 'game', subtype: 'platformer',
  gameplayMechanics: {
    enemies: [{ stompable: true, defeatReward: 'score' }],
    blocks: [{ bumpableFromBelow: true, reward: 'doubleJump', usedState: 'bumped' }],
    abilities: [{ name: 'doubleJump', acquiredFrom: 'block', effect: 'movement', unlocksRoute: 'highRoute' }],
    gates: [{ requiresAbility: 'doubleJump', blocksAccessTo: 'highRoute' }],
    comboChallenge: [{ requires: ['jump', 'stomp', 'doubleJump'], target: 'reach exit of level 3' }]
  }
};

window.snapshot = () => ({
  player: { x: player.x, y: player.y, vx: player.vx, vy: player.vy },
  enemiesDefeated, blocksUsed, gatesUnlocked,
  abilities: { doubleJump: !!(player && player.abilities && player.abilities.doubleJump) }
});

// Boot
window.addEventListener('load', () => {
  showScreen('title');
  startLevel(0);
  showScreen('title');
  lastTime = performance.now();
  requestAnimationFrame(loop);
});
</script>
