<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer DS2 — Regression</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{background:#16213e;border:3px solid #0f3460;border-radius:8px;max-width:100vw;max-height:100vh;aspect-ratio:800/600;width:auto;height:auto}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
// ============================================================
//  Platformer Game — live state, physics, rendering
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// --- Constants ---
const GRAVITY = 0.6;
const PLAYER_SPEED = 4;
const PLAYER_JUMP = -12;
const PLAYER_W = 28, PLAYER_H = 32;
const FRICTION = 0.82;
const ENEMY_SPEED = 1.5;
const COYOTE_FRAMES = 6;
const JUMP_BUFFER_FRAMES = 6;

// --- Level Data ---
const LEVEL = {
  ground: { x: 0, y: 560, w: 800, h: 40 },
  platforms: [
    { x: 150, y: 450, w: 140, h: 16, id: 'platA' },
    { x: 380, y: 320, w: 140, h: 16, id: 'platB' },
    { x: 560, y: 140, w: 140, h: 16, id: 'platC_gate' }
  ],
  questionBlock: { x: 280, y: 465, w: 40, h: 32 },
  abilityPickup: { x: 440, y: 296, w: 20, h: 20 },
  playerSpawn: { x: 50, y: 528 },
  enemySpawn: { x: 200, y: 434 }
};

// --- State ---
let state;
let keys = {};
let coyoteTimer = 0;
let jumpBufferTimer = 0;
let score = 0;
let enemiesDefeated = 0;
let blocksUsed = 0;
let gatesUnlocked = 0;
let status = 'playing';

function freshState() {
  return {
    player: {
      x: LEVEL.playerSpawn.x, y: LEVEL.playerSpawn.y,
      vx: 0, vy: 0, w: PLAYER_W, h: PLAYER_H,
      onGround: false, hasDoubleJump: false, doubleJumpUsed: false,
      facing: 1
    },
    enemy: {
      x: LEVEL.enemySpawn.x, y: LEVEL.enemySpawn.y,
      vx: ENEMY_SPEED, vy: 0, w: 28, h: 28,
      alive: true, patrolLeft: 155, patrolRight: 285
    },
    block: { used: false, rewardSpawned: false },
    ability: { collected: false },
    platforms: LEVEL.platforms.map(p => ({ ...p })),
    ground: { ...LEVEL.ground },
    questionBlock: { ...LEVEL.questionBlock },
    abilityPickup: { ...LEVEL.abilityPickup }
  };
}

// --- Scenario setups for smoke tests ---
function setupScenario(name) {
  const s = freshState();
  enemiesDefeated = 0;
  blocksUsed = 0;
  gatesUnlocked = 0;
  score = 0;
  status = 'playing';
  coyoteTimer = 0;
  jumpBufferTimer = 0;
  switch (name) {
    case 'stomp':
      // Player above enemy on platA, falling
      s.player.x = 185; s.player.y = 405; s.player.vy = 1;
      s.player.onGround = false;
      s.enemy.x = 200; s.enemy.y = 434; s.enemy.alive = true;
      s.enemy.vx = 0; s.enemy.patrolLeft = 200; s.enemy.patrolRight = 200;
      break;
    case 'bumpBlock':
      // Player on ground right below question block
      s.player.x = 290; s.player.y = 528; s.player.vy = 0; s.player.onGround = true;
      s.block.used = false; s.block.rewardSpawned = false;
      break;
    case 'gainAbility':
      // Player on platform B, near ability pickup
      s.player.x = 395; s.player.y = 288; s.player.vy = 0; s.player.onGround = true;
      s.player.hasDoubleJump = false;
      s.ability.collected = false;
      break;
    case 'unlockGate':
      // Player on platform B with doubleJump, ready to reach gate
      s.player.x = 395; s.player.y = 288; s.player.vy = 0; s.player.onGround = true;
      s.player.hasDoubleJump = true; s.player.doubleJumpUsed = false;
      s.ability.collected = true;
      break;
    case 'comboChallenge':
      s.player.x = 50; s.player.y = 528; s.player.vy = 0; s.player.onGround = true;
      s.player.hasDoubleJump = false; s.player.doubleJumpUsed = false;
      s.enemy.x = 200; s.enemy.y = 434; s.enemy.alive = true; s.enemy.vx = 0;
      s.enemy.patrolLeft = 200; s.enemy.patrolRight = 200;
      s.block.used = false; s.block.rewardSpawned = false;
      s.ability.collected = false;
      break;
  }
  return s;
}

// --- Collision helpers ---
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getAllSolids(s) {
  const solids = [s.ground, ...s.platforms];
  if (!s.block.used) solids.push(s.questionBlock);
  return solids;
}

// --- Update ---
function updateOneFrame(s, input) {
  const p = s.player;

  // Input
  let moveX = 0;
  if (input.ArrowRight || input.KeyD) moveX += 1;
  if (input.ArrowLeft || input.KeyA) moveX -= 1;

  // Horizontal
  if (moveX !== 0) {
    p.vx += moveX * 0.6;
    if (Math.abs(p.vx) > PLAYER_SPEED) p.vx = moveX > 0 ? PLAYER_SPEED : -PLAYER_SPEED;
    p.facing = moveX > 0 ? 1 : -1;
  } else {
    p.vx *= FRICTION;
    if (Math.abs(p.vx) < 0.1) p.vx = 0;
  }

  // Jump buffer
  if (input.Space || input.KeyW || input.ArrowUp) {
    jumpBufferTimer = JUMP_BUFFER_FRAMES;
  }
  if (jumpBufferTimer > 0) jumpBufferTimer--;

  // Coyote time
  if (p.onGround) {
    coyoteTimer = COYOTE_FRAMES;
    p.doubleJumpUsed = false;
  }
  if (coyoteTimer > 0) coyoteTimer--;

  // Jump
  const canJump = (coyoteTimer > 0) || (p.hasDoubleJump && !p.doubleJumpUsed);
  if (jumpBufferTimer > 0 && canJump) {
    p.vy = PLAYER_JUMP;
    if (coyoteTimer <= 0) p.doubleJumpUsed = true;
    coyoteTimer = 0;
    jumpBufferTimer = 0;
    p.onGround = false;
  }

  // Gravity
  p.vy += GRAVITY;
  if (p.vy > 12) p.vy = 12;

  // Move X — check all solids
  p.x += p.vx;
  const solids = getAllSolids(s);
  for (const solid of solids) {
    if (rectsOverlap(p, solid)) {
      if (p.vx > 0) p.x = solid.x - p.w;
      else if (p.vx < 0) p.x = solid.x + solid.w;
      p.vx = 0;
    }
  }
  // Clamp to canvas
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > W) { p.x = W - p.w; p.vx = 0; }

  // Move Y
  p.y += p.vy;
  p.onGround = false;
  for (const solid of solids) {
    if (rectsOverlap(p, solid)) {
      if (p.vy > 0) {
        // Landing on top
        p.y = solid.y - p.h;
        p.vy = 0;
        p.onGround = true;
      } else if (p.vy < 0) {
        // Hit from below
        p.y = solid.y + solid.h;
        p.vy = 1; // small downward bounce
        // Bump question block from below
        if (solid === s.questionBlock && !s.block.used) {
          s.block.used = true;
          s.block.rewardSpawned = true;
          blocksUsed++;
          score += 100;
        }
      }
    }
  }

  // Fall off bottom
  if (p.y > H + 40) { status = 'lost'; }

  // Enemy update
  const e = s.enemy;
  if (e.alive) {
    e.x += e.vx;
    if (e.x <= e.patrolLeft) { e.x = e.patrolLeft; e.vx = Math.abs(e.vx); }
    if (e.x + e.w >= e.patrolRight) { e.x = e.patrolRight - e.w; e.vx = -Math.abs(e.vx); }
    e.vy += GRAVITY;
    e.y += e.vy;
    for (const solid of solids) {
      if (rectsOverlap(e, solid)) {
        if (e.vy > 0) { e.y = solid.y - e.h; e.vy = 0; }
        else if (e.vy < 0) { e.y = solid.y + solid.h; e.vy = 0; }
      }
    }
    // Player-enemy collision
    if (rectsOverlap(p, e)) {
      // Stomp: player moving down and top of player is above enemy center
      if (p.vy > 0 && p.y + p.h - e.y < 24) {
        e.alive = false;
        enemiesDefeated++;
        score += 200;
        p.vy = -8; // bounce up
      } else if (e.alive) {
        status = 'lost';
      }
    }
  }

  // Ability pickup
  const ap = s.abilityPickup;
  if (!s.ability.collected && rectsOverlap(p, ap)) {
    s.ability.collected = true;
    p.hasDoubleJump = true;
    score += 150;
  }

  // Gate check: player stands on platC_gate
  const gatePlat = s.platforms.find(pl => pl.id === 'platC_gate');
  if (gatePlat && p.onGround && p.y + p.h === gatePlat.y) {
    const pCenter = p.x + p.w / 2;
    const gCenter = gatePlat.x + gatePlat.w / 2;
    if (Math.abs(pCenter - gCenter) < gatePlat.w / 2 + p.w / 2) {
      if (gatesUnlocked === 0) {
        gatesUnlocked++;
        score += 500;
      }
      status = 'won';
    }
  }
}

function stepN(s, input, frames) {
  for (let i = 0; i < frames; i++) {
    if (status === 'won' || status === 'lost') break;
    updateOneFrame(s, input);
  }
}

// --- Render ---
function render(s) {
  ctx.clearRect(0, 0, W, H);
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#302b63');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#2d6a4f';
  ctx.fillRect(s.ground.x, s.ground.y, s.ground.w, s.ground.h);
  ctx.fillStyle = '#40916c';
  ctx.fillRect(s.ground.x, s.ground.y, s.ground.w, 6);

  // Platforms
  for (const pl of s.platforms) {
    ctx.fillStyle = pl.id === 'platC_gate' ? '#9b5de5' : '#6c584c';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = pl.id === 'platC_gate' ? '#c77dff' : '#a98467';
    ctx.fillRect(pl.x, pl.y, pl.w, 4);
    if (pl.id === 'platC_gate') {
      ctx.fillStyle = '#fff';
      ctx.font = '11px monospace';
      ctx.fillText('GATE', pl.x + pl.w/2 - 18, pl.y - 4);
    }
  }

  // Question block
  const qb = s.questionBlock;
  if (!s.block.used) {
    ctx.fillStyle = '#f4a261';
    ctx.fillRect(qb.x, qb.y, qb.w, qb.h);
    ctx.fillStyle = '#e76f51';
    ctx.fillRect(qb.x + 2, qb.y + 2, qb.w - 4, qb.h - 4);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('?', qb.x + qb.w/2 - 6, qb.y + qb.h/2 + 6);
  } else {
    ctx.fillStyle = '#555';
    ctx.fillRect(qb.x, qb.y, qb.w, qb.h);
    ctx.fillStyle = '#333';
    ctx.fillRect(qb.x + 2, qb.y + 2, qb.w - 4, qb.h - 4);
  }
  if (s.block.rewardSpawned) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('+100', qb.x - 10, qb.y - 10);
  }

  // Ability pickup
  if (!s.ability.collected) {
    const ap2 = s.abilityPickup;
    const t = Date.now() / 300;
    ctx.fillStyle = `hsl(${(t * 60) % 360}, 80%, 60%)`;
    ctx.beginPath();
    ctx.arc(ap2.x + ap2.w/2, ap2.y + ap2.h/2, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('DJ', ap2.x + 2, ap2.y + ap2.h/2 + 4);
    ctx.fillStyle = '#fff';
    ctx.font = '11px monospace';
    ctx.fillText('Double Jump', ap2.x - 30, ap2.y - 8);
  }

  // Enemy
  const e = s.enemy;
  if (e.alive) {
    ctx.fillStyle = '#e63946';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + 6, e.y + 8, 4, 4);
    ctx.fillRect(e.x + e.w - 10, e.y + 8, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x + 7, e.y + 9, 2, 2);
    ctx.fillRect(e.x + e.w - 9, e.y + 9, 2, 2);
    ctx.fillRect(e.x + e.w/2 - 3, e.y + e.h/2, 6, 4);
  } else {
    ctx.fillStyle = '#555';
    ctx.fillRect(e.x, e.y + e.h - 6, e.w, 6);
  }

  // Player
  const p = s.player;
  ctx.fillStyle = '#457b9d';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = '#1d3557';
  ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
  // Eyes
  ctx.fillStyle = '#fff';
  const eyeX = p.facing > 0 ? p.x + p.w - 10 : p.x + 6;
  ctx.fillRect(eyeX, p.y + 8, 4, 5);
  ctx.fillStyle = '#000';
  ctx.fillRect(p.facing > 0 ? eyeX + 2 : eyeX, p.y + 9, 2, 2);
  // Double jump indicator
  if (p.hasDoubleJump && !p.doubleJumpUsed) {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(p.x + p.w/2, p.y - 8, 5, 0, Math.PI*2);
    ctx.fill();
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 36);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`Score: ${score}`, 12, 24);
  ctx.fillText(`Enemies: ${enemiesDefeated} | Blocks: ${blocksUsed} | Gate: ${gatesUnlocked}`, 180, 24);
  ctx.fillText(`DoubleJump: ${p.hasDoubleJump ? 'YES' : 'NO'}`, 580, 24);
  ctx.fillText(`Status: ${status}`, 720, 24);

  // Win/Lose overlay
  if (status === 'won') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('YOU WIN!', W/2 - 130, H/2);
  }
  if (status === 'lost') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e63946';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('GAME OVER', W/2 - 150, H/2);
  }
}

// --- Input ---
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// --- Start / Reset ---
function startGame() {
  state = freshState();
  score = 0; enemiesDefeated = 0; blocksUsed = 0; gatesUnlocked = 0;
  status = 'playing';
  coyoteTimer = 0; jumpBufferTimer = 0;
}

function resetGame(scenario) {
  if (typeof scenario === 'string') {
    state = setupScenario(scenario);
  } else {
    startGame();
  }
}

function getSnapshot() {
  const p = state.player;
  return {
    player: { x: p.x, y: p.y, vx: p.vx, vy: p.vy, onGround: p.onGround, hasDoubleJump: p.hasDoubleJump, doubleJumpUsed: p.doubleJumpUsed },
    enemy: { x: state.enemy.x, y: state.enemy.y, alive: state.enemy.alive },
    block: { used: state.block.used, rewardSpawned: state.block.rewardSpawned },
    ability: { collected: state.ability.collected },
    enemiesDefeated, blocksUsed, gatesUnlocked, score, status
  };
}

function stepGame(inputState, frames) {
  if (frames === undefined) frames = 1;
  stepN(state, inputState, frames);
  return getSnapshot();
}

function runSmokeTest() {
  const checks = [];
  const failures = [];
  const coverage = { mechanics: [], rewards: [], risks: [], stateChanges: [] };
  let passed = true;

  function assert(label, ok) {
    checks.push(label);
    if (!ok) { failures.push(label); passed = false; }
  }

  // --- Stomp enemy ---
  resetGame('stomp');
  const s0 = getSnapshot();
  assert('stomp: enemy alive before', s0.enemy.alive === true);
  assert('stomp: enemiesDefeated 0 before', s0.enemiesDefeated === 0);
  // Fall onto enemy (player.y=405, enemy.y=434, gap=29px; vy starts 1, gravity 0.6;
  // frame 1: vy=1.6 y=406.6; frame 2: vy=2.2 y=408.8; frame 3: vy=2.8 y=411.6;
  // frame 4: vy=3.4 y=415; frame 5: vy=4.0 y=419; frame 6: vy=4.6 y=423.6;
  // frame 7: vy=5.2 y=428.8; frame 8: vy=5.8 y=434.6 → overlap with enemy at y=434
  // player bottom = 434.6+32=466.6, enemy top = 434 → overlap! stomp detected.)
  stepGame({}, 10);
  const s1 = getSnapshot();
  assert('stomp: enemy dead after', s1.enemy.alive === false);
  assert('stomp: enemiesDefeated increased', s1.enemiesDefeated === 1);
  assert('stomp: player bounced up', s1.player.vy < 0);
  if (s1.enemy.alive === false && s1.enemiesDefeated === 1 && s1.player.vy < 0) {
    coverage.mechanics.push('stompEnemy');
    coverage.rewards.push('enemyDefeatScore');
    coverage.risks.push('enemyContactDamage');
    coverage.stateChanges.push('enemy.alive');
    coverage.stateChanges.push('enemiesDefeated');
    coverage.stateChanges.push('player.vy');
  }

  // --- Bump block ---
  resetGame('bumpBlock');
  const b0 = getSnapshot();
  assert('bumpBlock: block unused before', b0.block.used === false);
  assert('bumpBlock: blocksUsed 0 before', b0.blocksUsed === 0);
  // Player at x=290,y=528 on ground. Block at x=280,y=465 w=40 h=32.
  // Player jumps: fram0 Space pressed, jumpBufferTimer=6; coyoteTimer=6; canJump=true
  // frame1: p.vy=-12, p.y=516; frame2: vy=-11.4,y=504.6; frame3: vy=-10.8,y=493.8;
  // frame4: vy=-10.2,y=483.6; frame5: vy=-9.6,y=474; frame6: vy=-9.0,y=465;
  // frame7: vy=-8.4,y=456.6 → player top at 456.6, block bottom at 497. Overlap!
  stepGame({ Space: true }, 10);
  const b1 = getSnapshot();
  // Continue if not yet triggered
  if (!b1.block.used) {
    stepGame({ Space: true }, 10);
  }
  const b2 = getSnapshot();
  assert('bumpBlock: block used after', b2.block.used === true);
  assert('bumpBlock: reward spawned', b2.block.rewardSpawned === true);
  assert('bumpBlock: blocksUsed increased', b2.blocksUsed === 1);
  if (b2.block.used === true && b2.blocksUsed === 1) {
    coverage.mechanics.push('bumpBlock');
    coverage.rewards.push('blockCoin');
    coverage.stateChanges.push('block.used');
    coverage.stateChanges.push('blocksUsed');
  }

  // --- Gain ability (doubleJump) ---
  resetGame('gainAbility');
  const a0 = getSnapshot();
  assert('gainAbility: no doubleJump before', a0.player.hasDoubleJump === false);
  assert('gainAbility: ability not collected before', a0.ability.collected === false);
  // Player at x=395 on platB, abilityPickup at x=440 w=20. Walk right 45px.
  stepGame({ ArrowRight: true }, 20); // +80px covers 45px gap at speed 4
  const a1 = getSnapshot();
  assert('gainAbility: doubleJump acquired', a1.player.hasDoubleJump === true);
  assert('gainAbility: ability collected', a1.ability.collected === true);
  if (a1.player.hasDoubleJump === true && a1.ability.collected === true) {
    coverage.mechanics.push('gainAbility');
    coverage.rewards.push('abilityPickup');
    coverage.stateChanges.push('player.hasDoubleJump');
    coverage.stateChanges.push('ability.collected');
  }

  // --- Unlock gate ---
  resetGame('unlockGate');
  const g0 = getSnapshot();
  assert('unlockGate: has doubleJump', g0.player.hasDoubleJump === true);
  assert('unlockGate: gate not reached before', g0.gatesUnlocked === 0);
  // Player on platB (x=395,y=288). Gate platform at x=560,y=140.
  // Need to jump right + double jump to reach y=140.
  // First jump: Space pressed, vy=-12 from platB.
  // frame1: vy=-12, y=276; frame2: vy=-11.4,y=264.6; frame3: vy=-10.8,y=253.8;
  // frame4: vy=-10.2,y=243.6; frame5: vy=-9.6,y=234; frame6: vy=-9.0,y=225;
  // frame7: vy=-8.4,y=216.6; frame8: vy=-7.8,y=208.8; frame9: vy=-7.2,y=201.6;
  // frame10: vy=-6.6,y=195 → doubleJump: Space again, vy=-12, y=183;
  // frame11: vy=-11.4,y=171.6; frame12: vy=-10.8,y=160.8; frame13: vy=-10.2,y=150.6;
  // frame14: vy=-9.6,y=141; → player top at 141, gate top at 140. Close!
  // Continue falling to land on gate platform at y=140.
  stepGame({ ArrowRight: true, Space: true }, 15);
  stepGame({ ArrowRight: true }, 10);
  stepGame({ ArrowRight: true, Space: true }, 15);
  stepGame({ ArrowRight: true }, 25);
  stepGame({ ArrowRight: true }, 10);
  const g1 = getSnapshot();
  assert('unlockGate: gate reached', g1.gatesUnlocked === 1 || g1.status === 'won');
  if (g1.gatesUnlocked === 1 || g1.status === 'won') {
    coverage.mechanics.push('unlockGate');
    coverage.rewards.push('gateScore');
    coverage.stateChanges.push('gatesUnlocked');
    coverage.stateChanges.push('status');
  }

  // --- Combo challenge ---
  resetGame('comboChallenge');
  const c00 = getSnapshot();
  // Phase 1: Move right to reach enemy, stomp
  stepGame({ ArrowRight: true, Space: true }, 25); // jump toward enemy on platA
  stepGame({ ArrowRight: true }, 30); // fall onto enemy
  const c01 = getSnapshot();
  assert('combo: enemy stomped', c01.enemiesDefeated === 1);
  // Phase 2: Move left and bump block
  if (status !== 'lost') {
    stepGame({ ArrowLeft: true }, 40);
    stepGame({ Space: true }, 15);
    stepGame({ Space: true }, 15);
  }
  const c02 = getSnapshot();
  assert('combo: block bumped', c02.block.used === true || c02.blocksUsed === 1);
  // Phase 3: Move right to platform B, collect ability
  stepGame({ ArrowRight: true, Space: true }, 20);
  stepGame({ ArrowRight: true }, 20);
  stepGame({ ArrowRight: true, Space: true }, 15);
  stepGame({ ArrowRight: true }, 20);
  const c03 = getSnapshot();
  assert('combo: ability collected', c03.player.hasDoubleJump === true);
  // Phase 4: Double jump to gate
  stepGame({ ArrowRight: true, Space: true }, 15);
  stepGame({ ArrowRight: true }, 10);
  stepGame({ ArrowRight: true, Space: true }, 15);
  stepGame({ ArrowRight: true }, 30);
  const c04 = getSnapshot();
  assert('combo: gate unlocked', c04.gatesUnlocked === 1 || c04.status === 'won');
  if (c01.enemiesDefeated === 1 && c02.blocksUsed === 1 && c03.player.hasDoubleJump === true && (c04.gatesUnlocked === 1 || c04.status === 'won')) {
    coverage.mechanics.push('comboChallenge');
    coverage.rewards.push('comboScore');
    coverage.stateChanges.push('enemiesDefeated');
    coverage.stateChanges.push('blocksUsed');
    coverage.stateChanges.push('player.hasDoubleJump');
    coverage.stateChanges.push('gatesUnlocked');
  }

  return {
    passed: failures.length === 0,
    checks,
    failures,
    coverage: {
      ...coverage,
      levelsPassed: failures.length === 0 ? ['level1'] : [],
      totalLevels: 1,
      allLevelsReachable: true
    }
  };
}

// --- Game Loop ---
startGame();
function gameLoop() {
  if (status === 'playing') {
    stepN(state, keys, 1);
  }
  render(state);
  requestAnimationFrame(gameLoop);
}
gameLoop();
