<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Regression V2</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border: 2px solid #444; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Ability: <span id="ability">None</span></div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 450;

const CONFIG = {
    gravity: 0.5,
    friction: 0.8,
    playerSpeed: 0.6,
    jumpForce: -10,
    tileSize: 50
};

let state = {
    player: { x: 50, y: 300, vx: 0, vy: 0, w: 30, h: 30, jumping: false, doubleJumped: false, abilities: { doubleJump: false } },
    blocks: [],
    enemies: [],
    items: [],
    gates: [],
    score: 0,
    frame: 0,
    input: { left: false, right: false, jump: false }
};

function initLevel(scenario = 'default') {
    state.player = { x: 50, y: 300, vx: 0, vy: 0, w: 30, h: 30, jumping: false, doubleJumped: false, abilities: { doubleJump: false } };
    state.score = 0;
    state.blocks = [
        { x: 0, y: 400, w: 800, h: 50, type: 'ground' },
        { x: 200, y: 300, w: 50, h: 50, type: 'question', used: false },
        { x: 500, y: 400, w: 100, h: 10, type: 'gate', locked: true }
    ];
    state.enemies = [{ x: 400, y: 370, w: 30, h: 30, vx: -1, dead: false }];
    state.items = [{ x: 210, y: 250, w: 20, h: 20, type: 'ability_doubleJump', collected: false }];

    if (scenario === 'stomp') state.player.x = 350;
    if (scenario === 'bumpBlock') state.player.x = 180;
    if (scenario === 'unlockGate') {
        state.player.abilities.doubleJump = true;
        state.player.x = 450;
    }
}

function update() {
    const p = state.player;
    if (state.input.left) p.vx -= CONFIG.playerSpeed;
    if (state.input.right) p.vx += CONFIG.playerSpeed;

    p.vx *= CONFIG.friction;
    p.vy += CONFIG.gravity;
    p.x += p.vx;
    p.y += p.vy;

    // Ground collision
    state.blocks.forEach(b => {
        if (p.x < b.x + b.w && p.x + p.w > b.x && p.y < b.y + b.h && p.y + p.h > b.y) {
            if (b.type === 'gate' && b.locked) {
                p.x -= p.vx; // Simple wall
            } else {
                if (p.vy > 0 && p.y + p.h - p.vy <= b.y) {
                    p.y = b.y - p.h;
                    p.vy = 0;
                    p.jumping = false;
                    p.doubleJumped = false;
                } else if (p.vy < 0 && p.y - p.vy >= b.y + b.h) {
                    p.y = b.y + b.h;
                    p.vy = 0;
                    if (b.type === 'question' && !b.used) {
                        b.used = true;
                        state.score += 10;
                    }
                }
            }
        }
    });

    // Enemy collision
    state.enemies.forEach(e => {
        if (!e.dead && p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) {
            if (p.vy > 0 && p.y + p.h - p.vy <= e.y) {
                e.dead = true;
                p.vy = -8;
                state.score += 20;
            }
        }
        if (!e.dead) {
            e.x += e.vx;
            if (e.x < 300 || e.x > 500) e.vx *= -1;
        }
    });

    // Item collection
    state.items.forEach(i => {
        if (!i.collected && p.x < i.x + i.w && p.x + p.w > i.x && p.y < i.y + i.h && p.y + p.h > i.y) {
            i.collected = true;
            if (i.type === 'ability_doubleJump') p.abilities.doubleJump = true;
        }
    });

    // Gate logic
    const gate = state.blocks.find(b => b.type === 'gate');
    if (gate && p.abilities.doubleJump && Math.abs(p.x - gate.x) < 100) {
        gate.locked = false;
    }

    document.getElementById('score').innerText = state.score;
    document.getElementById('ability').innerText = p.abilities.doubleJump ? 'Double Jump' : 'None';
    state.frame++;
}

function draw() {
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    state.blocks.forEach(b => {
        ctx.fillStyle = b.type === 'ground' ? '#555' : (b.type === 'gate' ? (b.locked ? '#f00' : '#0f0') : (b.used ? '#888' : '#ffd700'));
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    state.enemies.forEach(e => {
        if (!e.dead) {
            ctx.fillStyle = '#f00';
            ctx.fillRect(e.x, e.y, e.w, e.h);
        }
    });

    state.items.forEach(i => {
        if (!i.collected) {
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.arc(i.x + 10, i.y + 10, 10, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    ctx.fillStyle = '#fff';
    ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') state.input.left = true;
    if (e.code === 'ArrowRight') state.input.right = true;
    if (e.code === 'Space') {
        const p = state.player;
        if (!p.jumping) {
            p.vy = CONFIG.jumpForce;
            p.jumping = true;
        } else if (p.abilities.doubleJump && !p.doubleJumped) {
            p.vy = CONFIG.jumpForce;
            p.doubleJumped = true;
        }
    }
});

window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') state.input.left = false;
    if (e.code === 'ArrowRight') state.input.right = false;
});

initLevel();
loop();

window.__GAME_META__ = {
    domain: 'game',
    subtype: 'platformer',
    controls: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'Space' },
    levels: [{ id: 'main', name: 'Regression Test Level' }],
    gameplayMechanics: {
        enemies: { stompable: true, defeatReward: 'score' },
        blocks: { bumpableFromBelow: true, reward: 'score', usedState: 'used' },
        abilities: { doubleJump: { acquiredFrom: 'item', effect: 'extra jump', unlocksRoute: 'gate' } },
        gates: { requiresAbility: 'doubleJump', blocksAccessTo: 'right_side' },
        comboChallenge: { requires: ['jump', 'stomp', 'bump'], target: 'high_score' }
    },
    qualityPlan: { actorReadable: true, mechanics: true, rewards: true, risks: true },
    progressPlan: [
        { label: 'move right', input: 'ArrowRight', frames: 30, metric: 'player.x', expect: 'increase' },
        { label: 'jump', input: 'Space', frames: 20, metric: 'player.y', expect: 'decrease' }
    ],
    browserVisualSmoke: { desktopViewport: '800x450', canvasNonblank: true, actorVisible: true }
};

window.__GAME_TEST__ = {
    start: () => initLevel(),
    reset: (scenario) => initLevel(scenario),
    snapshot: () => JSON.parse(JSON.stringify({
        player: state.player,
        score: state.score,
        enemies: state.enemies,
        blocks: state.blocks,
        items: state.items
    })),
    step: (input, frames = 1) => {
        const oldInput = { ...state.input };
        if (typeof input === 'string') {
            state.input = { left: input === 'ArrowLeft', right: input === 'ArrowRight', jump: input === 'Space' };
            if (input === 'Space') {
                const p = state.player;
                if (!p.jumping) { p.vy = CONFIG.jumpForce; p.jumping = true; }
                else if (p.abilities.doubleJump && !p.doubleJumped) { p.vy = CONFIG.jumpForce; p.doubleJumped = true; }
            }
        }
        for (let i = 0; i < frames; i++) update();
        state.input = oldInput;
    },
    runSmokeTest: async function() {
        const results = { passed: true, checks: [], failures: [], coverage: { mechanics: {}, rewards: {}, risks: {}, stateChanges: {} } };

        // 1. Stomp Enemy
        this.reset('stomp');
        const beforeStomp = this.snapshot();
        this.step('ArrowRight', 10); // Move over enemy
        this.step('Space', 5); // Jump
        this.step('ArrowRight', 20); // Fall on enemy
        const afterStomp = this.snapshot();
        const stompSuccess = afterStomp.enemies[0].dead && afterStomp.score > beforeStomp.score;
        results.checks.push(`Stomp Enemy: ${stompSuccess}`);
        results.coverage.mechanics.stomp = stompSuccess;

        // 2. Bump Block
        this.reset('bumpBlock');
        const beforeBump = this.snapshot();
        this.step('ArrowRight', 10);
        this.step('Space', 10); // Hit block from below
        const afterBump = this.snapshot();
        const bumpSuccess = afterBump.blocks.find(b => b.type === 'question').used;
        results.checks.push(`Bump Block: ${bumpSuccess}`);
        results.coverage.mechanics.bump = bumpSuccess;

        // 3. Gain Ability
        this.reset('default');
        this.step('ArrowRight', 40); // Reach item
        const afterAbility = this.snapshot();
        const abilitySuccess = afterAbility.player.abilities.doubleJump;
        results.checks.push(`Gain Ability: ${abilitySuccess}`);
        results.coverage.rewards.ability = abilitySuccess;

        // 4. Unlock Gate
        this.reset('unlockGate');
        const beforeGate = this.snapshot();
        this.step('ArrowRight', 10);
        const afterGate = this.snapshot();
        const gateSuccess = !afterGate.blocks.find(b => b.type === 'gate').locked;
        results.checks.push(`Unlock Gate: ${gateSuccess}`);
        results.coverage.stateChanges.gateUnlocked = gateSuccess;

        results.passed = stompSuccess && bumpSuccess && abilitySuccess && gateSuccess;
        if (!results.passed) results.failures.push("One or more mechanics failed validation");

        return results;
    }
};
</script>
</body>
</html>
