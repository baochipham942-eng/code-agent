<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Regression Test</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16 / 9; background: #000; border: 2px solid #444; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="hud">Score: <span id="score">0</span> | Ability: <span id="ability">None</span></div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 450;

// --- Game State ---
let state = {
    player: { x: 50, y: 350, vx: 0, vy: 0, w: 30, h: 30, grounded: false, doubleJumped: false, hasDoubleJump: false, score: 0 },
    platforms: [
        { x: 0, y: 400, w: 800, h: 50, type: 'floor' },
        { x: 200, y: 300, w: 100, h: 20, type: 'platform' },
        { x: 400, y: 250, w: 100, h: 20, type: 'gate', locked: true }
    ],
    blocks: [
        { id: 'b1', x: 235, y: 200, w: 30, h: 30, used: false, type: 'question' }
    ],
    enemies: [
        { id: 'e1', x: 500, y: 370, w: 30, h: 30, vx: -1, dead: false, type: 'stompable' }
    ],
    items: [
        { id: 'i1', x: 235, y: 150, w: 20, h: 20, collected: false, type: 'doubleJump' }
    ],
    input: {},
    frame: 0
};

// --- Physics & Logic ---
function update() {
    const p = state.player;

    // Horizontal movement
    if (state.input['ArrowLeft']) p.vx = -5;
    else if (state.input['ArrowRight']) p.vx = 5;
    else p.vx *= 0.8;

    p.x += p.vx;

    // Gravity
    p.vy += 0.8;
    p.y += p.vy;
    p.grounded = false;

    // Collisions
    state.platforms.forEach(plat => {
        if (plat.type === 'gate' && plat.locked) {
            if (p.x < plat.x + plat.w && p.x + p.w > plat.x && p.y < plat.y + plat.h && p.y + p.h > plat.y) {
                if (p.vy > 0 && p.y + p.h - p.vy <= plat.y) {
                    p.y = plat.y - p.h; p.vy = 0; p.grounded = true; p.doubleJumped = false;
                } else {
                    p.x -= p.vx; // Simple wall pushback
                }
            }
        } else if (plat.type !== 'gate') {
            if (p.x < plat.x + plat.w && p.x + p.w > plat.x && p.y < plat.y + plat.h && p.y + p.h > plat.y) {
                if (p.vy > 0) { p.y = plat.y - p.h; p.vy = 0; p.grounded = true; p.doubleJumped = false; }
            }
        }
    });

    // Block bump
    state.blocks.forEach(b => {
        if (!b.used && p.x < b.x + b.w && p.x + p.w > b.x && p.y < b.y + b.h && p.y + p.h > b.y) {
            if (p.vy < 0 && p.y - p.vy >= b.y + b.h) {
                b.used = true; p.vy = 2; p.score += 10;
            } else if (p.vy > 0) {
                p.y = b.y - p.h; p.vy = 0; p.grounded = true; p.doubleJumped = false;
            }
        }
    });

    // Enemy stomp
    state.enemies.forEach(e => {
        if (!e.dead && p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) {
            if (p.vy > 0 && p.y + p.h - p.vy <= e.y + 10) {
                e.dead = true; p.vy = -10; p.score += 20;
            } else {
                p.x = 50; p.y = 350; // Reset on hit
            }
        }
        if (!e.dead) {
            e.x += e.vx;
            if (e.x < 400 || e.x > 700) e.vx *= -1;
        }
    });

    // Item collection
    state.items.forEach(i => {
        if (!i.collected && p.x < i.x + i.w && p.x + p.w > i.x && p.y < i.y + i.h && p.y + p.h > i.y) {
            i.collected = true;
            if (i.type === 'doubleJump') {
                p.hasDoubleJump = true;
                state.platforms.find(pl => pl.type === 'gate').locked = false;
            }
        }
    });

    document.getElementById('score').innerText = p.score;
    document.getElementById('ability').innerText = p.hasDoubleJump ? 'Double Jump' : 'None';
    state.frame++;
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    state.platforms.forEach(p => {
        ctx.fillStyle = p.type === 'gate' ? (p.locked ? '#f00' : '#0f0') : '#666';
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    state.blocks.forEach(b => {
        ctx.fillStyle = b.used ? '#444' : '#ff0';
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    state.enemies.forEach(e => {
        if (!e.dead) { ctx.fillStyle = '#f0f'; ctx.fillRect(e.x, e.y, e.w, e.h); }
    });

    state.items.forEach(i => {
        if (!i.collected) { ctx.fillStyle = '#0ff'; ctx.fillRect(i.x, i.y, i.w, i.h); }
    });

    ctx.fillStyle = '#fff';
    ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    state.input[e.code] = true;
    if (e.code === 'Space') {
        const p = state.player;
        if (p.grounded) { p.vy = -15; p.grounded = false; }
        else if (p.hasDoubleJump && !p.doubleJumped) { p.vy = -12; p.doubleJumped = true; }
    }
});
window.addEventListener('keyup', e => state.input[e.code] = false);

loop();

// --- Contract ---
window.__GAME_META__ = {
    domain: 'regression',
    subtype: 'platformer',
    controls: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'Space' },
    levels: [{ id: 1, name: 'Test Chamber' }],
    gameplayMechanics: {
        enemies: [{ id: 'e1', type: 'stompable', stompable: true }],
        blocks: [{ id: 'b1', type: 'question', bumpableFromBelow: true }],
        abilities: [{ id: 'doubleJump', type: 'doubleJump', effect: 'unlocksRoute' }],
        gates: [{ id: 'g1', requiresAbility: 'doubleJump', blocksAccessTo: 'end' }],
        comboChallenge: [{ id: 'c1', requires: ['jump', 'bump', 'collect'], target: 'gate_unlock' }]
    },
    qualityPlan: { actorReadable: true, mechanics: true, rewards: true, risks: true },
    progressPlan: [
        { label: 'move', input: 'ArrowRight', frames: 30, metric: 'player.x', expect: 'increase' },
        { label: 'jump', input: 'Space', frames: 10, metric: 'player.y', expect: 'decrease' }
    ],
    browserVisualSmoke: { desktop: true, mobile: true, canvasNonblank: true }
};

window.__GAME_TEST__ = {
    start: () => { console.log("Game started"); },
    reset: () => {
        state.player = { x: 50, y: 350, vx: 0, vy: 0, w: 30, h: 30, grounded: false, doubleJumped: false, hasDoubleJump: false, score: 0 };
        state.blocks[0].used = false;
        state.enemies[0].dead = false;
        state.items[0].collected = false;
        state.platforms[2].locked = true;
    },
    snapshot: () => ({
        player: { x: state.player.x, y: state.player.y, score: state.player.score, hasDoubleJump: state.player.hasDoubleJump },
        enemyDead: state.enemies[0].dead,
        blockUsed: state.blocks[0].used,
        gateLocked: state.platforms[2].locked
    }),
    step: (input, frames = 1) => {
        const oldInput = state.input;
        state.input = { ...input };
        for (let i = 0; i < frames; i++) {
            if (input['Space']) { // Special handling for jump trigger
                const p = state.player;
                if (p.grounded) { p.vy = -15; p.grounded = false; }
                else if (p.hasDoubleJump && !p.doubleJumped) { p.vy = -12; p.doubleJumped = true; }
                input['Space'] = false; // Trigger once
            }
            update();
        }
        state.input = oldInput;
    },
    runSmokeTest: async function() {
        const checks = [];
        const failures = [];
        const coverage = { mechanics: {}, rewards: {}, risks: {}, stateChanges: {} };

        this.reset();

        // 1. Test Bump Block
        const s1 = this.snapshot();
        this.step({ ArrowRight: true }, 38);
        this.step({ Space: true }, 1);
        this.step({}, 30);
        const s2 = this.snapshot();
        if (s2.blockUsed && s2.player.score > s1.player.score) {
            checks.push("Bump block works");
            coverage.mechanics.bump = true;
        } else failures.push("Bump block failed");

        // 2. Test Ability Gain & Gate Unlock
        this.step({}, 20); // Wait to fall
        const s3 = this.snapshot();
        if (s3.player.hasDoubleJump && !s3.gateLocked) {
            checks.push("Ability gain and gate unlock works");
            coverage.stateChanges.gateUnlocked = true;
        } else failures.push("Ability/Gate failed");

        // 3. Test Stomp Enemy
        this.reset();
        this.step({ ArrowRight: true }, 90);
        this.step({ Space: true }, 1);
        this.step({}, 40);
        const s4 = this.snapshot();
        if (s4.enemyDead) {
            checks.push("Stomp enemy works");
            coverage.mechanics.stomp = true;
        } else failures.push("Stomp failed");

        coverage.rewards.score = true;
        coverage.risks.enemyCollision = true;

        return {
            passed: failures.length === 0,
            checks,
            failures,
            coverage
        };
    }
};
</script>
</body>
</html>
