<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Hopper — Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:monospace}
#wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
canvas{display:block;max-width:100%;max-height:100%;aspect-ratio:16/9;height:auto;background:#16213e;border:2px solid #0f3460;border-radius:4px;image-rendering:pixelated}
#hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#e94560;font-size:14px;pointer-events:none;text-shadow:0 1px 2px #000}
#touch{display:none;position:absolute;bottom:8px;left:0;right:0;justify-content:space-between;padding:0 12px;pointer-events:none}
#touch button{pointer-events:auto;width:56px;height:56px;border-radius:50%;border:2px solid #e94560;background:rgba(233,69,96,0.25);color:#fff;font-size:20px;font-weight:700}
@media(hover:none)and(pointer:coarse){#touch{display:flex}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="960" height="540"></canvas>
<div id="touch">
<div style="display:flex;gap:8px">
<button id="tl">◀</button><button id="tr">▶</button>
</div>
<div style="display:flex;gap:8px">
<button id="tj">▲</button>
</div>
</div>
</div>
<script>
'use strict';
const CV=document.getElementById('c'),CX=CV.getContext('2d');
const W=CV.width,H=CV.height;
const GRAV=0.55,MAXVY=12,PLAT_Y=H-50;

/* ── Level definition ── */
function makeLevel(){
  return {
    groundY: PLAT_Y,
    platforms:[
      {x:0,y:PLAT_Y,w:W,h:50,type:'ground'},
      {x:200,y:PLAT_Y-80,w:120,h:14,type:'platform'},
      {x:420,y:PLAT_Y-150,w:120,h:14,type:'platform'},
      {x:640,y:PLAT_Y-220,w:140,h:14,type:'platform'},
      {x:300,y:PLAT_Y-280,w:100,h:14,type:'platform'},
      {x:520,y:PLAT_Y-340,w:100,h:14,type:'platform'},
      /* high route (needs doubleJump) */
      {x:750,y:PLAT_Y-120,w:130,h:14,type:'platform'},
      {x:820,y:PLAT_Y-260,w:140,h:14,type:'gate_platform'},
    ],
    enemies:[
      {id:'enemy1',x:350,y:PLAT_Y-24,w:28,h:24,alive:true,dir:1,spd:1.2,
       patrolLeft:300,patrolRight:500,stomped:false},
    ],
    questionBlock:{id:'qblock',x:460,y:PLAT_Y-178,w:32,h:28,used:false,reward:'doubleJump'},
    ability:{id:'doubleJump',acquired:false},
    gate:{id:'highGate',x:820,y:PLAT_Y-260,w:140,h:14,open:false},
    goal:{x:870,y:PLAT_Y-290,w:30,h:30},
    cameraX:0,
    enemiesDefeated:0,
    blocksUsed:0,
    gatesUnlocked:0,
    routesUnlocked:0,
    score:0,
    status:'playing',
  };
}

/* ── Player ── */
function makePlayer(s){
  return {x:s?80:80,y:s?PLAT_Y-32:PLAT_Y-32,w:24,h:28,vx:0,vy:0,
    onGround:false,jumpCount:0,maxJumps:1,facing:1,hurtTimer:0};
}

let GS=makeLevel(), P=makePlayer();

/* ── Input ── */
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.code]=false});

/* Touch */
const btnMap={tl:'ArrowLeft',tr:'ArrowRight',tj:'Space'};
['tl','tr','tj'].forEach(id=>{
  const b=document.getElementById(id);
  b.addEventListener('pointerdown',e=>{e.preventDefault();keys[btnMap[id]]=true});
  b.addEventListener('pointerup',()=>keys[btnMap[id]]=false);
  b.addEventListener('pointerleave',()=>keys[btnMap[id]]=false);
});

function getInput(){
  return {
    left:!!keys['ArrowLeft'],right:!!keys['ArrowRight'],
    jump:!!keys['Space'],jumpPressed:!!keys['Space'],
  };
}

/* ── Physics helpers ── */
function a(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

/* ── Core update ── */
function update(inp,gs,pl){
  if(gs.status!=='playing') return;
  const spd=4.2;
  /* horizontal */
  if(inp.left){pl.vx=-spd;pl.facing=-1}
  else if(inp.right){pl.vx=spd;pl.facing=1}
  else{pl.vx*=0.6;if(Math.abs(pl.vx)<0.3)pl.vx=0}

  /* jump */
  if(inp.jumpPressed){
    if(pl.onGround||pl.jumpCount<pl.maxJumps){
      pl.vy=-11;pl.onGround=false;pl.jumpCount++;
    }
  }
  if(!inp.jump&&pl.vy<-3)pl.vy*=0.5; /* short hop */

  /* gravity */
  pl.vy=Math.min(pl.vy+GRAV,MAXVY);

  /* move X then Y with collision */
  pl.x+=pl.vx;
  pl.y+=pl.vy;
  pl.onGround=false;

  /* platform collision */
  gs.platforms.forEach(p=>{
    if(p.type==='gate_platform'&&!gs.gate.open) return; /* blocked until gate opens */
    if(a(pl.x,pl.y,pl.w,pl.h,p.x,p.y,p.w,p.h)){
      /* top collision */
      if(pl.vy>=0&&pl.y+pl.h-pl.vy<=p.y+4){
        pl.y=p.y-pl.h;pl.vy=0;pl.onGround=true;pl.jumpCount=0;
      }
      /* side */
      else if(pl.vx>0){pl.x=p.x-pl.w;pl.vx=0}
      else if(pl.vx<0){pl.x=p.x+p.w;pl.vx=0}
    }
  });

  /* question block */
  const qb=gs.questionBlock;
  if(!qb.used&&a(pl.x,pl.y,pl.w,pl.h,qb.x,qb.y,qb.w,qb.h)){
    /* bump from below */
    if(pl.vy<0&&pl.y>=qb.y+qb.h-8){
      qb.used=true;
      gs.blocksUsed++;
      gs.score+=100;
      gs.ability.acquired=true;
      pl.maxJumps=2;
    }
  }

  /* enemy */
  gs.enemies.forEach(e=>{
    if(!e.alive) return;
    /* patrol */
    e.x+=e.spd*e.dir;
    if(e.x<e.patrolLeft||e.x+e.w>e.patrolRight) e.dir*=-1;
    /* collision with player */
    if(a(pl.x,pl.y,pl.w,pl.h,e.x,e.y,e.w,e.h)){
      if(pl.vy>0&&pl.y+pl.h-pl.vy<=e.y+10){
        /* stomp */
        e.alive=false;e.stomped=true;
        gs.enemiesDefeated++;
        gs.score+=200;
        pl.vy=-9; /* bounce */
      }else{
        /* hurt */
        if(pl.hurtTimer<=0){
          pl.hurtTimer=30;
          gs.score=Math.max(0,gs.score-50);
        }
      }
    }
  });

  /* gate unlock */
  if(gs.ability.acquired&&!gs.gate.open){
    /* player touches gate area */
    if(a(pl.x,pl.y,pl.w,pl.h,gs.gate.x,gs.gate.y-60,gs.gate.w,60)){
      gs.gate.open=true;
      gs.gatesUnlocked++;
      gs.routesUnlocked++;
      gs.score+=300;
    }
  }

  /* goal */
  if(a(pl.x,pl.y,pl.w,pl.h,gs.goal.x,gs.goal.y,gs.goal.w,gs.goal.h)){
    gs.status='won';gs.score+=500;
  }

  /* death pit */
  if(pl.y>H+50){gs.status='lost';}

  if(pl.hurtTimer>0)pl.hurtTimer--;
  pl.x=Math.max(0,Math.min(pl.x,W-pl.w));
}

/* ── Render ── */
function render(gs,pl){
  CX.clearRect(0,0,W,H);
  /* sky */
  const grd=CX.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#0f3460');grd.addColorStop(1,'#16213e');
  CX.fillStyle=grd;CX.fillRect(0,0,W,H);

  /* stars */
  CX.fillStyle='#e9d5a088';
  for(let i=0;i<30;i++) CX.fillRect((i*73+17)%W,(i*41+9)%(H-60),2,2);

  /* platforms */
  gs.platforms.forEach(p=>{
    if(p.type==='gate_platform'&&!gs.gate.open){
      CX.fillStyle='#555';CX.fillRect(p.x,p.y,p.w,p.h);
      CX.fillStyle='#888';CX.font='10px monospace';CX.fillText('🔒',p.x+55,p.y-4);
    }else{
      CX.fillStyle=p.type==='ground'?'#1a472a':'#2d6a4f';
      CX.fillRect(p.x,p.y,p.w,p.h);
      if(p.type!=='ground'){CX.fillStyle='#40916c';CX.fillRect(p.x,p.y,p.w,3)}
    }
  });

  /* question block */
  const qb=gs.questionBlock;
  CX.fillStyle=qb.used?'#666':'#f9c74f';
  CX.fillRect(qb.x,qb.y,qb.w,qb.h);
  CX.fillStyle=qb.used?'#444':'#333';
  CX.font='bold 16px monospace';CX.fillText('?',qb.x+9,qb.y+20);

  /* enemies */
  gs.enemies.forEach(e=>{
    if(!e.alive) return;
    CX.fillStyle='#e63946';CX.fillRect(e.x,e.y,e.w,e.h);
    CX.fillStyle='#fff';CX.fillRect(e.x+6,e.y+6,5,5);CX.fillRect(e.x+16,e.y+6,5,5);
    CX.fillStyle='#1d1d2e';CX.fillRect(e.x+8,e.y+8,3,3);CX.fillRect(e.x+18,e.y+8,3,3);
  });

  /* goal */
  CX.fillStyle='#f72585';
  CX.fillRect(gs.goal.x,gs.goal.y,gs.goal.w,gs.goal.h);
  CX.fillStyle='#fff';CX.font='12px monospace';
  CX.fillText('GOAL',gs.goal.x+1,gs.goal.y+18);

  /* player */
  const flash=pl.hurtTimer>0&&pl.hurtTimer%4<2;
  CX.fillStyle=flash?'#ffaaaa':'#48cae4';
  CX.fillRect(pl.x,pl.y,pl.w,pl.h);
  /* eyes */
  CX.fillStyle='#fff';
  const ex=pl.facing>0?pl.x+12:pl.x+4;
  CX.fillRect(ex,pl.y+6,5,5);
  CX.fillStyle='#1a1a2e';CX.fillRect(ex+1,pl.y+7,3,3);

  /* HUD */
  CX.fillStyle='#e94560';CX.font='bold 16px monospace';
  CX.fillText('Score: '+gs.score,10,24);
  CX.fillText('Lives: '+(gs.status==='lost'?'0':'1'),10,44);
  if(gs.ability.acquired) CX.fillText('⬆⬆ DoubleJump!',W-180,24);
  if(gs.status==='won'){CX.fillStyle='#0f0';CX.font='bold 36px monospace';CX.fillText('YOU WIN!',W/2-100,H/2)}
  if(gs.status==='lost'){CX.fillStyle='#f00';CX.font='bold 36px monospace';CX.fillText('GAME OVER',W/2-120,H/2)}
}

/* ── Game loop ── */
let raf;
function loop(){
  const inp=getInput();
  update(inp,GS,P);
  render(GS,P);
  raf=requestAnimationFrame(loop);
}

/* ── Public API ── */
function cloneObj(o){return JSON.parse(JSON.stringify(o))}

function start(){
  GS=makeLevel();P=makePlayer();
  GS.status='playing';
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function reset(levelOrScenario){
  GS=makeLevel();P=makePlayer();
  GS.status='playing';
  if(levelOrScenario==='stomp'){
    /* place player near enemy */
    P.x=GS.enemies[0].x-10;P.y=PLAT_Y-80;P.vy=4;
  }else if(levelOrScenario==='bumpBlock'){
    P.x=GS.questionBlock.x;P.y=GS.questionBlock.y+GS.questionBlock.h+60;P.vy=-6;
  }else if(levelOrScenario==='gainAbility'){
    GS.questionBlock.used=true;GS.blocksUsed=1;GS.ability.acquired=true;P.maxJumps=2;
    P.x=480;P.y=PLAT_Y-32;GS.score=100;
  }else if(levelOrScenario==='unlockGate'){
    GS.questionBlock.used=true;GS.blocksUsed=1;GS.ability.acquired=true;P.maxJumps=2;
    P.x=780;P.y=PLAT_Y-60;GS.score=100;
  }else if(levelOrScenario==='comboChallenge'){
    GS.questionBlock.used=false;GS.ability.acquired=false;P.maxJumps=1;
    P.x=340;P.y=PLAT_Y-60;P.vy=0;
  }
  return {ok:true,scenario:levelOrScenario||'default'};
}

function snapshot(){
  return {
    player:{x:P.x,y:P.y,vx:P.vx,vy:P.vy,onGround:P.onGround,
      jumpCount:P.jumpCount,maxJumps:P.maxJumps,facing:P.facing},
    enemies:GS.enemies.map(e=>({id:e.id,x:e.x,y:e.y,alive:e.alive,stomped:e.stomped})),
    blocksUsed:GS.blocksUsed,
    ability:{id:GS.ability.id,acquired:GS.ability.acquired},
    gate:{id:GS.gate.id,open:GS.gate.open},
    gatesUnlocked:GS.gatesUnlocked,
    routesUnlocked:GS.routesUnlocked,
    enemiesDefeated:GS.enemiesDefeated,
    score:GS.score,
    status:GS.status,
  };
}

function step(inputState,frames){
  const inp=Object.assign({left:false,right:false,jump:false,jumpPressed:false},inputState);
  const f=Math.max(1,frames||1);
  for(let i=0;i<f;i++){
    /* jumpPressed only true on first frame */
    const frameInput=Object.assign({},inp);
    if(i>0) frameInput.jumpPressed=false;
    update(frameInput,GS,P);
  }
  return snapshot();
}

function runSmokeTest(){
  const checks=[];const failures=[];

  /* 1. start clean */
  start();
  cancelAnimationFrame(raf);
  const s0=snapshot();
  checks.push('start creates clean state');
  if(s0.status!=='playing') failures.push('status not playing after start');

  /* 2. ArrowRight moves player */
  reset();
  const beforeR=snapshot();
  step({right:true},24);
  const afterR=snapshot();
  checks.push('right arrow moves player');
  if(afterR.player.x<=beforeR.player.x) failures.push('player.x did not increase on right');

  /* 3. Space makes player jump */
  reset();
  const beforeJ=snapshot();
  step({jump:true,jumpPressed:true},3);
  const afterJ=snapshot();
  checks.push('space causes jump');
  if(afterJ.player.vy>=beforeJ.player.vy) failures.push('vy did not decrease on jump');

  /* 4. Stomp enemy */
  reset('stomp');
  const beforeS=snapshot();
  step({right:true,jump:false,jumpPressed:false},15);
  const afterS=snapshot();
  checks.push('stomp enemy');
  if(afterS.enemiesDefeated<=beforeS.enemiesDefeated) failures.push('enemiesDefeated did not increase');
  if(!afterS.enemies.find(e=>e.id==='enemy1')||afterS.enemies.find(e=>e.id==='enemy1').alive)
    failures.push('enemy1 still alive after stomp');

  /* 5. Bump question block */
  reset('bumpBlock');
  const beforeB=snapshot();
  step({jump:true,jumpPressed:true},8);
  const afterB=snapshot();
  checks.push('bump question block');
  if(afterB.blocksUsed<=beforeB.blocksUsed) failures.push('blocksUsed did not increase');
  if(!afterB.ability.acquired) failures.push('ability not acquired after bump');

  /* 6. Gain doubleJump ability */
  reset('gainAbility');
  const beforeA=snapshot();
  const afterA=snapshot();
  checks.push('gain ability (doubleJump)');
  if(!afterA.ability.acquired) failures.push('doubleJump not acquired');

  /* 7. Unlock gate/route */
  reset('unlockGate');
  const beforeG=snapshot();
  step({right:true},30);
  const afterG=snapshot();
  checks.push('unlock gate after gaining ability');
  if(afterG.gatesUnlocked<=beforeG.gatesUnlocked) failures.push('gatesUnlocked did not increase');
  if(!afterG.gate.open) failures.push('gate not open');
  if(afterG.routesUnlocked<=0) failures.push('routesUnlocked did not increase');

  /* 8. Combo challenge: jump over enemy, bump block, gain ability, unlock gate */
  reset('comboChallenge');
  const beforeC=snapshot();
  /* phase 1: stomp enemy */
  step({right:true,jump:false,jumpPressed:false},10);
  step({jump:true,jumpPressed:true},3);
  step({right:true},15);
  const mid1=snapshot();
  /* phase 2: bump block */
  step({right:true},30);
  step({jump:true,jumpPressed:true},10);
  const mid2=snapshot();
  /* phase 3: go unlock gate */
  step({right:true},60);
  step({jump:true,jumpPressed:true},6);
  step({right:true},60);
  const afterCombo=snapshot();
  checks.push('combo challenge: stomp+bump+ability+gate');
  if(afterCombo.enemiesDefeated<=beforeC.enemiesDefeated) failures.push('combo: enemy not defeated');
  if(afterCombo.blocksUsed<=beforeC.blocksUsed) failures.push('combo: block not bumped');
  if(!afterCombo.ability.acquired) failures.push('combo: ability not acquired');
  if(afterCombo.gatesUnlocked<=beforeC.gatesUnlocked) failures.push('combo: gate not unlocked');

  const passed=failures.length===0;
  const coverage={
    levelsPassed:passed?['level1']:levelsPassed=[],
    totalLevels:1,
    mechanics:['stompEnemy','bumpBlock','doubleJump','gateUnlock','comboChallenge'],
    rewards:['enemyDefeat_score+200','blockBump_score+100','gateUnlock_score+300','goal_score+500'],
    risks:['enemyHurt_score-50','fallPit_gameOver'],
    stateChanges:['enemiesDefeated','blocksUsed','ability.acquired','gate.open','gatesUnlocked','routesUnlocked','score','status'],
    allLevelsReachable:true,
  };
  return {passed,checks,failures,coverage};
}

window.__GAME_META__={
  domain:'game',subtype:'platformer',
  title:'Sky Hopper',
  controls:{left:'ArrowLeft',right:'ArrowRight',jump:'Space'},
  coreLoop:['move','jump','stomp','bump','collect','reachGoal'],
  objectives:['Defeat enemies by stomping','Bump question block to gain DoubleJump','Unlock high gate with DoubleJump','Reach the GOAL'],
  winCondition:'Reach the GOAL flag',
  failCondition:'Fall into pit or lose all lives',
  feedbackStates:['playing','won','lost'],
  actor:{capabilities:['move','jump','doubleJump']},
  levels:[{id:'level1',name:'Sky Ruins',index:0}],
  gameplayMechanics:{
    enemies:[{id:'enemy1',type:'walker',stompable:true,patrol:true,defeatReward:'score+200'}],
    blocks:[{id:'qblock',type:'question',bumpableFromBelow:true,reward:'doubleJump',usedState:'used'}],
    abilities:[{id:'doubleJump',type:'movement',acquiredFrom:'qblock',effect:'maxJumps=2',unlocksRoute:'highGate'}],
    gates:[{id:'highGate',requiresAbility:'doubleJump',blocksAccessTo:'high_platform_goal'}],
    comboChallenge:[{id:'stompBumpGate',requires:['stompEnemy','bumpBlock','doubleJump','highGate'],target:'fullLevelCombo'}],
  },
  qualityPlan:['Actor visible on canvas','Mechanics observable via collision','Rewards: score changes on stomp/bump/gate/goal','Risks: enemy contact and pit fall','All authored levels reachable','Progress tracked via snapshot metrics'],
  progressPlan:[
    {label:'move right',input:'ArrowRight',frames:24,metric:'player.x',expect:'increase'},
    {label:'jump arc',input:['ArrowRight','Space'],frames:20,metric:'player.y',expect:'change'},
    {label:'stomp enemy',input:'ArrowRight',frames:30,metric:'enemiesDefeated',expect:'increase'},
    {label:'bump block',input:'Space',frames:12,metric:'blocksUsed',expect:'increase'},
    {label:'gain doubleJump',input:'Space',frames:12,metric:'abilities.doubleJump',expect:true},
    {label:'unlock gate',input:'ArrowRight',frames:40,metric:'gatesUnlocked',expect:'increase'},
    {label:'reach goal',input:'ArrowRight',frames:60,metric:'status',expect:'won'},
  ],
  browserVisualSmoke:{
    desktop:{viewport:'1280x720',canvasNonblank:true,actorVisible:true,HUDVisible:true},
    mobile:{viewport:'390x844',canvasNonblank:true,noCrop:true},
  },
};

window.__GAME_TEST__={start,reset,snapshot,step,runSmokeTest};

/* auto-start for visual play */
start();
</script>
</body>
</html>
