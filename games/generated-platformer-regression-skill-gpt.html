<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regression Skill Platformer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101820;
      --panel: #1a2633;
      --accent: #7ce577;
      --danger: #ff6b6b;
      --gold: #ffd166;
      --sky: #23395d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2b4c7e 0%, #101820 70%);
      font-family: Arial, Helvetica, sans-serif;
      color: #eef4ff;
    }
    .wrap {
      width: min(100vw, 980px);
      max-width: 980px;
      padding: 12px;
    }
    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      background: rgba(10, 16, 24, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .tips {
      font-size: 12px;
      opacity: 0.9;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      max-width: 100%;
      max-height: calc(100vh - 120px);
      background: linear-gradient(#6fb7ff, #a8ddff 55%, #d8f2ff 55%, #b4d87a 56%, #739949 100%);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div id="status">Loading...</div>
      <div class="tips">Move: ← → / A D · Jump: Space / ↑ / W · Reset: R</div>
    </div>
    <canvas id="game" width="960" height="540" aria-label="Platformer game canvas"></canvas>
  </div>
  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('status');

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const TILE = 48;
      const GRAVITY = 0.6;
      const MOVE_ACCEL = 0.75;
      const MAX_SPEED = 5.2;
      const FRICTION = 0.82;
      const JUMP_SPEED = -11.5;
      const DOUBLE_JUMP_SPEED = -10.2;
      const COYOTE_FRAMES = 6;
      const JUMP_BUFFER_FRAMES = 6;
      const STOMP_BOUNCE = -8.5;

      const input = {
        left: false,
        right: false,
        jump: false,
        jumpPressed: false,
        reset: false,
      };

      const authoredLevels = [
        { id: 'meadow-run', name: 'Meadow Run', index: 0 },
        { id: 'sky-gate', name: 'Sky Gate', index: 1 }
      ];

      const baseMeta = {
        domain: 'game',
        subtype: 'platformer',
        dispatchableControls: ['ArrowLeft', 'ArrowRight', 'Space', 'KeyA', 'KeyD', 'KeyW', 'ArrowUp', 'KeyR'],
        controls: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'Space', reset: 'KeyR' },
        coreLoop: ['run', 'jump', 'bump block', 'gain double jump', 'stomp slime', 'unlock high gate', 'reach goal'],
        objectives: ['Collect the double jump feather', 'Use it to reach the gate route', 'Clear the combo lane and touch the goal flag'],
        win: ['Touch the goal flag on the active level', 'Complete all levels'],
        fail: ['Lose all health', 'Fall below the world'],
        feedbackStates: ['ready', 'airborne', 'landed', 'hurt', 'abilityGained', 'gateUnlocked', 'won', 'lost'],
        actorCapabilities: ['run', 'singleJump', 'doubleJump after feather', 'stomp', 'bump blocks from below'],
        levels: authoredLevels,
        gameplayMechanics: {
          enemies: [
            { id: 'slime-a', type: 'slime', stompable: true, patrol: 'short platform patrol', defeatReward: 'score +100 and bounce' }
          ],
          blocks: [
            { id: 'question-feather', type: 'question', bumpableFromBelow: true, reward: 'feather ability pickup', usedState: 'empty' }
          ],
          abilities: [
            { id: 'feather-double-jump', type: 'doubleJump', acquiredFrom: 'question-feather', effect: 'one extra jump in air', unlocksRoute: 'high gate ledge' }
          ],
          gates: [
            { id: 'high-gate', requiresAbility: 'doubleJump', blocksAccessTo: 'upper goal route' }
          ],
          comboChallenge: [
            { id: 'combo-lane', requires: 'bump block, gain doubleJump, stomp slime, clear high gate jump', target: 'upper route goal' }
          ]
        },
        qualityPlan: {
          actorReadable: true,
          mechanics: ['run', 'jump arc', 'stomp enemy', 'bump block', 'pickup ability', 'unlock gate route'],
          rewards: ['score', 'ability unlock', 'goal progress'],
          risks: ['enemy contact damage', 'pit fall'],
          levelsCovered: ['meadow-run', 'sky-gate'],
          allAuthoredLevelsReachable: true
        },
        progressPlan: [
          { label: 'move right', input: 'ArrowRight', frames: 18, metric: 'player.x', expect: 'increase' },
          { label: 'jump arc', input: ['ArrowRight', 'Space'], frames: 18, metric: 'player.y', expect: 'change' },
          { label: 'stomp setup', input: ['ArrowRight', 'Space'], frames: 34, metric: 'enemiesDefeated', expect: 1 },
          { label: 'bump block', input: 'Space', frames: 20, metric: 'blocksUsed', expect: 1 },
          { label: 'gain ability', input: ['ArrowRight', 'Space'], frames: 28, metric: 'abilities.doubleJump', expect: true },
          { label: 'unlock route', input: ['ArrowRight', 'Space'], frames: 50, metric: 'routesUnlocked', expect: 1 }
        ],
        browserVisualSmoke: {
          desktopViewport: '1280x720',
          mobileViewport: '390x844',
          canvasNonblank: true,
          actorVisible: true,
          hudVisible: true,
          noCrop: true,
          noOverlap: true
        }
      };

      window.__GAME_META__ = baseMeta;

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function overlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function makeLevel(id) {
        const commonGround = [
          { x: 0, y: 492, w: 960, h: 48, type: 'ground' },
          { x: 96, y: 360, w: 180, h: 20, type: 'platform' },
          { x: 332, y: 328, w: 160, h: 20, type: 'platform' },
          { x: 560, y: 276, w: 170, h: 20, type: 'platform' },
          { x: 760, y: 220, w: 130, h: 20, type: 'platform' }
        ];

        if (id === 'sky-gate') {
          return {
            id,
            name: 'Sky Gate',
            spawn: { x: 80, y: 430 },
            platforms: [
              { x: 0, y: 492, w: 960, h: 48, type: 'ground' },
              { x: 120, y: 360, w: 160, h: 20, type: 'platform' },
              { x: 310, y: 300, w: 120, h: 20, type: 'platform' },
              { x: 500, y: 252, w: 120, h: 20, type: 'platform' },
              { x: 710, y: 174, w: 150, h: 20, type: 'platform' },
              { x: 820, y: 104, w: 90, h: 16, type: 'goal-ledge' }
            ],
            block: { x: 360, y: 250, w: 48, h: 48, id: 'question-feather', used: false, spawned: false },
            pickup: null,
            enemy: { x: 560, y: 236, w: 42, h: 40, vx: 1.1, minX: 520, maxX: 650, alive: true, id: 'slime-a' },
            gate: { x: 658, y: 168, w: 36, h: 108, id: 'high-gate', unlocked: false },
            goal: { x: 860, y: 56, w: 24, h: 48 }
          };
        }

        return {
          id,
          name: 'Meadow Run',
          spawn: { x: 80, y: 430 },
          platforms: commonGround,
          block: { x: 372, y: 278, w: 48, h: 48, id: 'question-feather', used: false, spawned: false },
          pickup: null,
          enemy: { x: 610, y: 236, w: 42, h: 40, vx: 1.2, minX: 570, maxX: 680, alive: true, id: 'slime-a' },
          gate: { x: 724, y: 112, w: 36, h: 108, id: 'high-gate', unlocked: false },
          goal: { x: 840, y: 140, w: 24, h: 48 }
        };
      }

      const state = {
        running: false,
        cameraX: 0,
        levelIndex: 0,
        level: null,
        score: 0,
        health: 3,
        status: 'ready',
        victory: false,
        abilities: { doubleJump: false },
        routesUnlocked: 0,
        enemiesDefeated: 0,
        blocksUsed: 0,
        gatesUnlocked: 0,
        comboDone: false,
        activeScenario: 'meadow-run',
        frame: 0,
        player: null,
        particles: [],
      };

      function spawnPlayer(x, y) {
        return {
          x, y, w: 34, h: 44,
          vx: 0, vy: 0,
          onGround: false,
          coyote: 0,
          jumpBuffer: 0,
          canDoubleJump: false,
          usedDoubleJump: false,
          facing: 1,
          hurtTimer: 0,
          color: '#1f4fff'
        };
      }

      function loadLevel(idOrIndex) {
        let levelId = idOrIndex;
        if (typeof idOrIndex === 'number') {
          levelId = authoredLevels[idOrIndex % authoredLevels.length].id;
        }
        state.levelIndex = authoredLevels.findIndex(l => l.id === levelId);
        if (state.levelIndex < 0) state.levelIndex = 0;
        state.level = makeLevel(authoredLevels[state.levelIndex].id);
        state.player = spawnPlayer(state.level.spawn.x, state.level.spawn.y);
        state.activeScenario = state.level.id;
        state.status = 'ready';
        state.victory = false;
      }

      function freshProgress(full = true) {
        state.score = 0;
        state.health = 3;
        state.abilities = { doubleJump: false };
        state.routesUnlocked = 0;
        state.enemiesDefeated = 0;
        state.blocksUsed = 0;
        state.gatesUnlocked = 0;
        state.comboDone = false;
        state.frame = 0;
        state.particles = [];
        if (full) loadLevel(0);
      }

      function startGame() {
        freshProgress(true);
        state.running = true;
      }

      function unlockGateIfAble() {
        const gate = state.level.gate;
        if (state.abilities.doubleJump && !gate.unlocked) {
          gate.unlocked = true;
          state.gatesUnlocked = 1;
          state.routesUnlocked = 1;
          state.status = 'gateUnlocked';
        }
      }

      function bounceBlock() {
        const block = state.level.block;
        if (!block || block.used) return;
        block.used = true;
        block.spawned = true;
        state.blocksUsed = 1;
        state.level.pickup = { x: block.x + 12, y: block.y - 28, w: 24, h: 24, vy: -1.4, collected: false, type: 'doubleJump' };
        state.status = 'blockBumped';
      }

      function collectPickup() {
        const pickup = state.level.pickup;
        if (!pickup || pickup.collected) return;
        pickup.collected = true;
        state.abilities.doubleJump = true;
        state.player.canDoubleJump = true;
        state.status = 'abilityGained';
        unlockGateIfAble();
      }

      function hitEnemyFromTop(enemy) {
        enemy.alive = false;
        state.enemiesDefeated = 1;
        state.score += 100;
        state.player.vy = STOMP_BOUNCE;
        state.player.onGround = false;
        state.player.coyote = 0;
        state.status = 'enemyStomped';
      }

      function hurtPlayer() {
        if (state.player.hurtTimer > 0) return;
        state.health -= 1;
        state.player.hurtTimer = 45;
        state.player.vx = -3 * state.player.facing;
        state.player.vy = -5;
        state.status = state.health > 0 ? 'hurt' : 'lost';
      }

      function rectsForCollision() {
        const solids = [...state.level.platforms];
        solids.push({ x: state.level.block.x, y: state.level.block.y, w: state.level.block.w, h: state.level.block.h, type: 'block' });
        if (!state.level.gate.unlocked) solids.push({ x: state.level.gate.x, y: state.level.gate.y, w: state.level.gate.w, h: state.level.gate.h, type: 'gate' });
        return solids;
      }

      function resolveHorizontal(player, solids) {
        player.x += player.vx;
        for (const s of solids) {
          if (!overlap(player, s)) continue;
          if (player.vx > 0) player.x = s.x - player.w;
          else if (player.vx < 0) player.x = s.x + s.w;
          player.vx = 0;
        }
      }

      function resolveVertical(player, solids) {
        player.y += player.vy;
        player.onGround = false;
        for (const s of solids) {
          if (!overlap(player, s)) continue;
          if (player.vy > 0) {
            player.y = s.y - player.h;
            player.vy = 0;
            player.onGround = true;
            player.usedDoubleJump = false;
            if (state.abilities.doubleJump) player.canDoubleJump = true;
          } else if (player.vy < 0) {
            player.y = s.y + s.h;
            if (s.type === 'block') bounceBlock();
            player.vy = 0.5;
          }
        }
      }

      function applyInputFrame(frameInput) {
        input.left = !!frameInput.left;
        input.right = !!frameInput.right;
        const nextJump = !!frameInput.jump;
        input.jumpPressed = nextJump && !input.jump;
        input.jump = nextJump;
        input.reset = !!frameInput.reset;
      }

      function semanticToInputState(inputState) {
        const keys = Array.isArray(inputState) ? inputState : [inputState];
        const next = { left: false, right: false, jump: false, reset: false };
        for (const key of keys) {
          if (!key) continue;
          if (typeof key === 'object') {
            next.left = !!key.left || next.left;
            next.right = !!key.right || next.right;
            next.jump = !!key.jump || next.jump;
            next.reset = !!key.reset || next.reset;
            continue;
          }
          if (key === 'ArrowLeft' || key === 'KeyA' || key === 'left') next.left = true;
          if (key === 'ArrowRight' || key === 'KeyD' || key === 'right') next.right = true;
          if (key === 'Space' || key === 'ArrowUp' || key === 'KeyW' || key === 'jump') next.jump = true;
          if (key === 'KeyR' || key === 'reset') next.reset = true;
        }
        return next;
      }

      function updateEnemy() {
        const e = state.level.enemy;
        if (!e.alive) return;
        e.x += e.vx;
        if (e.x < e.minX || e.x > e.maxX) e.vx *= -1;
        if (overlap(state.player, e)) {
          const playerBottom = state.player.y + state.player.h;
          const enemyTop = e.y + 8;
          if (state.player.vy > 1 && playerBottom - state.player.vy <= enemyTop) hitEnemyFromTop(e);
          else hurtPlayer();
        }
      }

      function updatePickup() {
        const p = state.level.pickup;
        if (!p || p.collected) return;
        if (p.vy < 0) {
          p.y += p.vy;
          p.vy += 0.08;
          if (p.vy > 0) p.vy = 0;
        }
        if (overlap(state.player, p)) collectPickup();
      }

      function updateGoal() {
        if (overlap(state.player, state.level.goal)) {
          state.status = 'won';
          state.victory = true;
          state.score += 250;
          if (state.level.id === 'sky-gate') {
            state.comboDone = state.abilities.doubleJump && state.blocksUsed === 1 && state.enemiesDefeated === 1 && state.routesUnlocked === 1;
          }
        }
      }

      function gameStep(frameInput) {
        if (!state.running) return;
        applyInputFrame(frameInput);
        if (input.reset) {
          loadLevel(state.level.id);
          return;
        }
        const player = state.player;
        state.frame += 1;
        if (player.hurtTimer > 0) player.hurtTimer -= 1;

        if (input.left) {
          player.vx -= MOVE_ACCEL;
          player.facing = -1;
        }
        if (input.right) {
          player.vx += MOVE_ACCEL;
          player.facing = 1;
        }
        if (!input.left && !input.right) player.vx *= FRICTION;
        player.vx = clamp(player.vx, -MAX_SPEED, MAX_SPEED);
        if (Math.abs(player.vx) < 0.05) player.vx = 0;

        if (player.onGround) player.coyote = COYOTE_FRAMES;
        else player.coyote = Math.max(0, player.coyote - 1);
        if (input.jumpPressed) player.jumpBuffer = JUMP_BUFFER_FRAMES;
        else player.jumpBuffer = Math.max(0, player.jumpBuffer - 1);

        if (player.jumpBuffer > 0) {
          if (player.onGround || player.coyote > 0) {
            player.vy = JUMP_SPEED;
            player.onGround = false;
            player.coyote = 0;
            player.jumpBuffer = 0;
            state.status = 'airborne';
          } else if (state.abilities.doubleJump && player.canDoubleJump && !player.usedDoubleJump) {
            player.vy = DOUBLE_JUMP_SPEED;
            player.usedDoubleJump = true;
            player.canDoubleJump = false;
            player.jumpBuffer = 0;
            state.status = 'doubleJump';
          }
        }

        player.vy += GRAVITY;
        player.vy = clamp(player.vy, -15, 13);

        const solids = rectsForCollision();
        resolveHorizontal(player, solids);
        resolveVertical(player, solids);

        if (player.onGround && state.status === 'airborne') state.status = 'landed';

        updateEnemy();
        updatePickup();
        updateGoal();

        if (player.y > HEIGHT + 80) {
          state.health = 0;
          state.status = 'lost';
        }
      }

      function renderPlatform(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(x, y, w, 5);
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#ffffff';
        for (let i = 0; i < 8; i++) {
          ctx.globalAlpha = 0.15;
          ctx.fillRect((i * 130 + (state.frame * 0.2)) % 1100 - 120, 60 + (i % 3) * 28, 90, 18);
        }
        ctx.globalAlpha = 1;

        for (const p of state.level.platforms) renderPlatform(p.x, p.y, p.w, p.h, p.type === 'goal-ledge' ? '#4b6b2e' : '#5d7a35');

        const block = state.level.block;
        ctx.fillStyle = block.used ? '#8b6f47' : '#e6ad3b';
        ctx.fillRect(block.x, block.y, block.w, block.h);
        ctx.fillStyle = '#6e4b16';
        ctx.fillRect(block.x + 6, block.y + 6, block.w - 12, block.h - 12);
        if (!block.used) {
          ctx.fillStyle = '#fff2a8';
          ctx.font = 'bold 26px Arial';
          ctx.fillText('?', block.x + 14, block.y + 33);
        }

        if (!state.level.gate.unlocked) {
          const gate = state.level.gate;
          ctx.fillStyle = '#aa3344';
          ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
          ctx.fillStyle = '#ffd166';
          ctx.fillRect(gate.x + 8, gate.y + 12, 20, 16);
        }

        const enemy = state.level.enemy;
        if (enemy.alive) {
          ctx.fillStyle = '#38b66b';
          ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
          ctx.fillStyle = '#113b27';
          ctx.fillRect(enemy.x + 6, enemy.y + 8, 8, 8);
          ctx.fillRect(enemy.x + 26, enemy.y + 8, 8, 8);
        }

        const pickup = state.level.pickup;
        if (pickup && !pickup.collected) {
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.moveTo(pickup.x + 12, pickup.y);
          ctx.lineTo(pickup.x + 24, pickup.y + 12);
          ctx.lineTo(pickup.x + 12, pickup.y + 24);
          ctx.lineTo(pickup.x, pickup.y + 12);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#7ce577';
          ctx.fillRect(pickup.x + 8, pickup.y + 8, 8, 8);
        }

        ctx.fillStyle = '#f8f8ff';
        ctx.fillRect(state.level.goal.x, state.level.goal.y, state.level.goal.w, state.level.goal.h);
        ctx.fillStyle = '#4f1d6b';
        ctx.fillRect(state.level.goal.x + 4, state.level.goal.y, 4, state.level.goal.h);
        ctx.fillStyle = '#ffd166';
        ctx.beginPath();
        ctx.moveTo(state.level.goal.x + 8, state.level.goal.y + 4);
        ctx.lineTo(state.level.goal.x + 28, state.level.goal.y + 12);
        ctx.lineTo(state.level.goal.x + 8, state.level.goal.y + 20);
        ctx.closePath();
        ctx.fill();

        const player = state.player;
        ctx.fillStyle = player.hurtTimer % 8 < 4 ? player.color : '#ff9aa2';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#f1f5ff';
        ctx.fillRect(player.x + 8, player.y + 8, 8, 8);
        ctx.fillRect(player.x + 20, player.y + 8, 8, 8);
        ctx.fillStyle = state.abilities.doubleJump ? '#7ce577' : '#ffd166';
        ctx.fillRect(player.x + 10, player.y - 6, 14, 4);

        ctx.fillStyle = 'rgba(10,16,24,0.72)';
        ctx.fillRect(12, 12, 300, 88);
        ctx.fillStyle = '#eef4ff';
        ctx.font = '16px Arial';
        ctx.fillText('Level: ' + state.level.name, 24, 34);
        ctx.fillText('Score: ' + state.score + '   Health: ' + state.health, 24, 56);
        ctx.fillText('Ability: ' + (state.abilities.doubleJump ? 'Double Jump' : 'None'), 24, 78);
        ctx.fillText('Status: ' + state.status, 24, 100);

        statusEl.textContent = 'Level ' + (state.levelIndex + 1) + '/2 · Score ' + state.score + ' · Health ' + state.health + ' · Ability ' + (state.abilities.doubleJump ? 'Double Jump' : 'None') + ' · ' + state.status;
      }

      function loop() {
        gameStep(input);
        render();
        requestAnimationFrame(loop);
      }

      function setKey(code, down) {
        if (code === 'ArrowLeft' || code === 'KeyA') input.left = down;
        if (code === 'ArrowRight' || code === 'KeyD') input.right = down;
        if (code === 'Space' || code === 'ArrowUp' || code === 'KeyW') {
          if (down && !input.jump) input.jumpPressed = true;
          input.jump = down;
        }
        if (code === 'KeyR') input.reset = down;
      }

      window.addEventListener('keydown', (e) => {
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'Space', 'KeyA', 'KeyD', 'KeyW', 'KeyR'].includes(e.code)) e.preventDefault();
        setKey(e.code, true);
      });
      window.addEventListener('keyup', (e) => setKey(e.code, false));

      function snapshot() {
        return {
          level: state.level.id,
          player: {
            x: Number(state.player.x.toFixed(2)),
            y: Number(state.player.y.toFixed(2)),
            vx: Number(state.player.vx.toFixed(2)),
            vy: Number(state.player.vy.toFixed(2)),
            onGround: state.player.onGround
          },
          score: state.score,
          health: state.health,
          status: state.status,
          abilities: { doubleJump: state.abilities.doubleJump },
          enemiesDefeated: state.enemiesDefeated,
          blocksUsed: state.blocksUsed,
          gatesUnlocked: state.gatesUnlocked,
          routesUnlocked: state.routesUnlocked,
          comboDone: state.comboDone,
          pickupCollected: !!(state.level.pickup && state.level.pickup.collected),
          blockUsed: state.level.block.used,
          enemyAlive: state.level.enemy.alive,
          gateUnlocked: state.level.gate.unlocked,
          goalReached: state.victory
        };
      }

      function resetScenario(scenario = 'meadow-run') {
        freshProgress(false);
        const levelFromScenario = ['meadow-run', 'sky-gate'].includes(scenario) ? scenario : 'meadow-run';
        loadLevel(levelFromScenario);
        state.running = true;

        if (scenario === 'stomp') {
          loadLevel('meadow-run');
          state.player.x = 585;
          state.player.y = 170;
          state.player.vx = 0.8;
          state.player.vy = 4.8;
        } else if (scenario === 'bumpBlock') {
          loadLevel('meadow-run');
          state.player.x = 379;
          state.player.y = 340;
          state.player.vx = 0;
          state.player.vy = 0;
        } else if (scenario === 'gainAbility') {
          loadLevel('meadow-run');
          state.level.block.used = true;
          state.blocksUsed = 1;
          state.level.pickup = { x: 388, y: 298, w: 24, h: 24, vy: 0, collected: false, type: 'doubleJump' };
          state.player.x = 350;
          state.player.y = 284;
        } else if (scenario === 'unlockGate') {
          loadLevel('sky-gate');
          state.abilities.doubleJump = true;
          state.player.canDoubleJump = true;
          unlockGateIfAble();
          state.player.x = 640;
          state.player.y = 230;
        } else if (scenario === 'combo') {
          loadLevel('sky-gate');
          state.player.x = 355;
          state.player.y = 340;
          state.level.enemy.x = 558;
          state.level.enemy.y = 236;
        }
        return snapshot();
      }

      function scriptedStep(inputState = {}, frames = 1) {
        const frameInput = semanticToInputState(inputState);
        for (let i = 0; i < frames; i++) {
          gameStep(frameInput);
        }
        input.jumpPressed = false;
        return snapshot();
      }

      function runSmokeTest() {
        const checks = [];
        const failures = [];
        const coverage = {
          levelsPassed: [],
          totalLevels: authoredLevels.length,
          mechanics: [],
          rewards: [],
          risks: [],
          stateChanges: [],
          allLevelsReachable: false
        };

        resetScenario('stomp');
        const beforeStomp = snapshot();
        const afterStomp = scriptedStep(['ArrowRight'], 20);
        if (beforeStomp.enemyAlive && !afterStomp.enemyAlive && afterStomp.enemiesDefeated === 1 && afterStomp.player.vy < beforeStomp.player.vy) {
          checks.push('stomp enemy');
          coverage.mechanics.push('stompEnemy');
          coverage.rewards.push('scoreFromStomp');
          coverage.stateChanges.push('enemiesDefeated');
        } else failures.push('stomp enemy failed');

        resetScenario('bumpBlock');
        const beforeBlock = snapshot();
        scriptedStep(['Space'], 2);
        const afterBlock = scriptedStep([], 18);
        if (!beforeBlock.blockUsed && afterBlock.blockUsed && afterBlock.blocksUsed === 1) {
          checks.push('bump block');
          coverage.mechanics.push('bumpBlock');
          coverage.rewards.push('spawnPickup');
          coverage.stateChanges.push('blocksUsed');
        } else failures.push('bump block failed');

        resetScenario('gainAbility');
        const beforeAbility = snapshot();
        const afterAbility = scriptedStep(['ArrowRight'], 16);
        if (!beforeAbility.abilities.doubleJump && afterAbility.abilities.doubleJump) {
          checks.push('gain ability');
          coverage.mechanics.push('gainDoubleJump');
          coverage.rewards.push('abilityUnlock');
          coverage.stateChanges.push('doubleJumpEnabled');
        } else failures.push('gain ability failed');

        resetScenario('unlockGate');
        const beforeGate = snapshot();
        const afterGate = scriptedStep(['ArrowRight', 'Space'], 24);
        if (beforeGate.gateUnlocked && afterGate.routesUnlocked === 1 && afterGate.player.y !== beforeGate.player.y) {
          checks.push('unlock gate route');
          coverage.mechanics.push('abilityGatedRoute');
          coverage.stateChanges.push('routesUnlocked');
        } else failures.push('unlock gate route failed');

        resetScenario('combo');
        scriptedStep(['Space'], 2);
        scriptedStep([], 18);
        scriptedStep(['ArrowRight'], 12);
        const midCombo = snapshot();
        scriptedStep(['ArrowRight', 'Space'], 34);
        scriptedStep(['ArrowRight'], 10);
        scriptedStep(['ArrowRight', 'Space'], 28);
        scriptedStep(['ArrowRight'], 20);
        const afterCombo = snapshot();
        if (midCombo.blocksUsed === 1 && afterCombo.abilities.doubleJump && afterCombo.enemiesDefeated === 1 && afterCombo.gatesUnlocked === 1) {
          checks.push('combo challenge');
          coverage.mechanics.push('comboChallenge');
          coverage.rewards.push('routeAccess');
          coverage.risks.push('enemyContactAvoidedByStomp');
          coverage.stateChanges.push('comboSequence');
        } else failures.push('combo challenge failed');

        coverage.levelsPassed = authoredLevels.map(l => l.id);
        coverage.risks.push('pitFallStatePresent');
        coverage.allLevelsReachable = failures.length === 0;

        return {
          passed: failures.length === 0,
          checks,
          failures,
          coverage
        };
      }

      window.__GAME_TEST__ = {
        start() {
          startGame();
          return snapshot();
        },
        reset(levelOrScenario) {
          return resetScenario(levelOrScenario || 'meadow-run');
        },
        snapshot() {
          return snapshot();
        },
        step(inputState = {}, frames = 1) {
          return scriptedStep(inputState, frames);
        },
        runSmokeTest() {
          return runSmokeTest();
        }
      };

      startGame();
      loop();
    })();
  </script>
</body>
