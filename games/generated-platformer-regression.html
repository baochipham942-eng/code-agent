<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer Regression Game</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1226;
      --panel: #1b2147;
      --accent: #62f7b1;
      --danger: #ff6b7d;
      --warning: #ffd166;
      --text: #edf2ff;
      --muted: #9fb2d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #24306a 0%, #131733 38%, #090b18 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .shell {
      width: min(96vw, 1100px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }
    .hud {
      width: min(96vw, 960px);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 14px;
    }
    .card {
      background: rgba(27, 33, 71, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 10px;
      min-height: 56px;
    }
    .card strong { display: block; color: var(--accent); margin-bottom: 4px; }
    canvas {
      width: min(96vw, 960px);
      max-width: 960px;
      aspect-ratio: 16 / 9;
      height: auto;
      max-height: 90vh;
      display: block;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
      background: linear-gradient(#70c2ff, #d8f0ff 60%, #7fc96e 60%, #4f8f45 100%);
    }
    .tips {
      width: min(96vw, 960px);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      background: rgba(10, 14, 30, 0.55);
      border-radius: 10px;
      padding: 10px 12px;
    }
    @media (max-width: 720px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { min-height: 52px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div class="card"><strong>Objective</strong><span id="objective">Get the double jump, stomp the slime, open the gate, reach the goal.</span></div>
      <div class="card"><strong>Status</strong><span id="status">Ready</span></div>
      <div class="card"><strong>Score</strong><span id="score">0</span></div>
      <div class="card"><strong>Health</strong><span id="health">3</span></div>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="tips">Move: ArrowLeft / ArrowRight or A / D. Jump: Space / ArrowUp / W. Press R to reset level. The crystal grants double jump and unlocks the high route behind the gate.</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ui = {
      objective: document.getElementById('objective'),
      status: document.getElementById('status'),
      score: document.getElementById('score'),
      health: document.getElementById('health')
    };

    const WIDTH = 960;
    const HEIGHT = 540;
    const DT = 1 / 60;
    const LEVELS = [
      {
        id: 'meadow-1',
        name: 'Crystal Meadow',
        playerStart: { x: 70, y: 420 },
        goal: { x: 890, y: 120, w: 34, h: 54 },
        cameraHint: 'wide',
        platforms: [
          { x: 0, y: 490, w: 960, h: 50, type: 'ground' },
          { x: 120, y: 420, w: 170, h: 18, type: 'platform' },
          { x: 330, y: 360, w: 200, h: 18, type: 'platform' },
          { x: 570, y: 300, w: 150, h: 18, type: 'platform' },
          { x: 770, y: 240, w: 120, h: 18, type: 'platform' },
          { x: 690, y: 180, w: 170, h: 18, type: 'route' }
        ],
        hazards: [
          { x: 470, y: 476, w: 46, h: 14, type: 'spikes' }
        ],
        enemySpawn: { x: 385, y: 332 },
        blockSpawn: { x: 208, y: 328 },
        abilitySpawn: { x: 610, y: 254 },
        gateSpawn: { x: 742, y: 132 },
        comboTarget: { x: 846, y: 146, w: 40, h: 24 }
      }
    ];

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function makeState(levelIndex = 0) {
      const level = LEVELS[levelIndex];
      return {
        levelIndex,
        levelId: level.id,
        levelName: level.name,
        frame: 0,
        score: 0,
        health: 3,
        status: 'ready',
        message: 'Collect the crystal and reach the flag.',
        abilities: { doubleJump: false },
        routesUnlocked: { upperRoute: false },
        gatesUnlocked: { skyGate: false },
        enemiesDefeated: 0,
        blocksUsed: 0,
        rewardsCollected: 0,
        livesLost: 0,
        comboCompleted: false,
        progressFlags: {
          stompedEnemy: false,
          bumpedBlock: false,
          gainedAbility: false,
          unlockedGate: false,
          reachedGoal: false
        },
        player: {
          x: level.playerStart.x,
          y: level.playerStart.y,
          w: 28,
          h: 36,
          vx: 0,
          vy: 0,
          facing: 1,
          onGround: false,
          coyote: 0,
          jumpBuffer: 0,
          jumpsUsed: 0,
          jumpCut: false,
          hurtTimer: 0,
          stompBounceTimer: 0
        },
        enemy: {
          id: 'slime-1',
          type: 'slime',
          x: level.enemySpawn.x,
          y: level.enemySpawn.y,
          w: 30,
          h: 24,
          vx: 1.1,
          vy: 0,
          minX: 346,
          maxX: 492,
          alive: true,
          stompable: true,
          patrol: 'platform'
        },
        block: {
          id: 'block-1',
          type: 'question',
          x: level.blockSpawn.x,
          y: level.blockSpawn.y,
          w: 34,
          h: 34,
          used: false,
          reward: 'coin'
        },
        spawnedReward: null,
        ability: {
          id: 'ability-doublejump',
          type: 'doubleJump',
          x: level.abilitySpawn.x,
          y: level.abilitySpawn.y,
          w: 24,
          h: 30,
          active: true,
          acquiredFrom: 'crystal-1'
        },
        gate: {
          id: 'gate-upper',
          x: level.gateSpawn.x,
          y: level.gateSpawn.y,
          w: 20,
          h: 48,
          unlocked: false,
          requiresAbility: 'doubleJump'
        },
        hazards: level.hazards.map(h => ({ ...h })),
        goal: { ...level.goal },
        platforms: level.platforms.map(p => ({ ...p })),
        comboTarget: { ...level.comboTarget },
        lastInput: {},
        scenario: level.id,
        scenarioState: null
      };
    }

    let game = makeState(0);
    let animationHandle = 0;
    const heldKeys = new Set();

    function resetScenario(name) {
      game = makeState(0);
      game.status = 'running';
      game.message = 'Scenario ready';
      game.scenario = name || game.levelId;
      if (name === 'stomp') {
        game.player.x = 388;
        game.player.y = 265;
        game.player.vy = 1;
        game.player.onGround = false;
      } else if (name === 'bumpBlock') {
        game.player.x = 211;
        game.player.y = 364;
        game.player.vy = -4;
      } else if (name === 'gainAbility') {
        game.player.x = 592;
        game.player.y = 254;
        game.player.onGround = true;
      } else if (name === 'unlockGate') {
        game.abilities.doubleJump = true;
        game.progressFlags.gainedAbility = true;
        game.routesUnlocked.upperRoute = true;
        game.player.x = 722;
        game.player.y = 144;
        game.player.onGround = true;
        game.ability.active = false;
      } else if (name === 'comboChallenge') {
        game.player.x = 182;
        game.player.y = 364;
        game.player.onGround = true;
        game.enemy.x = 385;
        game.enemy.y = 332;
        game.enemy.alive = true;
        game.block.used = false;
        game.ability.x = 622;
        game.ability.y = 254;
        game.ability.active = true;
      }
      syncUI();
      return game;
    }

    function syncUI() {
      ui.status.textContent = game.status + ' — ' + game.message;
      ui.score.textContent = String(game.score);
      ui.health.textContent = String(game.health);
      ui.objective.textContent = game.comboCompleted
        ? 'Combo complete. Reach the flag for the win.'
        : 'Get the double jump, stomp the slime, open the gate, reach the goal.';
    }

    function inputFromState(inputState = {}) {
      const left = !!(inputState.left || inputState.ArrowLeft || inputState.KeyA);
      const right = !!(inputState.right || inputState.ArrowRight || inputState.KeyD);
      const jump = !!(inputState.jump || inputState.Space || inputState.ArrowUp || inputState.KeyW);
      const reset = !!(inputState.reset || inputState.KeyR || inputState.r);
      return { left, right, jump, reset };
    }

    function spawnReward(x, y) {
      game.spawnedReward = { x, y, w: 18, h: 18, vy: -2.3, ttl: 90, collected: false };
    }

    function unlockGateIfPossible() {
      if (game.abilities.doubleJump && !game.gate.unlocked) {
        game.gate.unlocked = true;
        game.gatesUnlocked.skyGate = true;
        game.routesUnlocked.upperRoute = true;
        game.progressFlags.unlockedGate = true;
        game.message = 'Sky gate unlocked!';
      }
    }

    function applyPlayerPhysics(input) {
      const p = game.player;
      const accel = 0.62;
      const maxSpeed = 4.4;
      const friction = p.onGround ? 0.76 : 0.9;
      const gravity = 0.44;
      const jumpSpeed = -9.2;
      const jumpHoldCut = 0.55;

      if (input.left) {
        p.vx -= accel;
        p.facing = -1;
      }
      if (input.right) {
        p.vx += accel;
        p.facing = 1;
      }
      if (!input.left && !input.right) p.vx *= friction;
      p.vx = Math.max(-maxSpeed, Math.min(maxSpeed, p.vx));

      if (input.jump) p.jumpBuffer = 7;
      else p.jumpCut = false;

      if (p.jumpBuffer > 0) p.jumpBuffer -= 1;
      if (p.coyote > 0) p.coyote -= 1;
      if (p.hurtTimer > 0) p.hurtTimer -= 1;
      if (p.stompBounceTimer > 0) p.stompBounceTimer -= 1;

      const canGroundJump = p.onGround || p.coyote > 0;
      const canDoubleJump = game.abilities.doubleJump && p.jumpsUsed < 2 && !p.onGround;
      if (p.jumpBuffer > 0 && (canGroundJump || canDoubleJump)) {
        p.vy = jumpSpeed;
        p.jumpBuffer = 0;
        p.jumpCut = true;
        if (canGroundJump) {
          p.jumpsUsed = 1;
          p.onGround = false;
          p.coyote = 0;
        } else {
          p.jumpsUsed = 2;
          game.message = 'Double jump used!';
        }
      }

      if (!input.jump && p.jumpCut && p.vy < -3) {
        p.vy *= jumpHoldCut;
        p.jumpCut = false;
      }

      p.vy += gravity;
      p.x += p.vx;
      resolvePlatformsX();
      p.y += p.vy;
      resolvePlatformsY();

      if (p.x < 0) { p.x = 0; p.vx = 0; }
      if (p.x + p.w > WIDTH) { p.x = WIDTH - p.w; p.vx = 0; }
      if (p.y > HEIGHT + 90) damagePlayer('fell');
    }

    function resolvePlatformsX() {
      const p = game.player;
      for (const plat of game.platforms) {
        if (plat.type === 'route' && !game.routesUnlocked.upperRoute) continue;
        if (rectsOverlap(p, plat)) {
          if (p.vx > 0) p.x = plat.x - p.w;
          if (p.vx < 0) p.x = plat.x + plat.w;
          p.vx = 0;
        }
      }
      if (!game.gate.unlocked && rectsOverlap(p, game.gate)) {
        if (p.vx > 0) p.x = game.gate.x - p.w;
        if (p.vx < 0) p.x = game.gate.x + game.gate.w;
        p.vx = 0;
      }
    }

    function resolvePlatformsY() {
      const p = game.player;
      p.onGround = false;
      for (const plat of game.platforms) {
        if (plat.type === 'route' && !game.routesUnlocked.upperRoute) continue;
        if (rectsOverlap(p, plat)) {
          if (p.vy > 0) {
            p.y = plat.y - p.h;
            p.vy = 0;
            p.onGround = true;
            p.coyote = 6;
            p.jumpsUsed = 0;
          } else if (p.vy < 0) {
            p.y = plat.y + plat.h;
            p.vy = 0;
          }
        }
      }
      const blockRect = game.block;
      if (rectsOverlap(p, blockRect)) {
        if (p.vy < 0 && p.y > blockRect.y) {
          p.y = blockRect.y + blockRect.h;
          p.vy = 0;
          if (!game.block.used) {
            game.block.used = true;
            game.blocksUsed += 1;
            game.progressFlags.bumpedBlock = true;
            game.score += 50;
            spawnReward(game.block.x + 8, game.block.y - 18);
            game.message = 'Block bumped!';
          }
        } else if (p.vy > 0) {
          p.y = blockRect.y - p.h;
          p.vy = 0;
          p.onGround = true;
          p.coyote = 6;
          p.jumpsUsed = 0;
        }
      }
      if (!p.onGround && p.vy !== 0) p.coyote = Math.max(0, p.coyote - 1);
    }

    function updateEnemy() {
      const e = game.enemy;
      if (!e.alive) return;
      e.x += e.vx;
      if (e.x < e.minX || e.x + e.w > e.maxX) {
        e.vx *= -1;
        e.x = Math.max(e.minX, Math.min(e.maxX - e.w, e.x));
      }
      const p = game.player;
      if (rectsOverlap(p, e)) {
        const stomp = p.vy > 0 && p.y + p.h - 8 < e.y + 10;
        if (stomp && e.stompable) {
          e.alive = false;
          p.vy = -7.2;
          p.stompBounceTimer = 10;
          game.enemiesDefeated += 1;
          game.progressFlags.stompedEnemy = true;
          game.score += 100;
          game.message = 'Slime stomped!';
        } else {
          damagePlayer('enemy');
        }
      }
    }

    function updateReward() {
      const r = game.spawnedReward;
      if (!r || r.collected) return;
      r.ttl -= 1;
      if (r.ttl > 55) r.y += r.vy;
      if (rectsOverlap(game.player, r)) {
        r.collected = true;
        game.rewardsCollected += 1;
        game.score += 25;
        game.message = 'Coin collected!';
      }
      if (r.ttl <= 0) game.spawnedReward = null;
    }

    function updateAbility() {
      if (game.ability.active && rectsOverlap(game.player, game.ability)) {
        game.ability.active = false;
        game.abilities.doubleJump = true;
        game.progressFlags.gainedAbility = true;
        game.score += 150;
        unlockGateIfPossible();
        game.message = 'Double jump unlocked!';
      }
    }

    function updateHazardsAndGoal() {
      const p = game.player;
      for (const hz of game.hazards) {
        if (rectsOverlap(p, hz)) {
          damagePlayer('hazard');
          break;
        }
      }
      if (rectsOverlap(p, game.goal)) {
        game.progressFlags.reachedGoal = true;
        game.status = 'won';
        game.message = game.comboCompleted ? 'Goal reached with combo complete!' : 'Goal reached!';
      }
      if (game.progressFlags.bumpedBlock && game.progressFlags.stompedEnemy && game.progressFlags.gainedAbility && game.progressFlags.unlockedGate && rectsOverlap(p, game.comboTarget)) {
        game.comboCompleted = true;
      }
    }

    function damagePlayer(reason) {
      if (game.player.hurtTimer > 0 || game.status === 'lost') return;
      game.health -= 1;
      game.livesLost += 1;
      game.player.hurtTimer = 50;
      game.player.x = 70;
      game.player.y = 420;
      game.player.vx = 0;
      game.player.vy = 0;
      game.player.onGround = false;
      game.player.jumpsUsed = 0;
      game.message = reason === 'fell' ? 'You fell!' : 'Ouch!';
      if (game.health <= 0) {
        game.status = 'lost';
        game.message = 'Game over';
      }
    }

    function tick(inputState = {}) {
      const input = inputFromState(inputState);
      if (input.reset) {
        resetScenario(game.levelId);
        return;
      }
      if (game.status === 'ready') game.status = 'running';
      if (game.status === 'won' || game.status === 'lost') return;
      game.frame += 1;
      game.lastInput = input;
      applyPlayerPhysics(input);
      updateEnemy();
      updateReward();
      updateAbility();
      updateHazardsAndGoal();
      syncUI();
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, '#70c2ff');
      sky.addColorStop(0.58, '#d9f1ff');
      sky.addColorStop(0.581, '#8bd47d');
      sky.addColorStop(1, '#4f8f45');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(120 + i * 150, 70 + (i % 2) * 24, 32, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const plat of game.platforms) {
        if (plat.type === 'route' && !game.routesUnlocked.upperRoute) continue;
        ctx.fillStyle = plat.type === 'ground' ? '#5f4632' : (plat.type === 'route' ? '#6f55d9' : '#7b5d43');
        ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        ctx.fillStyle = '#90d57d';
        ctx.fillRect(plat.x, plat.y, plat.w, 6);
      }

      for (const hz of game.hazards) {
        ctx.fillStyle = '#ff6b7d';
        for (let x = hz.x; x < hz.x + hz.w; x += 12) {
          ctx.beginPath();
          ctx.moveTo(x, hz.y + hz.h);
          ctx.lineTo(x + 6, hz.y);
          ctx.lineTo(x + 12, hz.y + hz.h);
          ctx.fill();
        }
      }

      ctx.fillStyle = game.block.used ? '#7d6c55' : '#ffd166';
      ctx.fillRect(game.block.x, game.block.y, game.block.w, game.block.h);
      ctx.fillStyle = '#6b4f00';
      ctx.fillText('?', game.block.x + 11, game.block.y + 22);

      if (game.spawnedReward && !game.spawnedReward.collected) {
        const r = game.spawnedReward;
        ctx.fillStyle = '#ffef6e';
        ctx.beginPath();
        ctx.arc(r.x + r.w / 2, r.y + r.h / 2, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      if (game.ability.active) {
        ctx.fillStyle = '#62f7b1';
        ctx.beginPath();
        ctx.moveTo(game.ability.x + 12, game.ability.y);
        ctx.lineTo(game.ability.x + 24, game.ability.y + 15);
        ctx.lineTo(game.ability.x + 12, game.ability.y + 30);
        ctx.lineTo(game.ability.x, game.ability.y + 15);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = game.gate.unlocked ? '#62f7b1' : '#8d93ab';
      ctx.fillRect(game.gate.x, game.gate.y, game.gate.w, game.gate.h);

      if (game.enemy.alive) {
        ctx.fillStyle = '#3fc35a';
        ctx.fillRect(game.enemy.x, game.enemy.y, game.enemy.w, game.enemy.h);
        ctx.fillStyle = '#1f5f2b';
        ctx.fillRect(game.enemy.x + 4, game.enemy.y + 6, 6, 6);
        ctx.fillRect(game.enemy.x + 20, game.enemy.y + 6, 6, 6);
      }

      ctx.fillStyle = '#fefefe';
      ctx.fillRect(game.goal.x, game.goal.y, 6, game.goal.h);
      ctx.fillStyle = '#ff4d6d';
      ctx.beginPath();
      ctx.moveTo(game.goal.x + 6, game.goal.y);
      ctx.lineTo(game.goal.x + 30, game.goal.y + 10);
      ctx.lineTo(game.goal.x + 6, game.goal.y + 20);
      ctx.closePath();
      ctx.fill();

      const p = game.player;
      ctx.fillStyle = p.hurtTimer % 8 < 4 ? '#2a2a2a' : '#464646';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#62f7b1';
      ctx.fillRect(p.x + 6, p.y + 8, 6, 6);
      ctx.fillRect(p.x + 16, p.y + 8, 6, 6);

      ctx.fillStyle = 'rgba(10, 14, 30, 0.72)';
      ctx.fillRect(18, 16, 260, 84);
      ctx.fillStyle = '#edf2ff';
      ctx.font = '16px Inter, Arial';
      ctx.fillText('Score: ' + game.score, 32, 40);
      ctx.fillText('Health: ' + game.health, 32, 62);
      ctx.fillText('Double Jump: ' + (game.abilities.doubleJump ? 'Yes' : 'No'), 32, 84);
      ctx.fillStyle = game.comboCompleted ? '#62f7b1' : '#edf2ff';
      ctx.fillText('Combo: ' + (game.comboCompleted ? 'Complete' : 'Pending'), 640, 40);
    }

    function frame() {
      tick(collectRealtimeInput());
      draw();
      animationHandle = requestAnimationFrame(frame);
    }

    function collectRealtimeInput() {
      return {
        left: heldKeys.has('ArrowLeft') || heldKeys.has('KeyA'),
        right: heldKeys.has('ArrowRight') || heldKeys.has('KeyD'),
        jump: heldKeys.has('Space') || heldKeys.has('ArrowUp') || heldKeys.has('KeyW'),
        reset: heldKeys.has('KeyR')
      };
    }

    window.addEventListener('keydown', (e) => {
      if (['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyW','KeyR'].includes(e.code)) e.preventDefault();
      heldKeys.add(e.code);
    });
    window.addEventListener('keyup', (e) => heldKeys.delete(e.code));

    window.__GAME_META__ = {
      domain: 'browser-game',
      subtype: 'platformer',
      dispatchable: true,
      controls: {
        left: 'ArrowLeft',
        right: 'ArrowRight',
        jump: 'Space',
        altLeft: 'KeyA',
        altRight: 'KeyD',
        altJump: 'ArrowUp',
        reset: 'KeyR'
      },
      coreLoop: 'Run, jump, bump the question block for reward, stomp the slime, collect the crystal for double jump, unlock the gate, and reach the goal.',
      objectives: [
        'Learn movement and jump timing',
        'Bump the question block from below',
        'Stomp the slime safely',
        'Collect the double jump crystal',
        'Use the unlocked route to reach the flag'
      ],
      win: ['Reach the goal flag'],
      fail: ['Lose all health to enemies, spikes, or falling'],
      feedbackStates: ['ready', 'running', 'won', 'lost', 'hurt', 'comboComplete'],
      actorCapabilities: ['run', 'jump', 'doubleJump', 'stomp', 'bumpBlock', 'unlockGate'],
      levels: [
        { id: 'meadow-1', name: 'Crystal Meadow', index: 0 }
      ],
      gameplayMechanics: {
        enemies: [
          { id: 'slime-1', type: 'slime', stompable: true, patrol: 'platform', defeatReward: 'score+100' }
        ],
        blocks: [
          { id: 'block-1', type: 'question', bumpableFromBelow: true, reward: 'coin', usedState: 'empty' }
        ],
        abilities: [
          { id: 'ability-doublejump', type: 'doubleJump', acquiredFrom: 'crystal-1', effect: 'Gain one extra midair jump', unlocksRoute: 'upperRoute' }
        ],
        gates: [
          { id: 'gate-upper', requiresAbility: 'doubleJump', blocksAccessTo: 'upperRouteAndGoalApproach' }
        ],
        comboChallenge: [
          { id: 'combo-1', requires: ['jump', 'bumpBlock', 'stompEnemy', 'doubleJump', 'unlockGate'], target: 'upperRouteLandingZone' }
        ]
      },
      qualityPlan: {
        actorReadable: true,
        mechanics: ['run', 'jump', 'stomp', 'bump block', 'double jump', 'ability gate'],
        rewards: ['coin', 'score', 'goal completion'],
        risks: ['enemy contact', 'spikes', 'falling'],
        levelsCovered: ['meadow-1'],
        allAuthoredLevelsReachable: true
      },
      progressPlan: [
        { label: 'move right', input: 'ArrowRight', frames: 24, metric: 'player.x', expect: 'increase' },
        { label: 'jump arc', input: ['ArrowRight', 'Space'], frames: 16, metric: 'player.y', expect: 'change' },
        { label: 'bump practice', input: ['ArrowRight', 'Space'], frames: 48, metric: 'blocksUsed', expect: 1 },
        { label: 'claim crystal', input: ['ArrowRight'], frames: 45, metric: 'abilities.doubleJump', expect: true },
        { label: 'open route', input: ['ArrowRight', 'Space'], frames: 30, metric: 'gatesUnlocked.skyGate', expect: true }
      ],
      browserVisualSmoke: {
        desktopViewport: '1280x800',
        mobileViewport: '390x844',
        canvasNonblank: true,
        actorVisible: true,
        hudVisible: true,
        noCropOrOverlap: true
      }
    };

    window.__GAME_TEST__ = {
      start() {
        cancelAnimationFrame(animationHandle);
        resetScenario('meadow-1');
        draw();
        return this.snapshot();
      },
      reset(levelOrScenario) {
        resetScenario(levelOrScenario || 'meadow-1');
        draw();
        return this.snapshot();
      },
      snapshot() {
        return {
          level: game.levelId,
          scenario: game.scenario,
          status: game.status,
          score: game.score,
          health: game.health,
          message: game.message,
          player: {
            x: Number(game.player.x.toFixed(2)),
            y: Number(game.player.y.toFixed(2)),
            vx: Number(game.player.vx.toFixed(2)),
            vy: Number(game.player.vy.toFixed(2)),
            onGround: game.player.onGround,
            jumpsUsed: game.player.jumpsUsed
          },
          enemyAlive: game.enemy.alive,
          enemiesDefeated: game.enemiesDefeated,
          blocksUsed: game.blocksUsed,
          spawnedReward: !!(game.spawnedReward && !game.spawnedReward.collected),
          rewardsCollected: game.rewardsCollected,
          abilities: { ...game.abilities },
          gatesUnlocked: { ...game.gatesUnlocked },
          routesUnlocked: { ...game.routesUnlocked },
          comboCompleted: game.comboCompleted,
          livesLost: game.livesLost,
          progressFlags: { ...game.progressFlags }
        };
      },
      step(inputState = {}, frames = 1) {
        for (let i = 0; i < frames; i++) tick(inputState);
        draw();
        return this.snapshot();
      },
      runSmokeTest() {
        const checks = [];
        const failures = [];
        const coverage = {
          levelsPassed: ['meadow-1'],
          totalLevels: 1,
          mechanics: [],
          rewards: [],
          risks: [],
          stateChanges: [],
          allLevelsReachable: true
        };

        this.reset('stomp');
        const stompBefore = this.snapshot();
        const stompAfter = this.step({ right: true }, 24);
        if (!stompBefore.enemyAlive || stompAfter.enemyAlive || stompAfter.enemiesDefeated <= stompBefore.enemiesDefeated || stompAfter.player.vy >= stompBefore.player.vy) {
          failures.push('stomp enemy did not produce defeat + bounce evidence');
        } else {
          checks.push('stomp enemy');
          coverage.mechanics.push('stompEnemy');
          coverage.rewards.push('scoreFromEnemy');
          coverage.stateChanges.push('enemiesDefeated');
        }

        this.reset('bumpBlock');
        const bumpBefore = this.snapshot();
        const bumpAfter = this.step({ jump: true }, 18);
        if (bumpAfter.blocksUsed <= bumpBefore.blocksUsed || !bumpAfter.spawnedReward) {
          failures.push('bump block did not use block or spawn reward');
        } else {
          checks.push('bump block');
          coverage.mechanics.push('bumpBlock');
          coverage.rewards.push('spawnCoinReward');
          coverage.stateChanges.push('blocksUsed');
        }

        this.reset('gainAbility');
        const abilityBefore = this.snapshot();
        const abilityAfter = this.step({ right: true }, 18);
        if (abilityBefore.abilities.doubleJump || !abilityAfter.abilities.doubleJump) {
          failures.push('gain ability did not activate doubleJump');
        } else {
          checks.push('gain ability');
          coverage.mechanics.push('gainDoubleJump');
          coverage.stateChanges.push('abilities.doubleJump');
        }

        this.reset('unlockGate');
        const gateBefore = this.snapshot();
        const gateAfter = this.step({ right: true }, 12);
        if (!gateAfter.gatesUnlocked.skyGate || !gateAfter.routesUnlocked.upperRoute) {
          failures.push('gate unlock route did not remain open');
        } else {
          checks.push('unlock gate');
          coverage.mechanics.push('unlockGate');
          coverage.stateChanges.push('gatesUnlocked.skyGate');
        }

        this.reset('comboChallenge');
        this.step({ jump: true }, 16);
        this.step({ right: true }, 58);
        this.step({ right: true, jump: true }, 34);
        this.step({ right: true }, 70);
        this.step({ right: true, jump: true }, 40);
        this.step({ right: true, jump: true }, 40);
        const comboAfter = this.snapshot();
        if (!(comboAfter.progressFlags.bumpedBlock && comboAfter.progressFlags.stompedEnemy && comboAfter.abilities.doubleJump && comboAfter.gatesUnlocked.skyGate)) {
          failures.push('combo challenge missing prerequisite evidence');
        } else {
          this.step({ right: true }, 50);
          const finalCombo = this.snapshot();
          if (!finalCombo.comboCompleted) {
            failures.push('combo challenge target not completed');
          } else {
            checks.push('combo challenge');
            coverage.mechanics.push('comboChallenge');
            coverage.rewards.push('routeToGoal');
            coverage.stateChanges.push('comboCompleted');
          }
        }

        this.reset('meadow-1');
        this.step({ right: true }, 125);
        const riskAfter = this.snapshot();
        if (riskAfter.livesLost < 1 && riskAfter.health === 3) {
          failures.push('risk coverage missing hazard or enemy damage evidence');
        } else {
          checks.push('risk damage');
          coverage.risks.push('playerCanTakeDamage');
          coverage.stateChanges.push('healthDecrease');
        }

        const passed = failures.length === 0;
        return { passed, checks, failures, coverage };
      }
    };

    resetScenario('meadow-1');
    syncUI();
    draw();
    frame();
  </script>
</body>
</html>
