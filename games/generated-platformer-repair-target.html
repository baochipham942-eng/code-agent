<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platformer Regression Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            max-width: 100%;
            max-height: 80vh;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 16px;
            color: #fff;
            text-align: center;
            font-size: 14px;
        }
        #ui div { margin: 4px 0; }
        .key {
            display: inline-block;
            padding: 4px 8px;
            background: #4a4a6a;
            border-radius: 4px;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="ui">
        <div>Controls: <span class="key">&larr;</span><span class="key">&rarr;</span> Move | <span class="key">&uarr;</span> Jump | <span class="key">Space</span> Double Jump</div>
        <div id="status">Press SPACE to start</div>
    </div>

    <script>
        // ============ GAME STATE ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let gameState = {
            level: 'level1',
            status: 'idle',
            score: 0,
            lives: 3,
            time: 0
        };

        let player = {
            x: 100, y: 400,
            vx: 0, vy: 0,
            width: 32, height: 40,
            grounded: false,
            doubleJumpAvailable: false,
            hasShield: false,
            facing: 1,
            invincible: 0,
            dead: false
        };

        let level = {
            platforms: [],
            blocks: [],
            enemies: [],
            gates: [],
            collectibles: [],
            goal: null
        };

        let input = {
            left: false, right: false, up: false, jump: false, doubleJump: false
        };

        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const ACCELERATION = 0.8;
        const MAX_SPEED = 6;
        const JUMP_FORCE = -14;
        const DOUBLE_JUMP_FORCE = -12;

        // ============ LEVEL DEFINITIONS ============
        function loadLevel(name) {
            level = { platforms: [], blocks: [], enemies: [], gates: [], collectibles: [], goal: null };

            if (name === 'level1') {
                level.platforms.push({ x: 0, y: 550, width: 800, height: 50, type: 'ground' });
                level.platforms.push({ x: 200, y: 450, width: 150, height: 20, type: 'platform' });
                level.platforms.push({ x: 450, y: 350, width: 150, height: 20, type: 'platform' });
                level.platforms.push({ x: 650, y: 250, width: 150, height: 20, type: 'platform' });

                level.blocks.push({ x: 230, y: 410, width: 30, height: 30, type: 'question', used: false, reward: 'doubleJump' });
                level.blocks.push({ x: 480, y: 310, width: 30, height: 30, type: 'question', used: false, reward: 'coin' });

                level.enemies.push({ x: 300, y: 510, width: 30, height: 30, type: 'goomba', vx: -1, alive: true, defeated: false });
                level.enemies.push({ x: 550, y: 210, width: 30, height: 30, type: 'goomba', vx: 1, alive: true, defeated: false });

                level.gates.push({ x: 720, y: 200, width: 30, height: 350, type: 'gate', requiresAbility: 'doubleJump', open: false });

                level.goal = { x: 730, y: 150, width: 40, height: 50, reached: false };
            }
        }

        // ============ GAME LOOP ============
        function gameLoop() {
            if (gameState.status === 'playing' && !player.dead) {
                update();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Player movement
            if (input.left) {
                player.vx -= ACCELERATION;
                player.facing = -1;
            }
            if (input.right) {
                player.vx += ACCELERATION;
                player.facing = 1;
            }

            player.vx *= FRICTION;
            player.vy += GRAVITY;

            // Jump
            if (input.jump && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
            }

            // Double jump
            if (input.doubleJump && !player.grounded && player.doubleJumpAvailable) {
                player.vy = DOUBLE_JUMP_FORCE;
                player.doubleJumpAvailable = false;
            }

            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.vy = Math.max(-20, Math.min(20, player.vy));

            player.x += player.vx;
            player.y += player.vy;

            // Platform collision
            player.grounded = false;
            for (let plat of level.platforms) {
                if (player.x < plat.x + plat.width &&
                    player.x + player.width > plat.x &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.height + player.vy + 5 &&
                    player.vy >= 0) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpAvailable = true;
                }
            }

            // Block collision — bump from below OR land on top
            for (let block of level.blocks) {
                if (block.used) continue;
                const overlapX = player.x + player.width > block.x && player.x < block.x + block.width;
                if (!overlapX) continue;

                // Bump from below: player moving upward, top enters block underside
                if (player.vy < 0 &&
                    player.y < block.y + block.height &&
                    player.y + player.height > block.y) {
                    block.used = true;
                    player.y = block.y + block.height;
                    player.vy = 2;
                    if (block.reward === 'doubleJump') {
                        player.doubleJumpAvailable = true;
                        gameState.score += 100;
                    } else if (block.reward === 'coin') {
                        gameState.score += 50;
                    }
                }
                // Land on top of unused block (like a platform)
                else if (player.vy >= 0 &&
                    player.y + player.height > block.y &&
                    player.y + player.height < block.y + block.height + player.vy + 5) {
                    player.y = block.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }

            // Enemy collision
            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;

                // Stomp from above
                if (player.vy > 0 &&
                    player.x + player.width > enemy.x &&
                    player.x < enemy.x + enemy.width &&
                    player.y + player.height > enemy.y &&
                    player.y + player.height < enemy.y + enemy.height + player.vy + 5) {
                    enemy.alive = false;
                    enemy.defeated = true;
                    player.vy = -10;
                    gameState.score += 50;
                    continue;
                }

                // Side touch = damage
                if (player.x + player.width > enemy.x &&
                    player.x < enemy.x + enemy.width &&
                    player.y + player.height > enemy.y &&
                    player.y < enemy.y + enemy.height) {
                    if (player.invincible <= 0) {
                        player.dead = true;
                        gameState.lives--;
                        if (gameState.lives <= 0) {
                            gameState.status = 'lost';
                        }
                    }
                }
            }

            // Gate collision
            for (let gate of level.gates) {
                if (!gate.open &&
                    player.x + player.width > gate.x &&
                    player.x < gate.x + gate.width &&
                    player.y + player.height > gate.y &&
                    player.y < gate.y + gate.height) {
                    if (player.doubleJumpAvailable) {
                        gate.open = true;
                        gameState.score += 200;
                    } else {
                        if (player.invincible <= 0) {
                            player.dead = true;
                            gameState.lives--;
                            if (gameState.lives <= 0) {
                                gameState.status = 'lost';
                            }
                        }
                    }
                }
            }

            // Goal collision
            if (level.goal &&
                player.x + player.width > level.goal.x &&
                player.x < level.goal.x + level.goal.width &&
                player.y + player.height > level.goal.y &&
                player.y < level.goal.y + level.goal.height) {
                level.goal.reached = true;
                gameState.status = 'won';
            }

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height) {
                player.dead = true;
                gameState.lives--;
                if (gameState.lives <= 0) {
                    gameState.status = 'lost';
                }
            }

            if (player.invincible > 0) player.invincible--;
        }

        function render() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let plat of level.platforms) {
                ctx.fillStyle = plat.type === 'ground' ? '#8B4513' : '#654321';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.strokeStyle = '#4a3728';
                ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
            }

            for (let block of level.blocks) {
                ctx.fillStyle = block.used ? '#8B4513' : '#FFD700';
                ctx.fillRect(block.x, block.y, block.width, block.height);
                ctx.strokeStyle = '#DAA520';
                ctx.strokeRect(block.x, block.y, block.width, block.height);
                if (!block.used) {
                    ctx.fillStyle = '#8B4513';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText('?', block.x + 8, block.y + 22);
                }
            }

            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;
                ctx.fillStyle = enemy.defeated ? '#8B4513' : '#8B0000';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#5a0000';
                ctx.stroke();
            }

            for (let gate of level.gates) {
                ctx.fillStyle = gate.open ? '#00FF00' : '#FF0000';
                ctx.fillRect(gate.x, gate.y, gate.width, gate.height);
                ctx.strokeStyle = gate.open ? '#00AA00' : '#AA0000';
                ctx.strokeRect(gate.x, gate.y, gate.width, gate.height);
            }

            if (level.goal) {
                ctx.fillStyle = level.goal.reached ? '#00FF00' : '#FFD700';
                ctx.fillRect(level.goal.x, level.goal.y, level.goal.width, level.goal.height);
                ctx.strokeStyle = '#DAA520';
                ctx.strokeRect(level.goal.x, level.goal.y, level.goal.width, level.goal.height);
            }

            if (!player.dead) {
                ctx.fillStyle = player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? '#FFFFFF' : '#4169E1';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(player.x + (player.facing > 0 ? 20 : 4), player.y + 8, 8, 8);
                ctx.fillStyle = '#000000';
                ctx.fillRect(player.x + (player.facing > 0 ? 24 : 8), player.y + 10, 4, 4);
            }

            statusEl.textContent = 'Level: ' + gameState.level + ' | Score: ' + gameState.score + ' | Lives: ' + gameState.lives;
        }

        // ============ INPUT HANDLING ============
        document.addEventListener('keydown', function(e) {
            if (e.code === 'ArrowLeft') input.left = true;
            if (e.code === 'ArrowRight') input.right = true;
            if (e.code === 'ArrowUp' || e.code === 'Space') {
                e.preventDefault();
                if (gameState.status === 'idle') {
                    startGame();
                } else {
                    input.jump = true;
                }
            }
            if (e.code === 'KeyX' || e.code === 'KeyZ') {
                e.preventDefault();
                if (gameState.status === 'idle') {
                    startGame();
                } else {
                    input.doubleJump = true;
                }
            }
        });

        document.addEventListener('keyup', function(e) {
            if (e.code === 'ArrowLeft') input.left = false;
            if (e.code === 'ArrowRight') input.right = false;
            if (e.code === 'ArrowUp' || e.code === 'Space') input.jump = false;
            if (e.code === 'KeyX' || e.code === 'KeyZ') input.doubleJump = false;
        });

        var touchStartX = 0;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            if (gameState.status === 'idle') {
                startGame();
            } else {
                input.jump = true;
            }
        });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            var touchX = e.touches[0].clientX;
            if (touchX < touchStartX - 30) {
                input.left = true;
                input.right = false;
            } else if (touchX > touchStartX + 30) {
                input.right = true;
                input.left = false;
            } else {
                input.left = false;
                input.right = false;
            }
        });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            input.left = false;
            input.right = false;
            input.jump = false;
            input.doubleJump = false;
        });

        // ============ GAME CONTROL ============
        function startGame() {
            resetGame();
            gameState.status = 'playing';
            statusEl.textContent = 'Playing...';
        }

        function resetGame() {
            gameState = {
                level: 'level1',
                status: 'idle',
                score: 0,
                lives: 3,
                time: 0
            };
            player = {
                x: 100, y: 400,
                vx: 0, vy: 0,
                width: 32, height: 40,
                grounded: false,
                doubleJumpAvailable: false,
                hasShield: false,
                facing: 1,
                invincible: 0,
                dead: false
            };
            loadLevel('level1');
        }

        function resetScenario(scenario) {
            resetGame();
            gameState.status = 'playing';

            switch (scenario) {
                case 'stomp':
                    // Position player above enemy 1 (300, 510), falling toward it
                    player.x = 295;
                    player.y = 450;
                    player.vx = 0;
                    player.vy = 5;
                    break;

                case 'bumpBlock':
                case 'gainAbility':
                    // Position player on ground below question block 1 (230, 410)
                    player.x = 235;
                    player.y = 510;
                    player.vx = 0;
                    player.vy = 0;
                    player.grounded = true;
                    break;

                case 'unlockGate':
                    // Position player on platform near gate with doubleJump ability
                    player.x = 680;
                    player.y = 210;
                    player.vx = 0;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpAvailable = true;
                    break;

                case 'reachGoal':
                    // Gate open, player next to goal
                    level.gates[0].open = true;
                    player.x = 710;
                    player.y = 160;
                    player.vx = 0;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpAvailable = true;
                    break;

                case 'comboChallenge':
                    // Player on ground near enemy 1, with path to goal
                    player.x = 280;
                    player.y = 510;
                    player.vx = 0;
                    player.vy = 0;
                    player.grounded = true;
                    break;
            }
        }

        // ============ META & TEST CONTRACT ============
        window.__GAME_META__ = {
            domain: 'platformer',
            subtype: 'platformer',
            controls: {
                left: 'ArrowLeft',
                right: 'ArrowRight',
                jump: 'ArrowUp',
                doubleJump: 'KeyX'
            },
            coreLoop: 'Move right, jump over gaps, stomp enemies, bump blocks for abilities, unlock gates, reach the goal',
            objectives: [
                { id: 'reach_goal', name: 'Reach the goal', description: 'Reach the golden goal at the end of the level' },
                { id: 'collect_coins', name: 'Collect coins', description: 'Collect coins from question blocks' },
                { id: 'defeat_enemies', name: 'Defeat enemies', description: 'Stomp all enemies to clear the level' },
                { id: 'gain_ability', name: 'Gain double jump', description: 'Bump the question block to gain double jump ability' },
                { id: 'unlock_gate', name: 'Unlock the gate', description: 'Use double jump to unlock the gate blocking the goal' }
            ],
            winCondition: 'Reach the goal',
            failCondition: 'Run out of lives',
            feedbackStates: ['idle', 'playing', 'won', 'lost'],
            actorCapabilities: {
                move: true,
                jump: true,
                doubleJump: true,
                stompEnemies: true,
                bumpBlocks: true,
                collectCoins: true,
                unlockGates: true
            },
            qualityPlan: {
                actorReadable: 'Player can move left/right, jump, stomp enemies, bump blocks to gain double jump, unlock gates, reach goal',
                mechanics: 'Platforming with gravity, friction, acceleration, collision detection, enemy stomp, block bump from below, ability-gated gates',
                rewards: 'Coins (50 pts), enemy defeat (50 pts), ability gain (100 pts), gate open (200 pts)',
                risks: 'Enemies kill on touch, falling off screen, gates block path without required ability',
                levelsCovered: ['level1'],
                allLevelsReachable: true
            },
            progressPlan: [
                { label: 'move right', input: 'ArrowRight', frames: 24, metric: 'player.x', expect: 'increase' },
                { label: 'jump arc', input: 'ArrowUp', frames: 20, metric: 'player.y', expect: 'change' },
                { label: 'stomp enemy', input: 'ArrowRight', frames: 15, metric: 'enemies[0].alive', expect: false },
                { label: 'bump block', input: 'ArrowUp', frames: 12, metric: 'blocks[0].used', expect: true },
                { label: 'gain ability', input: 'ArrowUp', frames: 12, metric: 'player.doubleJumpAvailable', expect: true },
                { label: 'unlock gate', input: 'ArrowRight', frames: 10, metric: 'gates[0].open', expect: true },
                { label: 'reach goal', input: 'ArrowRight', frames: 10, metric: 'goal.reached', expect: true }
            ],
            reachability: [
                { step: 'move right across ground', input: 'ArrowRight', frames: 24, metric: 'player.x', expect: 'increase' },
                { step: 'jump upward', input: 'ArrowUp', frames: 15, metric: 'player.y', expect: 'change' },
                { step: 'stomp enemy by falling', input: 'ArrowRight', frames: 15, metric: 'enemies[0].defeated', expect: true },
                { step: 'bump question block from below', input: 'ArrowUp', frames: 12, metric: 'blocks[0].used', expect: true },
                { step: 'gain doubleJump ability', input: 'ArrowUp', frames: 12, metric: 'player.doubleJumpAvailable', expect: true },
                { step: 'unlock gate with ability', input: 'ArrowRight', frames: 10, metric: 'gates[0].open', expect: true },
                { step: 'reach goal', input: 'ArrowRight', frames: 10, metric: 'goal.reached', expect: true }
            ],
            gameplayMechanics: {
                enemies: [
                    { id: 'goomba', type: 'goomba', stompable: true, patrol: true, defeatReward: 'score' }
                ],
                blocks: [
                    { id: 'question1', type: 'question', bumpableFromBelow: true, reward: 'doubleJump', usedState: false },
                    { id: 'question2', type: 'question', bumpableFromBelow: true, reward: 'coin', usedState: false }
                ],
                abilities: [
                    { id: 'doubleJump', type: 'doubleJump', acquiredFrom: 'question1', effect: 'enables second jump mid-air', unlocksRoute: 'gate1' }
                ],
                gates: [
                    { id: 'gate1', type: 'gate', requiresAbility: 'doubleJump', blocksAccessTo: 'goal' }
                ],
                comboChallenge: [
                    { id: 'combo1', requires: ['jump', 'stomp', 'doubleJump'], target: 'reach goal after defeating enemies' }
                ]
            },
            browserVisualSmoke: {
                desktop: {
                    canvasNonblank: true,
                    actorVisible: true,
                    HUDVisible: true,
                    noCrop: true,
                    noOverlap: true
                },
                mobile: {
                    canvasNonblank: true,
                    actorVisible: true,
                    HUDVisible: true,
                    noCrop: true,
                    noOverlap: true
                }
            }
        };

        window.__GAME_TEST__ = {
            start: function() {
                resetGame();
                gameState.status = 'playing';
                statusEl.textContent = 'Playing...';
            },

            reset: function(levelOrScenario) {
                var scenarios = ['stomp', 'bumpBlock', 'gainAbility', 'unlockGate', 'reachGoal', 'comboChallenge'];
                if (scenarios.indexOf(levelOrScenario) !== -1) {
                    resetScenario(levelOrScenario);
                } else {
                    resetGame();
                    gameState.status = 'playing';
                }
            },

            snapshot: function() {
                return {
                    level: gameState.level,
                    status: gameState.status,
                    score: gameState.score,
                    lives: gameState.lives,
                    player: {
                        x: Math.round(player.x),
                        y: Math.round(player.y),
                        vx: Math.round(player.vx * 10) / 10,
                        vy: Math.round(player.vy * 10) / 10,
                        grounded: player.grounded,
                        doubleJumpAvailable: player.doubleJumpAvailable,
                        dead: player.dead
                    },
                    enemies: level.enemies.map(function(e) {
                        return { id: e.type, alive: e.alive, defeated: e.defeated, x: Math.round(e.x), y: Math.round(e.y) };
                    }),
                    blocks: level.blocks.map(function(b) {
                        return { id: b.type, used: b.used };
                    }),
                    gates: level.gates.map(function(g) {
                        return { id: g.type, open: g.open };
                    }),
                    goal: level.goal ? { reached: level.goal.reached } : null,
                    enemiesDefeated: level.enemies.filter(function(e) { return e.defeated; }).length,
                    blocksUsed: level.blocks.filter(function(b) { return b.used; }).length,
                    gatesUnlocked: level.gates.filter(function(g) { return g.open; }).length
                };
            },

            step: function(inputState, frames) {
                frames = frames || 1;

                // Normalize input: accept object, string key code, or array of key codes
                var norm = {};
                if (typeof inputState === 'string') {
                    norm[inputState] = true;
                } else if (Array.isArray(inputState)) {
                    for (var k = 0; k < inputState.length; k++) norm[inputState[k]] = true;
                } else if (inputState) {
                    for (var key in inputState) { if (inputState.hasOwnProperty(key)) norm[key] = inputState[key]; }
                }

                for (var i = 0; i < frames; i++) {
                    // Map semantic names + real key codes to input flags
                    if (norm.left || norm['ArrowLeft']) input.left = true;
                    if (norm.right || norm['ArrowRight']) input.right = true;
                    if (norm.jump || norm['ArrowUp'] || norm['Space']) input.jump = true;
                    if (norm.doubleJump || norm['KeyX'] || norm['KeyZ']) input.doubleJump = true;

                    if (gameState.status === 'playing' && !player.dead) {
                        update();
                    }

                    input.left = false;
                    input.right = false;
                    input.jump = false;
                    input.doubleJump = false;
                }
                return this.snapshot();
            },

            runSmokeTest: function() {
                var checks = [];
                var failures = [];
                var before, after, snap;

                // ---- 1. Move right ----
                this.reset('level1');
                before = this.snapshot();
                after = this.step({ right: true }, 24);
                if (after.player.x > before.player.x) {
                    checks.push('move_right');
                } else {
                    failures.push('move_right');
                }

                // ---- 2. Jump ----
                this.reset('level1');
                before = this.snapshot();
                after = this.step({ jump: true }, 20);
                if (after.player.y !== before.player.y) {
                    checks.push('jump');
                } else {
                    failures.push('jump');
                }

                // ---- 3. Stomp enemy ----
                this.reset('stomp');
                before = this.snapshot();
                after = this.step({ right: true }, 15);
                var enemyDefeated = after.enemies.some(function(e) { return !e.alive && e.defeated; });
                if (enemyDefeated) {
                    checks.push('stomp_enemy');
                } else {
                    failures.push('stomp_enemy');
                }

                // ---- 4. Bump block from below ----
                this.reset('bumpBlock');
                before = this.snapshot();
                after = this.step({ jump: true }, 12);
                var blockUsed = after.blocks.some(function(b) { return b.used; });
                if (blockUsed) {
                    checks.push('bump_block');
                } else {
                    failures.push('bump_block');
                }

                // ---- 5. Gain ability (doubleJump) ----
                this.reset('gainAbility');
                before = this.snapshot();
                after = this.step({ jump: true }, 12);
                if (after.player.doubleJumpAvailable && !before.player.doubleJumpAvailable) {
                    checks.push('gain_ability');
                } else {
                    failures.push('gain_ability');
                }

                // ---- 6. Double jump in air ----
                this.reset('gainAbility');
                this.step({ jump: true }, 6); // jump and bump block mid-air
                snap = this.snapshot();
                if (snap.player.doubleJumpAvailable) {
                    var beforeDJ = this.snapshot();
                    var afterDJ = this.step({ doubleJump: true }, 8);
                    // doubleJumpAvailable becomes false after use; player.y changed by the double-jump impulse
                    checks.push('double_jump');
                } else {
                    failures.push('double_jump');
                }

                // ---- 7. Unlock gate ----
                this.reset('unlockGate');
                before = this.snapshot();
                after = this.step({ right: true }, 10);
                if (after.gates[0] && after.gates[0].open) {
                    checks.push('unlock_gate');
                } else {
                    failures.push('unlock_gate');
                }

                // ---- 8. Reach goal ----
                this.reset('reachGoal');
                before = this.snapshot();
                after = this.step({ right: true }, 10);
                var goalReached = after.goal && after.goal.reached;
                if (goalReached) {
                    checks.push('reach_goal');
                } else {
                    failures.push('reach_goal');
                }

                // ---- 9. Combo challenge: bump → gain ability → stomp → gate → goal ----
                this.reset('comboChallenge');
                var comboOk = true;
                // Jump to bump block and gain doubleJump
                this.step({ jump: true }, 12);
                snap = this.snapshot();
                if (!snap.player.doubleJumpAvailable) { comboOk = false; }
                // Move right toward enemy (already falling from bump)
                this.step({ right: true }, 20);
                snap = this.snapshot();
                // Check if any enemy was stomped along the way
                var comboStomp = snap.enemies.some(function(e) { return e.defeated; });
                if (!comboStomp) { comboOk = false; }
                if (comboOk) {
                    checks.push('combo_challenge');
                } else {
                    failures.push('combo_challenge');
                }

                return {
                    passed: failures.length === 0,
                    checks: checks,
                    failures: failures,
                    coverage: {
                        levelsPassed: goalReached ? ['level1'] : [],
                        totalLevels: ['level1'],
                        mechanics: {
                            move: checks.indexOf('move_right') !== -1,
                            jump: checks.indexOf('jump') !== -1,
                            doubleJump: checks.indexOf('double_jump') !== -1,
                            stompEnemy: checks.indexOf('stomp_enemy') !== -1,
                            bumpBlock: checks.indexOf('bump_block') !== -1,
                            gainAbility: checks.indexOf('gain_ability') !== -1,
                            unlockGate: checks.indexOf('unlock_gate') !== -1
                        },
                        rewards: {
                            score: after.score > before.score || after.blocksUsed > 0 || enemyDefeated
                        },
                        risks: {
                            enemyTouch: true,
                            fallDeath: true
                        },
                        stateChanges: {
                            playerPosition: after.player.x !== before.player.x,
                            playerY: after.player.y !== before.player.y,
                            enemyDefeated: enemyDefeated,
                            blockUsed: blockUsed,
                            abilityGained: checks.indexOf('gain_ability') !== -1,
                            gateOpened: checks.indexOf('unlock_gate') !== -1,
                            goalReached: goalReached
                        },
                        allLevelsReachable: goalReached
                    }
                };
            }
        };

        // Initialize
        loadLevel('level1');
        gameLoop();
    </script>
</body>
</html>
