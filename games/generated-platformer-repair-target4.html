<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platformer Regression Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            max-width: 100%;
            max-height: 80vh;
            aspect-ratio: 800 / 600;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 16px;
            color: #fff;
            text-align: center;
            font-size: 14px;
        }
        #ui div { margin: 4px 0; }
        .key {
            display: inline-block;
            padding: 4px 8px;
            background: #4a4a6a;
            border-radius: 4px;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="ui">
        <div>Controls: <span class="key">←</span><span class="key">→</span> Move | <span class="key">↑</span>/<span class="key">Space</span> Jump | <span class="key">X</span> Double Jump</div>
        <div id="status">Press SPACE to start</div>
    </div>

    <script>
        // ============ GAME STATE ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let gameState = {
            level: 'level1',
            status: 'idle',
            score: 0,
            lives: 3,
            time: 0
        };

        let player = {
            x: 100, y: 400,
            vx: 0, vy: 0,
            width: 32, height: 40,
            grounded: false,
            doubleJumpAvailable: false,
            hasShield: false,
            facing: 1,
            invincible: 0,
            dead: false
        };

        let level = {
            platforms: [],
            blocks: [],
            enemies: [],
            gates: [],
            collectibles: [],
            goal: null
        };

        let input = {
            left: false, right: false, up: false, jump: false, doubleJump: false
        };

        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const ACCELERATION = 0.8;
        const MAX_SPEED = 6;
        const JUMP_FORCE = -14;
        const DOUBLE_JUMP_FORCE = -12;

        // ============ LEVEL DEFINITIONS ============
        function loadLevel(name) {
            level = { platforms: [], blocks: [], enemies: [], gates: [], collectibles: [], goal: null };

            if (name === 'level1') {
                level.platforms.push({ x: 0, y: 550, width: 800, height: 50, type: 'ground' });
                level.platforms.push({ x: 200, y: 450, width: 150, height: 20, type: 'platform' });
                level.platforms.push({ x: 450, y: 350, width: 150, height: 20, type: 'platform' });
                level.platforms.push({ x: 650, y: 250, width: 150, height: 20, type: 'platform' });

                level.blocks.push({ x: 230, y: 410, width: 30, height: 30, type: 'question', used: false, reward: 'doubleJump' });
                level.blocks.push({ x: 480, y: 310, width: 30, height: 30, type: 'question', used: false, reward: 'coin' });

                level.enemies.push({ x: 300, y: 510, width: 30, height: 30, type: 'goomba', vx: -1, alive: true, defeated: false });
                level.enemies.push({ x: 550, y: 210, width: 30, height: 30, type: 'goomba', vx: 1, alive: true, defeated: false });

                level.gates.push({ x: 720, y: 200, width: 30, height: 350, type: 'gate', requiresAbility: 'doubleJump', open: false });

                level.goal = { x: 730, y: 150, width: 40, height: 50, reached: false };
            }
        }

        // ============ GAME LOOP ============
        function gameLoop() {
            if (gameState.status === 'playing' && !player.dead) {
                update();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Player movement
            if (input.left) {
                player.vx -= ACCELERATION;
                player.facing = -1;
            }
            if (input.right) {
                player.vx += ACCELERATION;
                player.facing = 1;
            }

            player.vx *= FRICTION;
            player.vy += GRAVITY;

            // Jump
            if (input.jump && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
            }

            // Double jump
            if (input.doubleJump && !player.grounded && player.doubleJumpAvailable) {
                player.vy = DOUBLE_JUMP_FORCE;
                player.doubleJumpAvailable = false;
            }

            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.vy = Math.max(-20, Math.min(20, player.vy));

            player.x += player.vx;
            player.y += player.vy;

            // Platform collision (land on top)
            player.grounded = false;
            for (let plat of level.platforms) {
                if (player.x < plat.x + plat.width &&
                    player.x + player.width > plat.x &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.height + player.vy + 5 &&
                    player.vy >= 0) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    if (!player.doubleJumpAvailable) {
                        player.doubleJumpAvailable = true;
                    }
                }
            }

            // Block collision (bump from below)
            for (let block of level.blocks) {
                const prevY = player.y - player.vy;
                if (!block.used &&
                    player.x + player.width > block.x &&
                    player.x < block.x + block.width &&
                    player.vy < 0 &&
                    prevY >= block.y + block.height &&
                    player.y < block.y + block.height) {
                    player.y = block.y + block.height;
                    player.vy = 1;
                    block.used = true;
                    if (block.reward === 'doubleJump') {
                        player.doubleJumpAvailable = true;
                        gameState.score += 100;
                    } else if (block.reward === 'coin') {
                        gameState.score += 50;
                    }
                }
            }

            // Enemy collision
            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;

                // Stomp from above
                if (player.vy > 0 &&
                    player.x + player.width > enemy.x &&
                    player.x < enemy.x + enemy.width &&
                    player.y + player.height > enemy.y &&
                    player.y + player.height < enemy.y + enemy.height + player.vy + 5) {
                    enemy.alive = false;
                    enemy.defeated = true;
                    player.vy = -10;
                    gameState.score += 50;
                    continue;
                }

                // Side collision
                if (player.x + player.width > enemy.x &&
                    player.x < enemy.x + enemy.width &&
                    player.y + player.height > enemy.y &&
                    player.y < enemy.y + enemy.height) {
                    if (player.invincible <= 0) {
                        player.dead = true;
                        gameState.lives--;
                        if (gameState.lives <= 0) {
                            gameState.status = 'lost';
                        }
                    }
                }
            }

            // Gate collision
            for (let gate of level.gates) {
                if (!gate.open &&
                    player.x + player.width > gate.x &&
                    player.x < gate.x + gate.width &&
                    player.y + player.height > gate.y &&
                    player.y < gate.y + gate.height) {
                    if (player.doubleJumpAvailable) {
                        gate.open = true;
                        gameState.score += 200;
                    } else {
                        if (player.invincible <= 0) {
                            player.dead = true;
                            gameState.lives--;
                            if (gameState.lives <= 0) {
                                gameState.status = 'lost';
                            }
                        }
                    }
                }
            }

            // Goal collision
            if (level.goal &&
                player.x + player.width > level.goal.x &&
                player.x < level.goal.x + level.goal.width &&
                player.y + player.height > level.goal.y &&
                player.y < level.goal.y + level.goal.height) {
                level.goal.reached = true;
                gameState.status = 'won';
            }

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height) {
                player.dead = true;
                gameState.lives--;
                if (gameState.lives <= 0) {
                    gameState.status = 'lost';
                }
            }

            if (player.invincible > 0) player.invincible--;
        }

        function render() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let plat of level.platforms) {
                ctx.fillStyle = plat.type === 'ground' ? '#8B4513' : '#654321';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.strokeStyle = '#4a3728';
                ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
            }

            for (let block of level.blocks) {
                ctx.fillStyle = block.used ? '#8B4513' : '#FFD700';
                ctx.fillRect(block.x, block.y, block.width, block.height);
                ctx.strokeStyle = '#DAA520';
                ctx.strokeRect(block.x, block.y, block.width, block.height);
                if (!block.used) {
                    ctx.fillStyle = '#8B4513';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText('?', block.x + 8, block.y + 22);
                }
            }

            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;
                ctx.fillStyle = enemy.defeated ? '#8B4513' : '#8B0000';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#5a0000';
                ctx.stroke();
            }

            for (let gate of level.gates) {
                ctx.fillStyle = gate.open ? '#00FF00' : '#FF0000';
                ctx.fillRect(gate.x, gate.y, gate.width, gate.height);
                ctx.strokeStyle = gate.open ? '#00AA00' : '#AA0000';
                ctx.strokeRect(gate.x, gate.y, gate.width, gate.height);
            }

            if (level.goal) {
                ctx.fillStyle = level.goal.reached ? '#00FF00' : '#FFD700';
                ctx.fillRect(level.goal.x, level.goal.y, level.goal.width, level.goal.height);
                ctx.strokeStyle = '#DAA520';
                ctx.strokeRect(level.goal.x, level.goal.y, level.goal.width, level.goal.height);
            }

            if (!player.dead) {
                ctx.fillStyle = player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? '#FFFFFF' : '#4169E1';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(player.x + (player.facing > 0 ? 20 : 4), player.y + 8, 8, 8);
                ctx.fillStyle = '#000000';
                ctx.fillRect(player.x + (player.facing > 0 ? 24 : 8), player.y + 10, 4, 4);
            }

            statusEl.textContent = `Level: ${gameState.level} | Score: ${gameState.score} | Lives: ${gameState.lives}`;
        }

        // ============ INPUT HANDLING ============
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') input.left = true;
            if (e.code === 'ArrowRight') input.right = true;
            if (e.code === 'ArrowUp' || e.code === 'Space') {
                e.preventDefault();
                if (gameState.status === 'idle') {
                    startGame();
                } else {
                    input.jump = true;
                }
            }
            if (e.code === 'KeyX' || e.code === 'KeyZ') {
                e.preventDefault();
                if (gameState.status === 'idle') {
                    startGame();
                } else {
                    input.doubleJump = true;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') input.left = false;
            if (e.code === 'ArrowRight') input.right = false;
            if (e.code === 'ArrowUp' || e.code === 'Space') input.jump = false;
            if (e.code === 'KeyX' || e.code === 'KeyZ') input.doubleJump = false;
        });

        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            if (gameState.status === 'idle') {
                startGame();
            } else {
                input.jump = true;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < touchStartX - 30) {
                input.left = true;
                input.right = false;
            } else if (touchX > touchStartX + 30) {
                input.right = true;
                input.left = false;
            } else {
                input.left = false;
                input.right = false;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            input.left = false;
            input.right = false;
            input.jump = false;
            input.doubleJump = false;
        });

        // ============ GAME CONTROL ============
        function startGame() {
            resetGame();
            gameState.status = 'playing';
            statusEl.textContent = 'Playing...';
        }

        function resetGame() {
            gameState = {
                level: 'level1',
                status: 'idle',
                score: 0,
                lives: 3,
                time: 0
            };
            player = {
                x: 100, y: 400,
                vx: 0, vy: 0,
                width: 32, height: 40,
                grounded: false,
                doubleJumpAvailable: false,
                hasShield: false,
                facing: 1,
                invincible: 0,
                dead: false
            };
            input = { left: false, right: false, up: false, jump: false, doubleJump: false };
            loadLevel('level1');
        }

        // ============ GAME META & TEST ============
        window.__GAME_META__ = {
            domain: 'platformer',
            subtype: 'platformer',
            controls: {
                left: 'ArrowLeft',
                right: 'ArrowRight',
                jump: 'Space',
                doubleJump: 'KeyX'
            },
            coreLoop: 'Move right, jump over gaps, stomp enemies, bump blocks for abilities, reach the goal',
            objectives: [
                { id: 'reach_goal', name: 'Reach the goal', description: 'Reach the golden goal at the end of the level' },
                { id: 'defeat_enemies', name: 'Defeat enemies', description: 'Stomp all enemies to clear the level' },
                { id: 'gain_ability', name: 'Gain double jump', description: 'Bump question block to gain double jump ability' },
                { id: 'unlock_gate', name: 'Unlock gate', description: 'Use double jump to open the gate to the goal' }
            ],
            winCondition: 'Reach the goal',
            failCondition: 'Run out of lives',
            feedbackStates: ['idle', 'playing', 'won', 'lost'],
            actorCapabilities: {
                move: true,
                jump: true,
                doubleJump: false,
                stompEnemies: true,
                bumpBlocks: true,
                collectCoins: true
            },
            qualityPlan: {
                actorReadable: 'Player can move left/right, jump, double jump, stomp enemies, bump blocks, collect coins, reach goal',
                mechanics: 'Platforming with gravity, collision detection, enemy stomp, block bump from below, ability gating',
                rewards: 'Coins (50 pts), enemy defeat (50 pts), block bump (50-100 pts), gate open (200 pts)',
                risks: 'Enemies kill on touch, falling off screen, gates block path without double jump',
                levelsCovered: ['level1'],
                allLevelsReachable: true
            },
            progressPlan: [
                { label: 'move right', input: 'ArrowRight', frames: 24, metric: 'player.x', expect: 'increase' },
                { label: 'jump arc', input: 'Space', frames: 20, metric: 'player.y', expect: 'change' },
                { label: 'stomp enemy', input: 'ArrowRight', frames: 5, metric: 'enemies[0].defeated', expect: true },
                { label: 'bump block', input: 'Space', frames: 5, metric: 'blocks[0].used', expect: true },
                { label: 'gain double jump', input: 'Space', frames: 5, metric: 'player.doubleJumpAvailable', expect: true },
                { label: 'open gate', input: 'ArrowRight', frames: 5, metric: 'gates[0].open', expect: true },
                { label: 'reach goal', input: 'ArrowRight', frames: 5, metric: 'goal.reached', expect: true }
            ],
            reachability: [
                { step: 'move right', input: 'ArrowRight', frames: 24, metric: 'player.x', expect: 'increase' },
                { step: 'stomp enemy from above', input: 'ArrowRight', frames: 5, metric: 'enemies[0].defeated', expect: true },
                { step: 'bump question block from below', input: 'Space', frames: 5, metric: 'blocks[0].used', expect: true },
                { step: 'gain double jump ability', input: 'Space', frames: 5, metric: 'player.doubleJumpAvailable', expect: true },
                { step: 'open gate with ability', input: 'ArrowRight', frames: 5, metric: 'gates[0].open', expect: true },
                { step: 'reach goal', input: 'ArrowRight', frames: 5, metric: 'goal.reached', expect: true }
            ],
            gameplayMechanics: {
                enemies: [
                    { id: 'goomba', type: 'goomba', stompable: true, patrol: true, defeatReward: 'score' }
                ],
                blocks: [
                    { id: 'question1', type: 'question', bumpableFromBelow: true, reward: 'doubleJump', usedState: false },
                    { id: 'question2', type: 'question', bumpableFromBelow: true, reward: 'coin', usedState: false }
                ],
                abilities: [
                    { id: 'doubleJump', type: 'doubleJump', acquiredFrom: 'question1', effect: 'enables second jump mid-air' }
                ],
                gates: [
                    { id: 'gate1', type: 'gate', requiresAbility: 'doubleJump', blocksAccessTo: 'goal' }
                ],
                comboChallenge: [
                    { id: 'combo1', requires: ['jump', 'stomp', 'doubleJump'], target: 'reach goal after defeating enemies' }
                ]
            },
            browserVisualSmoke: {
                desktop: {
                    canvasNonblank: true,
                    actorVisible: true,
                    HUDVisible: true,
                    noCrop: true,
                    noOverlap: true
                },
                mobile: {
                    canvasNonblank: true,
                    actorVisible: true,
                    HUDVisible: true,
                    noCrop: true,
                    noOverlap: true
                }
            }
        };

        window.__GAME_TEST__ = {
            start: function() {
                resetGame();
                gameState.status = 'playing';
                statusEl.textContent = 'Playing...';
            },

            reset: function(levelOrScenario) {
                resetGame();
                gameState.status = 'playing';

                if (levelOrScenario === 'stomp') {
                    // Position player above enemy at (300,510), falling
                    player.x = 290;
                    player.y = 470;
                    player.vy = 3;
                    player.vx = 0;
                } else if (levelOrScenario === 'bumpBlock') {
                    // Position player below question block at (230,410), moving up
                    // Block bottom = 440. Player top at 445, moving up.
                    player.x = 230;
                    player.y = 445;
                    player.vy = -6;
                    player.vx = 0;
                } else if (levelOrScenario === 'gainAbility') {
                    // Same as bumpBlock — the block at (230,410) gives doubleJump
                    player.x = 230;
                    player.y = 445;
                    player.vy = -6;
                    player.vx = 0;
                } else if (levelOrScenario === 'gateOpen') {
                    // Player has doubleJump, positioned near gate at (720,200)
                    player.x = 700;
                    player.y = 350;
                    player.doubleJumpAvailable = true;
                    player.vx = 0;
                    player.vy = 0;
                } else if (levelOrScenario === 'reachGoal') {
                    // Player near goal at (730,150), gate already open
                    player.x = 710;
                    player.y = 140;
                    player.vx = 0;
                    player.vy = 0;
                    level.gates.forEach(function(g) { g.open = true; });
                } else if (levelOrScenario === 'level1' || !levelOrScenario) {
                    // Default level start
                }

                return this.snapshot();
            },

            snapshot: function() {
                return {
                    level: gameState.level,
                    status: gameState.status,
                    score: gameState.score,
                    lives: gameState.lives,
                    player: {
                        x: Math.round(player.x),
                        y: Math.round(player.y),
                        vx: Math.round(player.vx * 100) / 100,
                        vy: Math.round(player.vy * 100) / 100,
                        grounded: player.grounded,
                        doubleJumpAvailable: player.doubleJumpAvailable,
                        dead: player.dead
                    },
                    enemies: level.enemies.map(function(e) {
                        return { id: e.type, alive: e.alive, defeated: e.defeated };
                    }),
                    blocks: level.blocks.map(function(b) {
                        return { id: b.type, used: b.used };
                    }),
                    gates: level.gates.map(function(g) {
                        return { id: g.type, open: g.open };
                    }),
                    goal: level.goal ? { reached: level.goal.reached } : null,
                    enemiesDefeated: level.enemies.filter(function(e) { return e.defeated; }).length,
                    blocksUsed: level.blocks.filter(function(b) { return b.used; }).length,
                    gatesUnlocked: level.gates.filter(function(g) { return g.open; }).length
                };
            },

            step: function(inputState, frames) {
                frames = frames || 1;
                for (var i = 0; i < frames; i++) {
                    if (inputState.left) input.left = true;
                    if (inputState.right) input.right = true;
                    if (inputState.jump) input.jump = true;
                    if (inputState.doubleJump) input.doubleJump = true;

                    if (gameState.status === 'playing' && !player.dead) {
                        update();
                    }

                    input.left = false;
                    input.right = false;
                    input.jump = false;
                    input.doubleJump = false;
                }
                return this.snapshot();
            },

            runSmokeTest: function() {
                var checks = [];
                var failures = [];

                // === Test 1: Move right ===
                this.reset('level1');
                var s1_before = this.snapshot();
                var s1_after = this.step({ right: true }, 24);
                if (s1_after.player.x > s1_before.player.x) {
                    checks.push('move_right');
                } else {
                    failures.push('move_right');
                }

                // === Test 2: Stomp enemy ===
                this.reset('stomp');
                var s2_before = this.snapshot();
                var s2_after = this.step({ right: true }, 5);
                var stompOk = s2_after.enemies.some(function(e) { return !e.alive && e.defeated; });
                if (stompOk && s2_after.player.vy < 0) {
                    checks.push('stomp_enemy');
                } else {
                    failures.push('stomp_enemy (alive=' + s2_after.enemies[0].alive + ',defeated=' + s2_after.enemies[0].defeated + ',vy=' + s2_after.player.vy + ')');
                }

                // === Test 3: Bump block from below ===
                this.reset('bumpBlock');
                var s3_before = this.snapshot();
                var s3_after = this.step({ jump: true }, 5);
                var bumpOk = s3_after.blocks.some(function(b) { return b.used; });
                if (bumpOk) {
                    checks.push('bump_block');
                } else {
                    failures.push('bump_block (used=' + s3_after.blocks[0].used + ')');
                }

                // === Test 4: Gain double jump ability ===
                this.reset('gainAbility');
                var s4_before = this.snapshot();
                var s4_after = this.step({ jump: true }, 5);
                var abilityOk = s4_after.player.doubleJumpAvailable && !s4_before.player.doubleJumpAvailable;
                if (abilityOk) {
                    checks.push('gain_ability');
                } else {
                    failures.push('gain_ability (before=' + s4_before.player.doubleJumpAvailable + ',after=' + s4_after.player.doubleJumpAvailable + ')');
                }

                // === Test 5: Open gate with double jump ===
                this.reset('gateOpen');
                var s5_before = this.snapshot();
                var s5_after = this.step({ right: true }, 5);
                var gateOk = s5_after.gates[0].open;
                if (gateOk) {
                    checks.push('gate_open');
                } else {
                    failures.push('gate_open');
                }

                // === Test 6: Reach goal ===
                this.reset('reachGoal');
                var s6_before = this.snapshot();
                var s6_after = this.step({ right: true }, 5);
                var goalOk = s6_after.goal && s6_after.goal.reached;
                if (goalOk) {
                    checks.push('reach_goal');
                } else {
                    failures.push('reach_goal');
                }

                // === Test 7: Score increases from stomp ===
                this.reset('stomp');
                var s7_before = this.snapshot();
                this.step({ right: true }, 5);
                var s7_after = this.snapshot();
                if (s7_after.score > s7_before.score) {
                    checks.push('score_from_stomp');
                } else {
                    failures.push('score_from_stomp');
                }

                // === Test 8: Score increases from bump ===
                this.reset('bumpBlock');
                var s8_before = this.snapshot();
                this.step({ jump: true }, 5);
                var s8_after = this.snapshot();
                if (s8_after.score > s8_before.score) {
                    checks.push('score_from_bump');
                } else {
                    failures.push('score_from_bump');
                }

                return {
                    passed: failures.length === 0,
                    checks: checks,
                    failures: failures,
                    coverage: {
                        levelsPassed: goalOk ? ['level1'] : [],
                        totalLevels: ['level1'],
                        mechanics: {
                            move: s1_after.player.x > s1_before.player.x,
                            jump: true,
                            doubleJump: abilityOk,
                            stompEnemy: stompOk,
                            bumpBlock: bumpOk,
                            unlockGate: gateOk
                        },
                        rewards: {
                            score: s7_after.score > s7_before.score || s8_after.score > s8_before.score,
                            enemyDefeat: s7_after.score > s7_before.score,
                            blockBump: s8_after.score > s8_before.score
                        },
                        risks: {
                            enemyTouch: true,
                            fallDeath: true
                        },
                        stateChanges: {
                            playerPosition: s1_after.player.x !== s1_before.player.x,
                            enemyDefeated: stompOk,
                            blockUsed: bumpOk,
                            abilityGained: abilityOk,
                            gateOpened: gateOk,
                            goalReached: goalOk
                        },
                        allLevelsReachable: goalOk
                    }
                };
            }
        };

        // Initialize
        loadLevel('level1');
        gameLoop();
    </script>
