<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platformer Regression Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            max-width: 100%;
            aspect-ratio: 800/600;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 80vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 12px;
            color: #fff;
            text-align: center;
            font-size: 14px;
        }
        #ui div { margin: 4px 0; }
        .key {
            display: inline-block;
            padding: 4px 8px;
            background: #4a4a6a;
            border-radius: 4px;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="ui">
        <div>Controls: <span class="key">&larr;</span><span class="key">&rarr;</span> Move | <span class="key">&uarr;</span> Jump | <span class="key">X</span> Double Jump</div>
        <div id="status">Press SPACE to start</div>
    </div>

    <script>
        // ============ GAME STATE ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let gameState = { level: 'level1', status: 'idle', score: 0, lives: 3 };

        let player = {
            x: 100, y: 500, vx: 0, vy: 0,
            width: 32, height: 40,
            grounded: false, doubleJumpUsed: false, canDoubleJump: false,
            abilities: { doubleJump: false },
            facing: 1, invincible: 0, dead: false,
            enemiesDefeated: 0, blocksUsed: 0
        };

        let level = { platforms: [], blocks: [], enemies: [], gates: [], collectibles: [], goal: null };

        let input = { left: false, right: false, jump: false, doubleJump: false };

        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const ACCELERATION = 0.8;
        const MAX_SPEED = 6;
        const JUMP_FORCE = -14;
        const DOUBLE_JUMP_FORCE = -12;

        // ============ LEVEL DEFINITIONS ============
        function loadLevel(name) {
            level = { platforms: [], blocks: [], enemies: [], gates: [], collectibles: [], goal: null };
            if (name === 'level1') {
                level.platforms.push({ x: 0, y: 550, width: 800, height: 50, type: 'ground' });
                level.platforms.push({ x: 220, y: 440, width: 120, height: 20, type: 'platform' });
                level.platforms.push({ x: 450, y: 360, width: 150, height: 20, type: 'platform' });
                level.blocks.push({ x: 130, y: 420, width: 30, height: 30, type: 'question', used: false, reward: 'doubleJumpAbility' });
                level.blocks.push({ x: 480, y: 320, width: 30, height: 30, type: 'question', used: false, reward: 'coin' });
                level.enemies.push({ x: 170, y: 510, width: 30, height: 30, type: 'goomba', vx: -1, alive: true });
                level.enemies.push({ x: 500, y: 230, width: 30, height: 30, type: 'goomba', vx: 0.5, alive: true, platformIdx: 2 });
                level.gates.push({ x: 580, y: 300, width: 25, height: 60, type: 'gate', requiresAbility: 'doubleJump', open: false });
                level.goal = { x: 650, y: 260, width: 36, height: 40, reached: false };
            }
        }

        // ============ GAME LOOP ============
        function gameLoop() {
            if (gameState.status === 'playing' && !player.dead) { update(); }
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (input.left) { player.vx -= ACCELERATION; player.facing = -1; }
            if (input.right) { player.vx += ACCELERATION; player.facing = 1; }
            player.vx *= FRICTION;
            if (Math.abs(player.vx) < 0.1) player.vx = 0;
            player.vy += GRAVITY;

            if (input.jump && player.grounded) { player.vy = JUMP_FORCE; player.grounded = false; player.doubleJumpUsed = false; }
            if (input.doubleJump && !player.grounded && player.canDoubleJump && !player.doubleJumpUsed) {
                player.vy = DOUBLE_JUMP_FORCE;
                player.doubleJumpUsed = true;
            }

            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.vy = Math.max(-20, Math.min(20, player.vy));
            player.x += player.vx;
            player.y += player.vy;

            // Platform collision
            player.grounded = false;
            for (let plat of level.platforms) {
                if (player.x + player.width > plat.x && player.x < plat.x + plat.width &&
                    player.y + player.height >= plat.y && player.y + player.height <= plat.y + plat.height + player.vy + 6 &&
                    player.vy >= 0) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    player.canDoubleJump = player.abilities.doubleJump;
                }
            }

            // Block collision (bump from below)
            for (let block of level.blocks) {
                if (block.used) continue;
                let playerHead = player.y;
                let playerFeet = player.y + player.height;
                let blockTop = block.y;
                let blockBottom = block.y + block.height;
                let hOverlap = player.x + player.width > block.x && player.x < block.x + block.width;
                let vBump = player.vy < 0 && playerHead <= blockBottom && playerHead >= blockTop - 10 && playerFeet > blockTop;
                if (hOverlap && vBump) {
                    player.vy = 2;
                    player.y = blockBottom;
                    block.used = true;
                    player.blocksUsed++;
                    if (block.reward === 'doubleJumpAbility') {
                        player.abilities.doubleJump = true;
                        player.canDoubleJump = true;
                        gameState.score += 100;
                    } else if (block.reward === 'coin') {
                        gameState.score += 50;
                    }
                }
            }

            // Enemy collision
            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;
                let pLeft = player.x, pRight = player.x + player.width;
                let pTop = player.y, pBot = player.y + player.height;
                let eLeft = enemy.x, eRight = enemy.x + enemy.width;
                let eTop = enemy.y, eBot = enemy.y + enemy.height;
                if (pRight > eLeft && pLeft < eRight && pBot > eTop && pTop < eBot) {
                    // Stomp: player falling onto enemy top
                    if (player.vy > 0 && pBot - player.vy <= eTop + 10) {
                        enemy.alive = false;
                        player.enemiesDefeated++;
                        player.vy = -10;
                        gameState.score += 200;
                    } else if (player.invincible <= 0) {
                        player.vy = player.vy < 0 ? player.vy : -8;
                        player.invincible = 60;
                        gameState.lives--;
                        if (gameState.lives <= 0) { gameState.status = 'lost'; player.dead = true; }
                    }
                }
            }

            // Gate collision
            for (let gate of level.gates) {
                if (gate.open) continue;
                if (player.x + player.width > gate.x && player.x < gate.x + gate.width &&
                    player.y + player.height > gate.y && player.y < gate.y + gate.height) {
                    let hasAbility = player.abilities && player.abilities[gate.requiresAbility];
                    if (hasAbility) {
                        gate.open = true;
                        gameState.score += 300;
                    } else {
                        player.x = gate.x - player.width - 2;
                        player.vx = 0;
                    }
                }
            }

            // Goal
            if (level.goal && !level.goal.reached &&
                player.x + player.width > level.goal.x && player.x < level.goal.x + level.goal.width &&
                player.y + player.height > level.goal.y && player.y < level.goal.y + level.goal.height) {
                level.goal.reached = true;
                gameState.status = 'won';
                gameState.score += 500;
            }

            // Bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height + 50) {
                gameState.lives--;
                if (gameState.lives <= 0) { gameState.status = 'lost'; player.dead = true; }
                else { player.x = 100; player.y = 500; player.vy = 0; player.vx = 0; }
            }
            if (player.invincible > 0) player.invincible--;
        }

        function render() {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let plat of level.platforms) {
                ctx.fillStyle = plat.type === 'ground' ? '#8B4513' : '#654321';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            }
            for (let block of level.blocks) {
                ctx.fillStyle = block.used ? '#8B4513' : '#FFD700';
                ctx.fillRect(block.x, block.y, block.width, block.height);
                if (!block.used) { ctx.fillStyle = '#8B4513'; ctx.font = 'bold 14px Arial'; ctx.fillText('?', block.x + 7, block.y + 22); }
            }
            for (let enemy of level.enemies) {
                if (!enemy.alive) continue;
                ctx.fillStyle = '#8B0000';
                ctx.beginPath(); ctx.arc(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.width/2, 0, Math.PI*2); ctx.fill();
            }
            for (let gate of level.gates) {
                ctx.fillStyle = gate.open ? 'rgba(0,200,0,0.6)' : 'rgba(200,0,0,0.8)';
                ctx.fillRect(gate.x, gate.y, gate.width, gate.height);
            }
            if (level.goal) {
                ctx.fillStyle = '#FFD700'; ctx.fillRect(level.goal.x, level.goal.y, level.goal.width, level.goal.height);
                ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px Arial'; ctx.fillText('GOAL', level.goal.x + 2, level.goal.y + 25);
            }
            if (!player.dead) {
                ctx.fillStyle = player.invincible > 0 && Math.floor(Date.now()/100)%2===0 ? '#FFF' : '#4169E1';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#FFF';
                ctx.fillRect(player.x + (player.facing>0?20:4), player.y+8, 8, 8);
                ctx.fillStyle = '#000';
                ctx.fillRect(player.x + (player.facing>0?24:8), player.y+10, 4, 4);
            }
            statusEl.textContent = 'Level: '+gameState.level+' | Score: '+gameState.score+' | Lives: '+gameState.lives+' | Abilities: '+(player.abilities.doubleJump?'DoubleJump':'None');
        }

        // ============ INPUT ============
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') input.left = true;
            if (e.code === 'ArrowRight') input.right = true;
            if (e.code === 'ArrowUp' || e.code === 'Space') { e.preventDefault(); if (gameState.status==='idle') startGame(); else input.jump = true; }
            if (e.code === 'KeyX' || e.code === 'KeyZ') { e.preventDefault(); if (gameState.status==='idle') startGame(); else input.doubleJump = true; }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') input.left = false;
            if (e.code === 'ArrowRight') input.right = false;
            if (e.code === 'ArrowUp' || e.code === 'Space') input.jump = false;
            if (e.code === 'KeyX' || e.code === 'KeyZ') input.doubleJump = false;
        });

        function startGame() { resetGame(); gameState.status = 'playing'; }
        function resetGame() {
            gameState = { level: 'level1', status: 'idle', score: 0, lives: 3 };
            player = {
                x: 100, y: 500, vx: 0, vy: 0, width: 32, height: 40,
                grounded: false, doubleJumpUsed: false, canDoubleJump: false,
                abilities: { doubleJump: false }, facing: 1, invincible: 0, dead: false,
                enemiesDefeated: 0, blocksUsed: 0
            };
            input = { left: false, right: false, jump: false, doubleJump: false };
            loadLevel('level1');
        }

        // ============ GAME META ============
        window.__GAME_META__ = {
            domain: 'platformer', subtype: 'platformer',
            controls: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', doubleJump: 'KeyX' },
            coreLoop: 'Move right, jump, bump blocks to gain abilities, stomp enemies, unlock gates, reach goal',
            objectives: [
                { id: 'reach_goal', name: 'Reach the goal', description: 'Reach the golden goal at the end' },
                { id: 'defeat_enemies', name: 'Defeat enemies', description: 'Stomp enemies to earn points' },
                { id: 'gain_ability', name: 'Gain double jump', description: 'Bump question block to get double jump' }
            ],
            winCondition: 'Reach the goal',
            failCondition: 'Run out of lives',
            feedbackStates: ['idle', 'playing', 'won', 'lost'],
            actorCapabilities: { move: true, jump: true, doubleJump: false, stompEnemies: true, bumpBlocks: true, collectCoins: true },
            qualityPlan: {
                actorReadable: 'Player can move, jump, bump blocks for abilities, stomp enemies, unlock gates, reach goal',
                mechanics: 'Platforming with gravity, collision, block bumping, enemy stomp, ability-gated progression',
                rewards: 'Coin (50pts), enemy defeat (200pts), ability unlock (100pts), gate open (300pts), goal (500pts)',
                risks: 'Enemy side-touch costs life, falling off screen costs life, gate blocks path without ability',
                levelsCovered: ['level1'], allLevelsReachable: true
            },
            progressPlan: [
                { label: 'walk right', input: 'ArrowRight', frames: 20, metric: 'player.x', expect: 'increase' },
                { label: 'jump', input: 'ArrowUp', frames: 18, metric: 'player.y', expect: 'change' },
                { label: 'double jump', input: 'KeyX', frames: 16, metric: 'player.y', expect: 'change' },
                { label: 'stomp enemy', input: ['ArrowRight','ArrowUp'], frames: 30, metric: 'player.enemiesDefeated', expect: 'increase' },
                { label: 'bump block', input: ['ArrowRight','ArrowUp'], frames: 20, metric: 'player.blocksUsed', expect: 'increase' },
                { label: 'unlock gate', input: 'ArrowRight', frames: 40, metric: 'player.x', expect: 'increase' },
                { label: 'reach goal', input: ['ArrowRight','ArrowUp'], frames: 35, metric: 'goal.reached', expect: 'truthy' }
            ],
            reachability: [
                { step: 'walk right', input: 'ArrowRight', frames: 15, metric: 'player.x', expect: 'increase' },
                { step: 'jump', input: 'ArrowUp', frames: 18, metric: 'player.y', expect: 'change' },
                { step: 'double jump in air', input: 'KeyX', frames: 16, metric: 'player.y', expect: 'change' },
                { step: 'approach platform', input: 'ArrowRight', frames: 25, metric: 'player.x', expect: 'increase' },
                { step: 'reach goal after clearing gate', input: ['ArrowRight','ArrowUp'], frames: 40, metric: 'goal.reached', expect: 'truthy' }
            ],
            gameplayMechanics: {
                enemies: [{ id: 'goomba1', type: 'goomba', stompable: true, patrol: true, defeatReward: 'score,pushback' },{ id: 'goomba2', type: 'goomba', stompable: true, patrol: true, defeatReward: 'score,pushback' }],
                blocks: [{ id: 'qblock1', type: 'question', bumpableFromBelow: true, reward: 'doubleJumpAbility', usedState: false },{ id: 'qblock2', type: 'question', bumpableFromBelow: true, reward: 'coin', usedState: false }],
                abilities: [{ id: 'doubleJump', type: 'doubleJump', acquiredFrom: 'qblock1', effect: 'enables second jump mid-air' }],
                gates: [{ id: 'gate1', type: 'gate', requiresAbility: 'doubleJump', blocksAccessTo: 'goal' }],
                comboChallenge: [{ id: 'combo1', requires: ['jump','stomp','bumpBlock','doubleJump','unlockGate'], target: 'reach goal after full sequence' }]
            },
            browserVisualSmoke: { desktop: { canvasNonblank: true, actorVisible: true, HUDVisible: true, noCrop: true, noOverlap: true }, mobile: { canvasNonblank: true, actorVisible: true, HUDVisible: true, noCrop: true, noOverlap: true } }
        };

        // ============ TEST CONTRACT ============
        window.__GAME_TEST__ = {
            start: function() { resetGame(); gameState.status = 'playing'; },
            reset: function(levelOrScenario) { resetGame(); if (levelOrScenario === 'level1') { loadLevel('level1'); } },
            snapshot: function() {
                return {
                    level: gameState.level, status: gameState.status, score: gameState.score, lives: gameState.lives,
                    player: {
                        x: Math.round(player.x), y: Math.round(player.y), vx: Math.round(player.vx), vy: Math.round(player.vy),
                        grounded: player.grounded, canDoubleJump: player.canDoubleJump, doubleJumpUsed: player.doubleJumpUsed,
                        abilities: Object.assign({}, player.abilities), dead: player.dead,
                        enemiesDefeated: player.enemiesDefeated, blocksUsed: player.blocksUsed
                    },
                    enemies: level.enemies.map(function(e) { return { id: e.type, x: Math.round(e.x), alive: e.alive }; }),
                    blocks: level.blocks.map(function(b) { return { id: b.type, used: b.used }; }),
                    gates: level.gates.map(function(g) { return { id: g.type, open: g.open }; }),
                    goal: level.goal ? { reached: level.goal.reached } : null
                };
            },
            step: function(inputState, frames) {
                frames = frames || 1;
                if (inputState.left !== undefined) input.left = !!inputState.left;
                if (inputState.right !== undefined) input.right = !!inputState.right;
                if (inputState.jump !== undefined) input.jump = !!inputState.jump;
                if (inputState.doubleJump !== undefined) input.doubleJump = !!inputState.doubleJump;
                for (var i = 0; i < frames; i++) {
                    if (gameState.status === 'playing' && !player.dead) { update(); }
                }
                input.left = false; input.right = false; input.jump = false; input.doubleJump = false;
                return this.snapshot();
            },
            runSmokeTest: function() {
                var checks = [], failures = [];
                var s0, s1, s2;

                // --- Scenario 1: Move right ---
                this.start();
                s0 = this.snapshot();
                s1 = this.step({ right: true }, 20);
                if (s1.player.x > s0.player.x) checks.push('move_right');
                else failures.push('move_right (player.x did not increase)');

                // --- Scenario 2: Jump ---
                this.start();
                s0 = this.snapshot();
                s1 = this.step({ jump: true }, 18);
                if (s1.player.y !== s0.player.y) checks.push('jump');
                else failures.push('jump (player.y unchanged)');

                // --- Scenario 3: Walk to enemy area + stomp ---
                this.start();
                s0 = this.snapshot();
                // Walk under enemy area then jump to stomp
                this.step({ right: true }, 6);
                s1 = this.step({ right: true, jump: true }, 28);
                var stomped = s1.player.enemiesDefeated > s0.player.enemiesDefeated;
                if (stomped) checks.push('stomp_enemy');
                else failures.push('stomp_enemy (enemiesDefeated unchanged)');

                // --- Scenario 4: Bump block + gain ability ---
                this.start();
                s0 = this.snapshot();
                this.step({ right: true }, 4);
                s1 = this.step({ jump: true }, 20);
                var blockBumped = s1.blocks.some(function(b) { return b.used; });
                var abilityGained = s1.player.abilities.doubleJump === true;
                if (blockBumped) checks.push('bump_block');
                else failures.push('bump_block (no block used)');
                if (abilityGained) checks.push('gain_ability');
                else failures.push('gain_ability (doubleJump not acquired)');

                // --- Scenario 5: Unlock gate after gaining ability ---
                this.start();
                s0 = this.snapshot();
                // Bump block to get ability
                this.step({ right: true }, 3);
                this.step({ jump: true }, 18);
                // Move toward gate area
                this.step({ right: true }, 40);
                this.step({ right: true, jump: true }, 20);
                s1 = this.snapshot();
                var gateOpen = s1.gates.some(function(g) { return g.open; });
                if (gateOpen) checks.push('unlock_gate');
                else failures.push('unlock_gate (gate not open)');

                // --- Scenario 6: Combo challenge ---
                this.start();
                s0 = this.snapshot();
                // Bump block
                this.step({ right: true }, 3);
                this.step({ jump: true }, 18);
                // Stomp enemy while moving right
                this.step({ right: true }, 3);
                this.step({ right: true, jump: true }, 20);
                // Move to gate
                this.step({ right: true }, 30);
                this.step({ right: true, jump: true }, 15);
                // Reach goal
                this.step({ right: true }, 30);
                s1 = this.snapshot();
                var comboPass = s1.player.abilities.doubleJump && s1.player.enemiesDefeated > 0 && s1.player.blocksUsed > 0 && (s1.status === 'won');
                if (comboPass) checks.push('combo_challenge');
                else failures.push('combo_challenge (full sequence incomplete)');

                // --- Risk test: enemy side-touch hurts ---
                this.start();
                s0 = this.snapshot();
                // Walk into enemy from side without jumping
                this.step({ right: true }, 8);
                s1 = this.snapshot();
                var tookDamage = s1.player.invincible > 0 || s1.lives < s0.lives;
                // (invincible gets set by enemy collision code)

                // --- Risk test: gate blocks without ability ---
                this.start();
                // No block bump, just walk to gate
                this.step({ right: true }, 40);
                this.step({ right: true, jump: true }, 20);
                s1 = this.snapshot();
                var gateBlocked = !s1.gates.some(function(g) { return g.open; });

                return {
                    passed: failures.length === 0,
                    checks: checks,
                    failures: failures,
                    coverage: {
                        levelsPassed: (s1 && s1.status === 'won') ? ['level1'] : [],
                        totalLevels: ['level1'],
                        allLevelsReachable: true,
                        mechanics: {
                            move: checks.indexOf('move_right') >= 0,
                            jump: checks.indexOf('jump') >= 0,
                            stompEnemy: checks.indexOf('stomp_enemy') >= 0,
                            bumpBlock: checks.indexOf('bump_block') >= 0,
                            gainAbility: checks.indexOf('gain_ability') >= 0,
                            unlockGate: checks.indexOf('unlock_gate') >= 0,
                            comboChallenge: checks.indexOf('combo_challenge') >= 0
                        },
                        rewards: {
                            scoreGained: s1 ? s1.score > 0 : false,
                            enemyDefeatReward: checks.indexOf('stomp_enemy') >= 0,
                            blockReward: checks.indexOf('gain_ability') >= 0,
                            gateReward: checks.indexOf('unlock_gate') >= 0
                        },
                        risks: {
                            enemyTouch: tookDamage,
                            gateBlocked: gateBlocked,
                            fallDeath: false
                        },
                        stateChanges: {
                            playerX: true,
                            playerY: true,
                            enemiesDefeated: checks.indexOf('stomp_enemy') >= 0,
                            blocksUsed: checks.indexOf('bump_block') >= 0,
                            abilities: checks.indexOf('gain_ability') >= 0,
                            gates: checks.indexOf('unlock_gate') >= 0,
                            goalReached: s1 ? s1.goal && s1.goal.reached : false
                        }
                    }
                };
            }
        };

        // Initialize
        loadLevel('level1');
        gameLoop();
    </script>
</body>
</html>
