<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agent Neo · Computer Use</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      #card {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.82);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 6px 10px;
        font: 11px -apple-system, system-ui;
        color: #fff;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #label .dot {
        width: 6px;
        height: 6px;
        background: #34d399;
        border-radius: 50%;
        box-shadow: 0 0 8px #34d399;
      }

      #shot {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none;
      }

      #empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.4);
        font: 12px -apple-system, system-ui;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="label"><span class="dot"></span><span>Agent Neo · Computer Use</span></div>
      <div id="empty">等待操作...</div>
      <img id="shot" />
    </div>
    <script>
      window.__setFrame = function (url) {
        if (!url) return;
        var img = document.getElementById('shot');
        var empty = document.getElementById('empty');
        img.src = url;
        img.style.display = 'block';
        if (empty) empty.style.display = 'none';
      };
    </script>
  </body>
</html>
