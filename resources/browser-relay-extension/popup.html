<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 280px; margin: 0; padding: 12px; font: 13px system-ui, sans-serif; color: #e5e7eb; background: #18181b; }
      .row { display: flex; justify-content: space-between; gap: 12px; margin: 8px 0; }
      .label { color: #a1a1aa; }
      .value { color: #f4f4f5; max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
      button { width: 100%; margin-top: 8px; border: 1px solid #3f3f46; border-radius: 6px; background: #27272a; color: #f4f4f5; padding: 7px; cursor: pointer; }
      button:hover { background: #3f3f46; }
      button.primary { background: #2563eb; border-color: #1d4ed8; }
      button.primary:hover { background: #1d4ed8; }
      button.danger { color: #fecaca; border-color: #7f1d1d; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      a { color: #7dd3fc; text-decoration: none; }
      .hint { margin-top: 10px; color: #a1a1aa; font-size: 11px; line-height: 1.4; }
      .tab { margin-top: 8px; padding: 8px; border: 1px solid #3f3f46; border-radius: 6px; background: #09090b; }
      .tab-title { font-size: 12px; color: #fafafa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .tab-url { margin-top: 4px; font-size: 11px; color: #a1a1aa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div class="row"><span class="label">Status</span><span id="status" class="value">...</span></div>
    <div class="row"><span class="label">Port</span><span id="port" class="value">...</span></div>
    <div class="row"><span class="label">Attached</span><span id="attached" class="value">0</span></div>

    <div class="tab">
      <div class="label">Current tab</div>
      <div id="tabTitle" class="tab-title">—</div>
      <div id="tabUrl" class="tab-url">—</div>
      <div class="row" style="margin-bottom:0"><span class="label">Attached here</span><span id="tabAttached" class="value">no</span></div>
    </div>

    <button id="attach" class="primary">Attach current tab</button>
    <button id="detach" class="danger">Detach current tab</button>
    <button id="reconnect">Reconnect</button>
    <p><a href="options.html" target="_blank">Options</a></p>
    <div class="hint">
      Agent Neo only controls tabs you explicitly attach. Chrome may show a debugger banner while attached.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
